syntax = "proto3";

package system_status.v1alpha;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/isovalent/ipa/system_status/v1alpha";

message SystemStatusEvent {
  // Time at which the event was produced
  google.protobuf.Timestamp time = 1;
  oneof event {
    SystemStatusUpdate status = 2;
    SystemMetadataUpdate metadata = 3;
    PolicyStatusUpdate policy = 4;
  }
}

// An update describing the current state of a system running
// on a particular node.
message SystemStatusUpdate {
  // Cluster for which the status is being updated
  string cluster_name = 1;

  // Node for which the status is being updated. If empty the status
  // is for the whole cluster.
  string node_name = 2;

  // The system whose status is being updated
  SystemID system = 3;

  // The local node time at which this system was started
  google.protobuf.Timestamp started_at = 4;

  // The total number of evaluated diagnostic conditions
  uint32 total_conditions = 5;

  // The currently failing conditions
  repeated FailingCondition failing_conditions = 6;

  // Extra unstructured data to include in the status update. Each system may
  // use this field to send arbitrary key value pairs as a part of the status
  // update. It is up to each consumer of the status update to interpret or
  // ignore this field.
  map<string, string> extra_data = 7;
}

// System identifier
message SystemID {
  // The name of the system. This is usually the name of the process reporting
  // the status, e.g. cilium-agent or cilium-operator.
  string name = 1;

  // Version of the system, e.g. v1.18.0-cee.1.
  string version = 2;
}

message FailingCondition {
  // Identifier to identify a condition within a system.
  // For a globally unique identifier this must be paired with
  // [SystemID].
  string condition_id = 1;

  // Severity of the failure
  Severity severity = 2;

  // Optional details on why the condition is failing
  string message = 3;
}

// Update of the metadata associated with system's known conditions.
// The metadata is separated from conditions to reduce the size of the
// update payload and to allow updating the metadata after a system has
// been released.
//
// Metadata updates for the same system are combined together allowing
// e.g. the Cilium Agent and Cilium Operator to upload their metadata
// separately even though they're part of the same system.
message SystemMetadataUpdate {
  // The system the metadata is associated with
  SystemID system = 1;

  // Metadata for each condition
  repeated ConditionMetadata conditions = 2;
}

message ConditionMetadata {
  // The identifier for the condition within a system
  string condition_id = 1;

  // The sub-system that is impacted by the condition. This should be
  // fairly high-level and user should be able to easily infer what
  // functionality is being impacted.
  string subsystem = 3;

  // A detailed description about the condition
  string description = 4;

  // An optional description on how to either mitigate or
  // resolve the condition
  string resolution = 5;
}

enum Severity {
  SEVERITY_UNSPECIFIED = 0;

  // Debug severity is for failures that are not by default shown to the
  // user, but can aid with debugging issues
  SEVERITY_DEBUG = 1;

  // Minor severity is for failures that are noteworthy, but have limited
  // impact to the system.
  SEVERITY_MINOR = 2;

  // Major severity is for failures that have a clear impact to the
  // functioning of the system.
  SEVERITY_MAJOR = 3;

  // Critical severity is for failures that have significant impact to
  // the whole cluster.
  SEVERITY_CRITICAL = 4;
}

// PolicyType represents the type of a policy.
enum PolicyType {
  POLICY_TYPE_UNSPECIFIED = 0;
  POLICY_TYPE_TETRAGON_NETWORK_POLICY = 1;
}

// PolicyStatus represents the status of a single policy on a node.
message PolicyStatus {
  // Type of the policy.
  PolicyType type = 1;
  // ID of the policy.
  string id = 2;
  // Name of the policy.
  string name = 3;
  // Version of the policy.
  string version = 4;
  // Conditions that are currently preventing the policy to be enforced.
  // If empty, the policy is being enforced.
  repeated FailingCondition failing_conditions = 5;
}

// PolicyStatusUpdate contains the current statuses of all the policies on a
// node.
message PolicyStatusUpdate {
  // The ID of the node that's reporting the policy statuses.
  string node_id = 1;
  // The statuses of all the policies on the node.
  repeated PolicyStatus statuses = 2;
}
