syntax = "proto3";

package graph.v1alpha;

import "google/protobuf/timestamp.proto";
import "graph/v1alpha/edge.proto";

option go_package = "github.com/isovalent/ipa/graph/v1alpha";

// The graph services allows querying connections information that are
// typically useful to render a graph visualization.
service GraphService {
  // GetConnections returns a set of connections that match the query criteria.
  rpc GetConnections(GetConnectionsRequest) returns (GetConnectionsResponse) {}
}

// GetConnectionsRequest allows for specifying the type of connections that
// should be returned.
message GetConnectionsRequest {
  // Window start is the start time of the time window. A time window SHOULD
  // be provided to limit the number of connections returned.
  google.protobuf.Timestamp window_start = 1;
  // Window end is the end time of the time window. A time window SHOULD be
  // provided to limit the number of connections returned.
  google.protobuf.Timestamp window_end = 2;

  // The link type MUST be provided. It corresponds to the protobuf tag of the
  // desired edge type of the link.
  uint32 link_type = 3;

  // A CEL expression MAY be used to filter connections.
  //
  // The filtering expression may use the `link` (type: Edge), `source` and
  // `destination` variables (type: Vertex).
  // Example:
  //   has(link.network_telemetry) && link.network_telemetry.tx_packets > 0 &&
  //   has(source.kubernetes) && source.kubernetes.cluster_name == "df-hubble-demo-ce-01" &&
  //   has(destination.kubernetes) && destination.kubernetes.cluster_name = "df-hubble-dev-ce-01"
  string filter = 4;

  // Field keys by which the source vertex should be grouped. At least one
  // field MUST be provided.
  // Example:
  //   ["source.kubernetes.cluster_name", "source.kubernetes.node_name"]
  repeated string group_by_source = 5;

  // Field keys by which the destination vertex should be grouped. At least
  // one field MUST be provided.
  // Example:
  //   ["destination.kubernetes.cluster_name", "destination.kubernetes.node_name"]
  repeated string group_by_destination = 7;
}

// GetConnectionsResponse is the response provided by the GetConnections endpoint.
message GetConnectionsResponse {
  // Connections is a list of all the connections that match the request
  // criteria.
  // There should be only one connection per unique vertex-edge-vertex.
  // In other words, field values and time window are aggregated.
  repeated ConnectionResponse connections = 1;
}

// ConnectionResponse represents a specific connection.
message ConnectionResponse {
  // Link may provide aggregated information regarding the connection.
  Edge link = 1;

  // Source fields are properties that correspond to the vertex field keys
  // specified in the group_by_source field of the query.
  // Example:
  //   {
  //     "cluster_name": "df-hubble-dev-ce-01",
  //     "node_name": "ip-10-1-5-110.us-west-2.compute.internal"
  //   }
  map<string, string> source_fields = 2;

  // Destination fields are properties that correspond to the vertex field keys
  // specified in the group_by_destination field of the query.
  // Example:
  //   {
  //     "namespace": "kube-system",
  //   }
  map<string, string> destination_fields = 3;
}
