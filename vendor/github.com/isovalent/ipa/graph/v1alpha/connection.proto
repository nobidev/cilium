syntax = "proto3";

package graph.v1alpha;

import "google/protobuf/timestamp.proto";
import "graph/v1alpha/edge.proto";
import "graph/v1alpha/vertex.proto";

option go_package = "github.com/isovalent/ipa/graph/v1alpha";

// A connection log is a message that a source emits periodically and which
// provides information about connections.
//
// Emitters SHOULD NOT re-emit ConnectionLog events.
// ConnectionLog events SHOULD NOT have overlapping time windows.
message ConnectionLog {
  // An emitter is the source that observes connection information. The emitter
  // typically observes data at the source of the connection.
  Emitter emitter = 1;

  // Window start is the time at which the emitter started collecting
  // information regarding the observed connections.
  google.protobuf.Timestamp window_start = 2;
  // Window end is the time at which the emitter stopped collecting information
  // regarding the observed connections.
  google.protobuf.Timestamp window_end = 3;

  // Connections is a list of all connections that were tracked during the
  // given time window.
  repeated Connection connections = 4;
}

// Emitter is a list of all known connection log data sources.
enum Emitter {
  // The source of the data is unspecified.
  EMITTER_UNSPECIFIED = 0;
  // The source of the data is Hubble.
  EMITTER_HUBBLE = 1;
  // The source of the data is Tetragon.
  EMITTER_TETRAGON = 2;
}

// A connection is a simple directed graph where an edge links two vertices in
// one direction.
message Connection {
  // Source defines properties of the vertex at the emitting side of the
  // connection.
  Vertex source = 1;
  // Source defines properties of the vertex at the receiving side of the
  // connection.
  Vertex destination = 2;
  // Links define properties of the edges that link the two vertices.
  //
  // There MUST be at least one link between the source and destination vertices.
  //
  // If more than one link is provided, their type MUST be different.
  // In other words, links MUST be a set of at least one element where every
  // element in the set is of a different edge type.
  repeated Edge links = 3;
}
