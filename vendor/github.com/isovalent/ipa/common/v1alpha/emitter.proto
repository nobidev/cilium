syntax = "proto3";

package common.v1alpha;

option go_package = "github.com/isovalent/ipa/common/v1alpha";

// Emitter identifies the source that emits some data.
message Emitter {
  // name identifies the emitter.
  // The name should be capitalized ("Hubble", not "hubble" nor "HUBBLE").
  string name = 1;
  // version identifies the emitter version.
  // The version should not contain a 'v' prefix as sometimes seen ("1.19.0",
  // not "v1.19.0").
  string version = 2;
}
