syntax = "proto3";

package common.net.v1alpha;

option go_package = "github.com/isovalent/ipa/common/net/v1alpha";

// IPProtocol is a list of IP protocols.
//
// Field numbers match IANA's assigned protocol numbers.
// See the URL below for reference:
// https://www.iana.org/assignments/protocol-numbers/protocol-numbers.xhtml
enum IPProtocol {
  // IP_PROTOCOL_UNSPECIFIED is to be used when the protocol is not
  // specified.
  IP_PROTOCOL_UNSPECIFIED = 0;
  // IP_PROTOCOL_ICMP is the Internet Control Message protocol.
  IP_PROTOCOL_ICMP = 1;
  // IP_PROTOCOL_IGMP is the Internet Group management protocol.
  IP_PROTOCOL_IGMP = 2;
  // IP_PROTOCOL_TCP is the Transmission Control protocol.
  IP_PROTOCOL_TCP = 6;
  // IP_PROTOCOL_UDP is the User Datagram protocol.
  IP_PROTOCOL_UDP = 17;
  // IP_PROTOCOL_DCCP is the Datagram Congestion Control protocol.
  IP_PROTOCOL_DCCP = 33;
  // IP_PROTOCOL_ICMPV6 is ICMP for IPv6.
  IP_PROTOCOL_ICMPV6 = 58;
  // IP_PROTOCOL_SCTP is the Stream Control Transmission protocol.
  IP_PROTOCOL_SCTP = 132;
  // IP_PROTOCOL_UDPLITE is the Lightweight User Datagram protocol.
  IP_PROTOCOL_UDPLITE = 136;
}
