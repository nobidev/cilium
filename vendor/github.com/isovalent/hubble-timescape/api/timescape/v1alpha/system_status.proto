syntax = "proto3";

package timescape.v1alpha;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";
import "system_status/v1alpha/system_status.proto";
import "timescape/v1/time_filter.proto";

option go_package = "github.com/isovalent/hubble-timescape/api/timescape/v1alpha";

// SystemStatusService for querying the system status.
service SystemStatusService {
  // GetSummary returns a summary of failing conditions.
  rpc GetSummary(GetSummaryRequest) returns (GetSummaryResponse) {}

  // GetDetail returns details about a specific condition.
  rpc GetDetail(GetDetailRequest) returns (GetDetailResponse) {}

  // GetTimeline returns a timeline of counts of succeeding and failing conditions.
  rpc GetTimeline(GetTimelineRequest) returns (GetTimelineResponse) {}

  // GetExtraData returns the latest extra data from each node for a specific system.
  rpc GetExtraData(GetExtraDataRequest) returns (GetExtraDataResponse) {}
}

// Request of GetSummary rpc call.
message GetSummaryRequest {
  // Optional cluster to filter the results
  string cluster = 1;

  // Since and Until can be used to specify a time interval.
  v1.TimeFilter time_filter = 2;
}

// Response of GetSummary rpc call.
message GetSummaryResponse {
  // The currently failing conditions.
  repeated FailingCondition failing_conditions = 1;
}

// A failing condition
message FailingCondition {
  // The qualified condition id.
  QualifiedConditionID condition_id = 1;

  // Condition severity.
  string severity = 2;

  // Number of affected nodes.
  uint32 affected_nodes_count = 3;

  // Latest time it occurred.
  google.protobuf.Timestamp last_time = 4;
}

// Request of GetDetail rpc call
message GetDetailRequest {
  // Optional cluster to filter the results
  string cluster = 1;

  // Since and Until can be used to specify a time interval.
  v1.TimeFilter time_filter = 2;

  // The condition we're requesting.
  QualifiedConditionID qid = 3;
}

// Response of GetDetail rpc call contains the list of nodes
// on which the given condition is failing along with the
// failing condition message from each node.
message GetDetailResponse {
  // Metadata associated with the condition
  system_status.v1alpha.ConditionMetadata metadata = 1;

  // The nodes for which this condition is failing on.
  repeated NodeFailingCondition nodes = 2;
}

// Details of a failing condition on a specific node
message NodeFailingCondition {
  // The cluster for the node.
  string cluster = 1;

  // The node on which the condition is failing.
  string node = 2;

  // The failing condition message giving more details on why it is failing.
  string message = 3;

  // Severity of the failure.
  system_status.v1alpha.Severity severity = 4;
}

// Request of GetTimeline rpc call
message GetTimelineRequest {
  // Optional condition ID to show the timeline for. If unset all conditions
  // are included.
  QualifiedConditionID condition_id = 1;

  // Optional cluster to filter the results.
  string cluster = 2;

  // Since and Until can be used to specify a time interval.
  // If not set defaults to last 24 hours.
  v1.TimeFilter time_filter = 3;

  // Optional window size for samples. Defaults to 1 hour.
  google.protobuf.Duration window_size = 4;
}

// Response of GetTimeline rpc call
message GetTimelineResponse {
  // Samples of failing and succeeding conditions in buckets specified by
  // 'window_size' in the time range specified by 'time_filter'.
  repeated TimelineSample samples = 1;
}

// A timeline sample
message TimelineSample {
  // Time of the sample
  google.protobuf.Timestamp timestamp = 1;

  // Number of succeeding conditions across all nodes.
  uint32 success_count = 2;

  // Number of failing conditions across all nodes.
  uint32 fail_count = 3;

  // Number of nodes without any failing conditions.
  uint32 node_success_count = 4;

  // Number of nodes with at least one failing condition.
  uint32 node_fail_count = 5;
}

// QualifiedConditionID uniquely identifies the condition to a specific system.
message QualifiedConditionID {
  // The system name and version.
  system_status.v1alpha.SystemID system = 1;

  // Condition identifier.
  string condition_id = 2;
}

// Request for the GetExtraData rpc call.
message GetExtraDataRequest {
  // Optional cluster to filter the results
  string cluster = 1;

  // The required system name and version.
  system_status.v1alpha.SystemID system = 2;
}

// Response for the GetExtraData rpc call.
message GetExtraDataResponse {
  // The extra data for each node for the requested system.
  repeated ExtraData nodes = 1;
}

// Extra data for a specific node.
message ExtraData {
  // The cluster of the node.
  string cluster = 1;

  // The node
  string node = 2;

  // Time at which the extra data was received.
  google.protobuf.Timestamp timestamp = 3;

  // The extra data for this node.
  map<string, string> data = 4;
}
