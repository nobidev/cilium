apiVersion: isovalent.com/v1alpha1
kind: LBBackendPool
metadata:
  namespace: default
  name: lb-1
spec:
  backendType: IP
  healthCheck:
    intervalSeconds: 2
    timeoutSeconds: 2
    http:
      path: "/health"
  backends:
    - ip: 9.9.9.9
      port: 8080
    - ip: 8.9.9.9
      port: 8080
  loadbalancing:
    algorithm:
      consistentHashing: {}
---
