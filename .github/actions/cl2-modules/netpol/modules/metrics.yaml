{{$action := .action}}

{{$NETPOL_LATENCY_THRESHOLD := DefaultParam .CL2_NETPOL_LATENCY_THRESHOLD 0.1}}
{{$MEDIAN_CPU_USAGE_THRESHOLD := DefaultParam .CL2_NETPOL_MEDIAN_CPU_USAGE_THRESHOLD 0.2}}
{{$MEDIAN_MEM_USAGE_THRESHOLD := DefaultParam .CL2_NETPOL_MEDIAN_MEM_USAGE_THRESHOLD 450}}
{{$ENABLE_VIOLATIONS := DefaultParam .CL2_ENABLE_VIOLATIONS true}}

steps:
  - name: {{$action}} Cilium Agent Policy implementation delay
    measurements:
    - Identifier: PolicyImplementationDelay
      Method: GenericPrometheusQuery
      Params:
        action: {{$action}}
        metricName: NetPol Policy Implementation Delay
        metricVersion: v1
        unit: s
        enableViolations: {{$ENABLE_VIOLATIONS}}
        # source: one report sample per source, not "too many samples".
        dimensions:
        - source
        queries:
        # Gate on the median, not the tail: histogram p99 is interpolated
        # within the top populated bucket and is too noisy to hard-fail on,
        # while p50 still catches a broad realization regression. p90/p99
        # stay reported (no threshold) for trend-watching.
        - name: Perc99
          query: histogram_quantile(0.99, sum(rate(cilium_policy_implementation_delay_bucket[%v])) by (le))
        - name: Perc90
          query: histogram_quantile(0.90, sum(rate(cilium_policy_implementation_delay_bucket[%v])) by (le))
        - name: Perc50
          query: histogram_quantile(0.50, sum(rate(cilium_policy_implementation_delay_bucket[%v])) by (le))
          threshold: {{$NETPOL_LATENCY_THRESHOLD}}
        # Reported-only diagnostics (no threshold) for the next p50 breach.
        - name: SampleCount
          query: sum(increase(cilium_policy_implementation_delay_count[%v]))
        - name: SampleCountBySource
          query: sum(increase(cilium_policy_implementation_delay_count[%v])) by (source)
        # Interpolation-free SLO: fraction of realizations under 100ms.
        - name: FracUnder100ms
          query: sum(rate(cilium_policy_implementation_delay_bucket{le="0.1"}[%v])) / sum(rate(cilium_policy_implementation_delay_count[%v]))

    # Reported-only: attribute a real slowdown to its regeneration stage.
    - Identifier: EndpointRegenerationTime
      Method: GenericPrometheusQuery
      Params:
        action: {{$action}}
        metricName: NetPol Endpoint Regeneration Time
        metricVersion: v1
        unit: s
        enableViolations: {{$ENABLE_VIOLATIONS}}
        dimensions:
        - scope
        queries:
        - name: RegenTotalP50
          query: histogram_quantile(0.5, sum(rate(cilium_endpoint_regeneration_time_stats_seconds_bucket{scope="total"}[%v])) by (le))
        - name: RegenTotalP99
          query: histogram_quantile(0.99, sum(rate(cilium_endpoint_regeneration_time_stats_seconds_bucket{scope="total"}[%v])) by (le))
        - name: RegenP99ByScope
          query: histogram_quantile(0.99, sum(rate(cilium_endpoint_regeneration_time_stats_seconds_bucket[%v])) by (le, scope))

    - Identifier: CiliumCPUUsage
      Method: GenericPrometheusQuery
      Params:
        action: {{$action}}
        metricName: NetPol Average CPU Usage
        metricVersion: v1
        unit: cpu
        enableViolations: {{$ENABLE_VIOLATIONS}}
        queries:
        - name: Perc99
          query: quantile(0.99, avg_over_time(rate(cilium_process_cpu_seconds_total[1m])[%v:10s]))
        - name: Perc90
          query: quantile(0.90, avg_over_time(rate(cilium_process_cpu_seconds_total[1m])[%v:10s]))
        - name: Perc50
          query: quantile(0.50, avg_over_time(rate(cilium_process_cpu_seconds_total[1m])[%v:10s]))
          threshold: {{$MEDIAN_CPU_USAGE_THRESHOLD}}

    - Identifier: CiliumMemUsage
      Method: GenericPrometheusQuery
      Params:
        action: {{$action}}
        metricName: NetPol Max Memory Usage
        metricVersion: v1
        unit: MB
        enableViolations: {{$ENABLE_VIOLATIONS}}
        queries:
        - name: Perc99
          query: quantile(0.99, max_over_time(cilium_process_resident_memory_bytes[%v]) / 1024 / 1024)
        - name: Perc90
          query: quantile(0.90, max_over_time(cilium_process_resident_memory_bytes[%v]) / 1024 / 1024)
        - name: Perc50
          query: quantile(0.5, max_over_time(cilium_process_resident_memory_bytes[%v]) / 1024 / 1024)
          threshold: {{$MEDIAN_MEM_USAGE_THRESHOLD}}
