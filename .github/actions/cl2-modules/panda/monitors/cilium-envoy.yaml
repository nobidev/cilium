apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  labels:
    k8s-app: cilium-envoy
  name: cilium-envoy
  namespace: monitoring
spec:
  podMetricsEndpoints:
    - interval: 10s
      port: envoy-metrics
      metricRelabelings:
      - sourceLabels: [__name__]
        targetLabel: __name__
        regex: "(envoy_cilium_policymap)_([0-9]+_[0-9]+_[0-9]+_[0-9]+_[0-9])_(.+)"
        replacement: envoy_cilium_policymap_$3
  jobLabel: k8s-app
  selector:
    matchLabels:
      k8s-app: cilium-envoy
  namespaceSelector:
    matchNames:
    - kube-system
