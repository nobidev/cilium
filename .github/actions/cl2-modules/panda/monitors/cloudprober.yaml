apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  labels:
    app: cloudprober
  name: cloudprober
  namespace: monitoring
spec:
  podMetricsEndpoints:
    - interval: 10s
      port: http
  jobLabel: app
  selector:
    matchLabels:
      app: cloudprober
  namespaceSelector:
    matchNames:
    - default