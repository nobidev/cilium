# Variables:
# - #REPLACE_ME_INITIAL_CLUSTER: CSV of name=urls for etcd nodes
# - #REPLACE_ME_DOMAIN: Domain of kubernetes nodes
apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: kube-system
  name: etcd
spec:
  replicas: #REPLACE_ME_REPLICAS
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: etcd
  template:
    metadata:
      labels:
        app: etcd
    spec:
      hostNetwork: true
      tolerations:
        - key: "etcd-ig"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node.kubernetes.io/network-unavailable"
          operator: "Exists"
          effect: "NoSchedule"
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: "kubernetes.io/hostname"
              labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - etcd
      nodeSelector:
        app: etcd
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.15
          imagePullPolicy: IfNotPresent
          ports:
            - name: etcd-client
              containerPort: 2379
            - name: etcd-server
              containerPort: 2380
            - name: etcd-metrics
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            successThreshold: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: INITIAL_CLUSTER
              value: #REPLACE_ME_INITIAL_CLUSTER
            - name: DOMAIN
              value: #REPLACE_ME_DOMAIN
            - name: ETCDCTL_ENDPOINTS
              value: https://$(NODE_NAME):2379
            - name: ETCDCTL_KEY
              value: /etc/etcd/certs/client/etcd-client.key
            - name: ETCDCTL_CERT
              value: /etc/etcd/certs/client/etcd-client.crt
            - name: ETCDCTL_CACERT
              value: /etc/etcd/certs/client/etcd-client-ca.crt
          command:
            - /usr/local/bin/etcd
          args:
            - --name=$(NODE_NAME)
            - --data-dir=/data
            - --wal-dir=/data/wal
            - --listen-peer-urls=https://0.0.0.0:2380
            - --listen-client-urls=https://0.0.0.0:2379
            - --advertise-client-urls=https://$(NODE_NAME).$(DOMAIN):2379
            - --initial-cluster-state=new
            - --initial-cluster-token=etcd-123
            - --initial-cluster=$(INITIAL_CLUSTER)
            - --initial-advertise-peer-urls=https://$(NODE_NAME).$(DOMAIN):2380
            - --listen-metrics-urls=http://0.0.0.0:8080
            - --client-cert-auth
            - --trusted-ca-file=/etc/etcd/certs/server/etcd-server-ca.crt
            - --cert-file=/etc/etcd/certs/server/etcd-server.crt
            - --key-file=/etc/etcd/certs/server/etcd-server.key
            - --peer-client-cert-auth
            - --peer-trusted-ca-file=/etc/etcd/certs/server/etcd-server-ca.crt
            - --peer-cert-file=/etc/etcd/certs/server/etcd-server.crt
            - --peer-key-file=/etc/etcd/certs/server/etcd-server.key
          volumeMounts:
            - name: etcd-server-tls
              mountPath: "/etc/etcd/certs/server"
              readOnly: true
      volumes:
        - name: etcd-server-tls
          secret:
            secretName: etcd-server-secrets
            optional: false
