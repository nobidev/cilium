apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cloudprober-host
spec:
  selector:
    matchLabels:
      app: cloudprober-host
  template:
    metadata:
      labels:
        app: cloudprober-host
    spec:
      hostNetwork: true
      volumes:
        - name: cloudprober-config
          configMap:
            name: cloudprober-config
      containers:
        - name: cloudprober
          image: cloudprober/cloudprober:v0.13.8-1
          command: ["/bin/sh"]
          args:
          - -c
          - /cloudprober --config_file /cfg/cloudprober.cfg --cloud_metadata=none --disable_cloud_logging=true --logtostderr
          volumeMounts:
            - name: cloudprober-config
              mountPath: /cfg
          ports:
            - name: http
              containerPort: 9313
---
apiVersion: v1
kind: Service
metadata:
  name: cloudprober-host
  labels:
    app: cloudprober-host
spec:
  ports:
    - port: 9313
      protocol: TCP
      targetPort: 9313
  selector:
    app: cloudprober-host
  type: ClusterIP
