probe {
  name: "all"
  type: HTTP
  targets {
    endpoint {
      name: "google"
      url: "https://www.google.com"
    }
    endpoint {
      name: "gitlab"
      url: "https://about.gitlab.com"
    }
    endpoint {
      name: "gs"
      url: "https://storage.googleapis.com/chromium-browser-snapshots/"
    }
    endpoint {
      name: "gsfail"
      url: "https://storage.googleapis.com/chromium-browser-snapshots2/"
    }
    endpoint {
      name: "github"
      url: "https://github.com"
    }
  }
  interval_msec: 5000
  timeout_msec: 5000
  http_probe {
    latency_breakdown: ALL_STAGES
    max_redirects: 0
  }
  latency_unit: "ms"
}

surfacer {
  type: PROMETHEUS

  prometheus_surfacer {
    metrics_prefix: "cloudprober_"
  }
}