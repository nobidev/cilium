probe {
  name: "all"
  type: HTTP
  targets {
    endpoint {
      name: "ms"
      url: "https://login.microsoftonline.com"
    }
  }
  interval_msec: 60000
  timeout_msec: 60000
  http_probe {
    latency_breakdown: ALL_STAGES
    max_redirects: 0
  }
  latency_unit: "ms"
}

surfacer {
  type: PROMETHEUS

  prometheus_surfacer {
    metrics_prefix: "cloudprober_"
  }
}
