{{$action := .action}}

{{$MEDIAN_CPU_USAGE_THRESHOLD := DefaultParam .CL2_MEDIAN_CILIUM_CPU_USAGE_THRESHOLD 1.0}}
{{$MEDIAN_MEM_USAGE_THRESHOLD := DefaultParam .CL2_MEDIAN_CILIUM_MEM_USAGE_THRESHOLD 2048}}

{{$MEDIAN_ENVOY_CPU_USAGE_THRESHOLD := DefaultParam .CL2_MEDIAN_ENVOY_CPU_USAGE_THRESHOLD 0.2}}
{{$MEDIAN_ENVOY_MEM_USAGE_THRESHOLD := DefaultParam .CL2_MEDIAN_ENVOYMEM_USAGE_THRESHOLD 200}}
{{$NODE_LOCAL_IDENTITIES_THRESHOLD := .nodeLocalIdentitiesThreshold }}


steps:
- name: {{$action}} Dedicated Envoy Policy performance metrics
  measurements:
  - Identifier: CiliumCPUUsage
    Method: GenericPrometheusQuery
    Params:
      action: {{$action}}
      metricName: Average CPU Usage
      metricVersion: v1
      unit: cpu
      enableViolations: true
      queries:
      - name: Perc99
        query: quantile(0.99, avg_over_time(rate(cilium_process_cpu_seconds_total[1m])[%v:10s]))
      - name: Perc90
        query: quantile(0.90, avg_over_time(rate(cilium_process_cpu_seconds_total[1m])[%v:10s]))
      - name: Perc50
        query: quantile(0.50, avg_over_time(rate(cilium_process_cpu_seconds_total[1m])[%v:10s]))
        threshold: {{$MEDIAN_CPU_USAGE_THRESHOLD}}

  - Identifier: CiliumMemUsage
    Method: GenericPrometheusQuery
    Params:
      action: {{$action}}
      metricName: Max Memory Usage
      metricVersion: v1
      unit: MB
      enableViolations: true
      queries:
      - name: Perc99
        query: quantile(0.99, max_over_time(cilium_process_resident_memory_bytes[%v]) / 1024 / 1024)
      - name: Perc90
        query: quantile(0.90, max_over_time(cilium_process_resident_memory_bytes[%v]) / 1024 / 1024)
      - name: Perc50
        query: quantile(0.5, max_over_time(cilium_process_resident_memory_bytes[%v]) / 1024 / 1024)
        threshold: {{$MEDIAN_MEM_USAGE_THRESHOLD}}

  - Identifier: CiliumEnvoyCPUUsage
    Method: GenericPrometheusQuery
    Params:
      action: {{$action}}
      metricName: Average CPU Usage Envoy
      metricVersion: v1
      unit: cpu
      enableViolations: true
      queries:
      - name: Perc99
        query: quantile(0.99, avg_over_time(rate(container_cpu_usage_seconds_total{container="cilium-envoy"}[1m])[%v:10s]))
      - name: Perc90
        query: quantile(0.90, avg_over_time(rate(container_cpu_usage_seconds_total{container="cilium-envoy"}[1m])[%v:10s]))
      - name: Perc50
        query: quantile(0.50, avg_over_time(rate(container_cpu_usage_seconds_total{container="cilium-envoy"}[1m])[%v:10s]))
        threshold: {{$MEDIAN_ENVOY_CPU_USAGE_THRESHOLD}}

  - Identifier: CiliumEnvoyHeapMemUsage
    Method: GenericPrometheusQuery
    Params:
      action: {{$action}}
      metricName: Max Memory Usage Envoy
      metricVersion: v1
      unit: MB
      enableViolations: true
      queries:
      - name: Perc99
        query: quantile(0.99, max_over_time(envoy_server_memory_heap_size[%v]) / 1024 / 1024)
      - name: Perc90
        query: quantile(0.90, max_over_time(envoy_server_memory_heap_size[%v]) / 1024 / 1024)
      - name: Perc50
        query: quantile(0.5, max_over_time(envoy_server_memory_heap_size[%v]) / 1024 / 1024)
        threshold: {{$MEDIAN_ENVOY_MEM_USAGE_THRESHOLD}}

  - Identifier: NodeLocalIdentities
    Method: GenericPrometheusQuery
    Params:
      action: {{$action}}
      metricName: Node Local Identities
      metricVersion: v1
      unit: count
      enableViolations: true
      queries:
      - name: Max
        query: max(max_over_time(cilium_identity{type="node_local"}[%v]))
        threshold: {{$NODE_LOCAL_IDENTITIES_THRESHOLD}}

  - Identifier: BPFMapPressure
    Method: GenericPrometheusQuery
    Params:
      action: {{$action}}
      metricName: BPF Map Pressure
      metricVersion: v1
      unit: "%"
      queries:
      - name: BPF Map Pressure (Max)
        query: max_over_time(max(cilium_bpf_map_pressure)[%v:]) * 100
        threshold: 60
      enableViolations: true

  - Identifier: WarningErrorLogs
    Method: GenericPrometheusQuery
    Params:
      action: {{$action}}
      metricName: Warning and Error Logs
      metricVersion: v1
      unit: count
      queries:
      - name: Warnings
        query: sum(cilium_errors_warnings_total{level="warning"})
        threshold: 10
      - name: Errors
        query: sum(cilium_errors_warnings_total{level="error"})
        threshold: 10
      enableViolations: true