name: Cilium Conn Disrupt Check
description: Check cilium connection disruption status

inputs:
  job-name:
    required: false
    description: 'Job name used in Cilium sysdump filename'
  cilium-cli:
    required: false
    default: "/usr/local/bin/cilium"
    description: 'Path to the Cilium CLI binary'
  extra-connectivity-test-flags:
    required: false
    description: 'Cilium CLI connectivity tests extra flags'
  full-test:
    required: false
    default: 'false'
    description: 'Run full connectivity test suite'
  tests:
    required: false
    default: ''
    description: 'Select which connectivity tests to run'
  conn-disrupt:
    required: false
    default: 'true'
    description: 'Whether to run the conn-disrupt sub-tests (--include-conn-disrupt-test*). Set to false for plain connectivity test runs. full-test=true enables them regardless of this input.'
  test-concurrency:
    required: false
    default: '1'
    description: 'Concurrency level to run tests'
  include-conn-disrupt-test-l7-traffic:
    required: false
    default: 'false'
    description: 'Include L7 traffic disruption test (--include-conn-disrupt-test-l7-traffic)'
runs:
  using: composite
  steps:
    - name: Perform Conn Disrupt Test
      shell: bash
      run: |
        if [[ "${{ inputs.conn-disrupt }}" != "true" ]]; then
          TEST_ARG="${{ inputs.tests }}"
        else
          TEST_ARG="no-interrupted-connections,no-ipsec-xfrm-error"
          if [[ -n "${{ env.CONN_DISRUPT_EXTRA_TEST }}" ]]; then
            TEST_ARG="${TEST_ARG},${{ env.CONN_DISRUPT_EXTRA_TEST }}"
          fi
          EXTRA_ARG="--include-conn-disrupt-test --include-conn-disrupt-test-egw --include-conn-disrupt-test-ns-traffic"
          if [[ -n "${{ env.CONN_DISRUPT_EXTRA_ARG }}" ]]; then
            EXTRA_ARG="${EXTRA_ARG} ${{ env.CONN_DISRUPT_EXTRA_ARG }}"
          fi
        fi
        if [[ "${{ inputs.full-test }}" == "true" ]]; then
          TEST_ARG=""
          EXTRA_ARG="--include-conn-disrupt-test --include-conn-disrupt-test-egw --include-conn-disrupt-test-ns-traffic"
        fi

        if [[ "${{ inputs.conn-disrupt }}" == "true" && "${{ inputs.include-conn-disrupt-test-l7-traffic }}" == "true" ]]; then
          EXTRA_ARG="${EXTRA_ARG} --include-conn-disrupt-test-l7-traffic"
        fi

        ${{ inputs.cilium-cli }} connectivity test --include-unsafe-tests \
          --conn-disrupt-test-restarts-path "./cilium-conn-disrupt-restarts" \
          --conn-disrupt-test-xfrm-errors-path "./cilium-conn-disrupt-xfrm-errors" \
          --flush-ct \
          --sysdump-hubble-flows-count=1000000 --sysdump-hubble-flows-timeout=5m \
          --sysdump-output-filename "cilium-sysdump-conn-disrupt-test-${{ inputs.job-name }}-<ts>" \
          --junit-file "cilium-junits/conn-disrupt-test-${{ inputs.job-name }}.xml" \
          ${{ inputs.extra-connectivity-test-flags }} \
          --junit-property github_job_step="Run conn disrupt tests (${{ inputs.job-name }})" \
          --test "$TEST_ARG" \
          --test-concurrency=${{ inputs.test-concurrency }} \
          --expected-xfrm-errors "+inbound_no_state" \
          ${EXTRA_ARG}

    # A conn-disrupt restart is often not a datapath drop but the test client
    # being starved off-CPU (BPF recompiles during a rollout on a small KIND
    # host) until its socket deadline fires. Surface that saturation signal in
    # the job log so the benign case can be told apart from a real drop without
    # a manual sysdump dive. Best-effort: never fails the job.
    - name: Capture host saturation signals on conn-disrupt failure
      if: ${{ failure() }}
      shell: bash {0}
      run: |
        echo "=== node CPU/memory (best-effort, needs metrics-server) ==="
        kubectl top nodes || true
        echo "=== per-node load average ==="
        for node in $(kubectl get nodes -o name); do
          echo "--- ${node#node/} ---"
          docker exec "${node#node/}" cat /proc/loadavg 2>/dev/null || true
          docker exec "${node#node/}" cat /proc/pressure/cpu 2>/dev/null || true
        done
        echo "=== recent BPF compile / regeneration durations per agent ==="
        for pod in $(kubectl get -n kube-system pods -l k8s-app=cilium -o name); do
          echo "--- ${pod#pod/} ---"
          kubectl logs -n kube-system "$pod" -c cilium-agent --since=15m 2>/dev/null \
            | grep -E 'BPFCompilationTime|eventHandlingDuration|Completed endpoint regeneration' \
            | tail -20 || true
        done
