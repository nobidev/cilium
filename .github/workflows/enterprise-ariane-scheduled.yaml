name: Enterprise Ariane scheduled workflows

on:
  # Run every 1 hours
  # Tests are only run when current hour % 6 corresponds
  # to the branch nightlyHour value in the matrix
  schedule:
    - cron: '0 */1 * * *'


permissions:
  # To be able to access the repository with actions/checkout
  contents: read
  # To trigger workflows via workflow_dispatch
  actions: write

jobs:
  ariane-scheduled-nightly:
    name: Run Scheduled Workflows
    strategy:
      fail-fast: false
      matrix:
        include:
          - branch: 'v1.16-ce'
            nightlyHour: 4
          - branch: 'v1.17-ce'
            nightlyHour: 5
          - branch: 'v1.18-ce'
            nightlyHour: 1
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          ref: ${{ matrix.branch }}
          persist-credentials: false

      - name: Manually run Nightly Ariane workflows from the branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HOUR=$(date -u +"%H")
          if (( HOUR == ${{ matrix.nightlyHour }} )); then
            echo "Running scheduled workflows for branch ${{ matrix.branch }}"
          else
            echo "Skipping scheduled workflows for branch ${{ matrix.branch }}"
            exit 0
          fi

          REF="${{ matrix.branch }}"
          SHA=$(git rev-parse ${REF})
          # merge all the scheduled tests
          readarray workflows < <((
            yq '.triggers["/test"].workflows[]' .github/ariane-config.yaml
            yq '.schedule.nightly.workflows[]' .github/ariane-config.yaml
            yq '.triggers["/test"].workflows[]' .github/ariane-config-enterprise.yaml
            yq '.schedule.nightly.workflows[]' .github/ariane-config-enterprise.yaml
          ) | sort -u)

          for workflow in "${workflows[@]}"; do
            echo triggering ${workflow}
            gh workflow run ${workflow} \
              --ref ${REF} \
              -f PR-number=${REF/./-} \
              -f context-ref=${REF} \
              -f SHA=${SHA}
          done
