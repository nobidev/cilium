name: Enterprise Ariane scheduled workflows

on:
  # Run every 1 hours
  # Tests are only run when current hour % 6 corresponds
  # to the branch nightlyHour value in the matrix
  schedule:
    - cron: '0 */1 * * *'


permissions:
  # To be able to access the repository with actions/checkout
  contents: read
  # To trigger workflows via workflow_dispatch
  actions: write

jobs:
  ariane-scheduled-nightly:
    name: Run Scheduled Workflows
    strategy:
      fail-fast: false
      matrix:
        include:
          - branch: '1.15-ce'
            nightlyHour: 3
          - branch: '1.16-ce'
            nightlyHour: 4
          - branch: '1.17-ce'
            nightlyHour: 5
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: v${{ matrix.branch }}
          persist-credentials: false

      - name: Manually run Nightly Ariane workflows from the branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HOUR=$(date -u +"%H")
          if (( HOUR == ${{ matrix.nightlyHour }} )); then
            echo "Running scheduled workflows for branch ${{ matrix.branch }}"
          else
            echo "Skipping scheduled workflows for branch ${{ matrix.branch }}"
            exit 0
          fi

          REF="v${{ matrix.branch }}"
          SHA=$(git rev-parse ${REF})
          readarray nightly_workflows < <(yq '.schedule.nightly.workflows[]' .github/ariane-config-enterprise.yaml)


          for workflow in "${nightly_workflows[@]}"; do
            echo triggering ${workflow}
            gh workflow run ${workflow} \
              --ref ${REF} \
              -f PR-number=${REF/./-} \
              -f context-ref=${REF} \
              -f SHA=${SHA}
          done
