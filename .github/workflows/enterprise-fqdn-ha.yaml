name: Enterprise FQDN HA (ci-fqdn-ha)

# Any change in triggers needs to be reflected in the concurrency group.
on:
  workflow_dispatch:
    inputs:
      PR-number:
        description: "Pull request number."
        required: true
      context-ref:
        description: "Context in which the workflow runs. If PR is from a fork, will be the PR target branch (general case). If PR is NOT from a fork, will be the PR branch itself (this allows committers to test changes to workflows directly from PRs)."
        required: true
      SHA:
        description: "SHA under test (head of the PR branch)."
        required: true
      extra-args:
        description: "[JSON object] Arbitrary arguments passed from the trigger comment via regex capture group. Parse with 'fromJson(inputs.extra-args).argName' in workflow."
        required: false
        default: '{}'
  push:
    branches:
      - 'renovate/**'
  # Run every 6 hours
  schedule:
    - cron: '0 4/6 * * *'

# By specifying the access of one of the scopes, all of those that are not
# specified are set to 'none'.
permissions:
  # Required by the telemetry collection step
  actions: read
  # To be able to access the repository with actions/checkout
  contents: read
  # To allow retrieving information from the PR API
  pull-requests: read
  # To be able to set commit status
  statuses: write

concurrency:
  # Structure:
  # - Workflow name
  # - Event type
  # - A unique identifier depending on event type:
  #   - schedule: SHA
  #   - workflow_dispatch: PR number
  #
  # This structure ensures a unique concurrency group name is generated for each
  # type of testing, such that re-runs will cancel the previous run.
  group: |
    ${{ github.workflow }}
    ${{ github.event_name }}
    ${{
      (github.event_name == 'push' && github.sha) ||
      (github.event_name == 'schedule' && github.sha) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.PR-number)
    }}
  cancel-in-progress: true

env:
  kind_config: .github/kind-config-dual.yaml

jobs:
  commit-status-start:
    name: Commit Status Start
    runs-on: ubuntu-24.04
    steps:
      - name: Set initial commit status
        uses: myrotvorets/set-commit-status-action@3730c0a348a2ace3c110851bed53331bc6406e9f # v2.0.1
        with:
          sha: ${{ inputs.SHA || github.sha }}

  installation-and-connectivity:
    name: Setup & Test
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Collect Workflow Telemetry
        uses: catchpoint/workflow-telemetry-action@94c3c3d9567a0205de6da68a76c428ce4e769af1 # v2.0.0
        with:
          comment_on_pr: false

      - name: Checkout context ref (trusted)
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ inputs.context-ref || github.sha }}
          persist-credentials: false

      - name: Set Environment Variables
        uses: ./.github/actions/set-env-variables

      - name: Add external docker network
        uses: ./.github/actions/kind-external-network
        id: external_network

      - name: Create kind cluster
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3 # v1.12.0
        with:
          version: ${{ env.KIND_VERSION }}
          node_image: ${{ env.KIND_K8S_IMAGE }}
          kubectl_version: ${{ env.KIND_K8S_VERSION }}
          config: ${{ env.kind_config }}
          wait: 0 # The control-plane never becomes ready, since no CNI is present

      - name: Add external targets to kind cluster
        uses: ./.github/actions/kind-external-targets
        id: external_targets
        with:
          kind_network: ${{ steps.external_network.outputs.kind_network }}
          ipv4_external_target: ${{ steps.external_network.outputs.ipv4_external_target }}
          ipv4_other_external_target: ${{ steps.external_network.outputs.ipv4_other_external_target }}
          ipv6_external_target: ${{ steps.external_network.outputs.ipv6_external_target }}
          ipv6_other_external_target: ${{ steps.external_network.outputs.ipv6_other_external_target }}

      - name: Set up job variables for GHA environment
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHA="${{ inputs.SHA }}"
          else
            SHA="${{ github.sha }}"
          fi

          CILIUM_INSTALL_DEFAULTS=" \
            --chart-directory=install/kubernetes/cilium \
            --namespace=kube-system \
            --helm-set=debug.enabled=true \
            --helm-set=image.repository=quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/cilium-ci \
            --helm-set=image.useDigest=false \
            --helm-set=image.tag=${SHA} \
            --helm-set=operator.image.repository=quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/operator \
            --helm-set=operator.image.suffix=-ci \
            --helm-set=operator.image.tag=${SHA} \
            --helm-set=operator.image.useDigest=false \
            --helm-set-string=extraConfig.external-dns-proxy=true \
            --helm-set=enterprise.featureGate.strict=true \
          "

          CONNECTIVITY_TEST_DEFAULTS=" \
            --hubble=false \
            --log-code-owners --code-owners=${CILIUM_CLI_CODE_OWNERS_PATHS} \
            --exclude-code-owners=${CILIUM_CLI_EXCLUDE_OWNERS} \
            --flow-validation=disabled \
            --test='to-fqdn' \
            --test='external-cilium-dns-proxy' \
            --collect-sysdump-on-failure \
            --external-target=${{ steps.external_targets.outputs.external_target_name }} \
            --external-other-target=${{ steps.external_targets.outputs.other_external_target_name }} \
            --external-cidr=${{ steps.external_network.outputs.ipv4_external_cidr }} \
            --external-cidrv6=${{ steps.external_network.outputs.ipv6_external_cidr }} \
            --external-ip=${{ steps.external_network.outputs.ipv4_external_target }} \
            --external-ipv6=${{ steps.external_network.outputs.ipv6_external_target }} \
            --external-other-ip=${{ steps.external_network.outputs.ipv4_other_external_target }} \
            --external-other-ipv6=${{ steps.external_network.outputs.ipv6_other_external_target }} \
            --external-target-ca-namespace=external-target-secrets --external-target-ca-name=custom-ca \
            --external-target-ipv6-capable
          "

          echo cilium_install_defaults="${CILIUM_INSTALL_DEFAULTS}" >> $GITHUB_OUTPUT
          echo connectivity_test_defaults=${CONNECTIVITY_TEST_DEFAULTS} >> $GITHUB_OUTPUT

          echo sha=${SHA} >> $GITHUB_OUTPUT

      - name: Install Cilium CLI
        uses: cilium/cilium-cli@024e340cca1465e2a6336521f12370c7ca58c59a # v0.18.7
        with:
          skip-build: ${{ env.CILIUM_CLI_SKIP_BUILD }}
          image-repo: ${{ env.CILIUM_CLI_IMAGE_REPO }}
          image-tag: ${{ steps.vars.outputs.sha }}
          repository: ${{ env.CILIUM_CLI_RELEASE_REPO }}
          release-version: ${{ env.CILIUM_CLI_VERSION }}

      - name: Wait for images to be available
        timeout-minutes: 30
        shell: bash
        run: |
          for image in cilium-ci operator-generic-ci hubble-relay-ci cilium-dnsproxy-ci; do
            until docker manifest inspect quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/$image:${{ steps.vars.outputs.sha }} &> /dev/null; do sleep 45s; done
          done

      # Warning: since this is a privileged workflow, subsequent workflow job
      # steps must take care not to execute untrusted code.
      - name: Checkout pull request branch (NOT TRUSTED)
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ steps.vars.outputs.sha }}
          persist-credentials: false

      - name: Install Cilium
        run: |
          cilium install ${{ steps.vars.outputs.cilium_install_defaults }}
          cilium status --wait --namespace kube-system

      - name: Install Cilium DNS proxy
        run: |
          helm install -n kube-system cilium-dnsproxy ./enterprise/fqdn-proxy/installation \
            --set image.repository=quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/cilium-dnsproxy-ci \
            --set image.tag=${{ steps.vars.outputs.sha }} \
            --set metrics.enabled=true \
            --set debug=true
          kubectl rollout status -n kube-system ds/cilium-dnsproxy --watch

      - name: Run connectivity fqdn test
        run: |
          cilium connectivity test \
            --namespace kube-system \
            ${{ steps.vars.outputs.connectivity_test_defaults }}

      - name: Apply policy
        run: |
          cat ./enterprise/fqdn-proxy/scripts/compat/fqdn-policy-egress.yaml | \
            sed -e "s/EXTERNAL_TARGET/${{ steps.external_targets.outputs.external_target_name }}/" > ./enterprise/fqdn-proxy/scripts/compat/fqdn-policy-egress-rendered.yaml
          kubectl apply -f ./enterprise/fqdn-proxy/scripts/compat/fqdn-policy-egress-rendered.yaml
          sleep 10

      - name: Run tests before Cilium pods are down
        run: |
          ./enterprise/fqdn-proxy/scripts/test-fqdn-ha.sh \
            ${{ steps.external_targets.outputs.external_target_name }} \
            ${{ steps.external_targets.outputs.other_external_target_name }}

      - name: Features tested
        uses: ./.github/actions/feature-status
        with:
          title: "Summary of all features tested"
          json-filename: "enterprise-fqdn-ha"

      - name: Bring Cilium down
        run: |
          ./enterprise/fqdn-proxy/scripts/bring-cilium-down.sh

      - name: Run tests after Cilium pods are down
        run: |
          ./enterprise/fqdn-proxy/scripts/test-fqdn-ha.sh \
            ${{ steps.external_targets.outputs.external_target_name }} \
            ${{ steps.external_targets.outputs.other_external_target_name }}

      - name: Run common post steps
        if: ${{ always() }}
        uses: ./.github/actions/post-logic
        with:
          artifacts_suffix: "enterprise-fqdn-ha"
          capture_features_tested: false
          job_status: "${{ job.status }}"

  merge-upload-and-status:
    name: Merge Upload and Status
    if: ${{ always() }}
    needs: installation-and-connectivity
    uses: ./.github/workflows/common-post-jobs.yaml
    secrets: inherit
    with:
      context-ref: ${{ inputs.context-ref || github.sha }}
      sha: ${{ inputs.SHA || github.sha }}
      result: ${{ needs.installation-and-connectivity.result }}
