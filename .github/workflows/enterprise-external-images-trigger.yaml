name: Trigger build images external to isovalent/cilium

# Any change in triggers needs to be reflected in the concurrency group.
on:
  schedule:
    # Every day at 00:00
    - cron: "0 0 * * *"
  merge_group:
  push:
    branches:
      - main-ce
      - v1.[0-9]+-ce
    paths:
      - install/kubernetes/Makefile.values
      - enterprise/olm/ubi-versions.env
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - install/kubernetes/Makefile.values
      - enterprise/olm/ubi-versions.env
  # Allow to run manually
  workflow_dispatch: {}

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.after || github.event.merge_group && github.run_id }}

jobs:
  load-versions:
    name: Load UBI base image versions
    runs-on: ubuntu-24.04
    outputs:
      ubi-minimal: ${{ steps.load.outputs.ubi-minimal }}
      ubi-micro: ${{ steps.load.outputs.ubi-micro }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Load UBI versions
        id: load
        uses: ./.github/actions/load-ubi-versions

  check-and-build:
    name: Trigger build images external workflow
    needs: load-versions
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: CERTGEN
            image-name: certgen-ubi-ci
            docker-context: enterprise/images/certgen
            dockerfile: enterprise/images/certgen/Dockerfile
            base-image: ${{ needs.load-versions.outputs.ubi-micro }}
            build-from-source: false

          - component: CILIUM_NODEINIT
            image-name: startup-script-ubi-ci
            docker-context: enterprise/images/startup-script
            dockerfile: enterprise/images/startup-script/Dockerfile
            base-image: ${{ needs.load-versions.outputs.ubi-minimal }}
            build-from-source: false

          - component: CILIUM_ENVOY
            image-name: cilium-envoy-ubi-ci
            docker-context: enterprise/images/cilium-envoy
            dockerfile: enterprise/images/cilium-envoy/Dockerfile
            # renovate: datasource=docker
            base-image: registry.redhat.io/ubi9/ubi-minimal:9.6@sha256:8d905a93f1392d4a8f7fb906bd49bf540290674b28d82de3536bb4d0898bf9d7
            build-from-source: false

          - component: HUBBLE_UI_BACKEND
            image-name: hubble-ui-backend-ubi-ci
            docker-context: hubble-ui-backend/backend
            dockerfile: hubble-ui-backend/backend/Dockerfile
            base-image: ${{ needs.load-versions.outputs.ubi-micro }}
            build-from-source: true
            source-repo: isovalent/hubble-ui-enterprise
            source-path: hubble-ui-backend

          - component: HUBBLE_UI_FRONTEND
            image-name: hubble-ui-frontend-ubi-ci
            docker-context: hubble-ui-frontend
            dockerfile: hubble-ui-frontend/Dockerfile
            # renovate: datasource=docker
            base-image: quay.io/isovalent-dev/nginx-unprivileged-ubi:1772792493-13a2bf3@sha256:c13f44f46cac791d2b1bb7cdc9033382840c93e6c8487137663f8342065e1099
            build-from-source: true
            source-repo: isovalent/hubble-ui-enterprise
            source-path: hubble-ui-frontend

          - component: KUBECTL
            image-name: kubectl-ubi-ci
            version-path: ".envoy.kubectl.image.tag"
            docker-context: enterprise/images/kubectl
            dockerfile: enterprise/images/kubectl/Dockerfile
            base-image: ${{ needs.load-versions.outputs.ubi-minimal }}
            build-from-source: false

          - component: KUBECTL
            image-name: kubectl-ci
            version-path: ".envoy.kubectl.image.tag"
            docker-context: enterprise/images/kubectl
            dockerfile: enterprise/images/kubectl/Dockerfile
            # renovate: datasource=docker
            base-image: debian:13.3-slim@sha256:f6e2cfac5cf956ea044b4bd75e6397b4372ad88fe00908045e9a0d21712ae3ba
            build-from-source: false

    uses: ./.github/workflows/enterprise-external-images.yaml
    secrets: inherit
    with:
      component: ${{ matrix.component }}
      image-name: ${{ matrix.image-name }}
      version-path: ${{ matrix.version-path }}
      docker-context: ${{ matrix.docker-context }}
      dockerfile: ${{ matrix.dockerfile }}
      base-image: ${{ matrix.base-image }}
      build-from-source: ${{ matrix.build-from-source }}
      source-repo: ${{ matrix.source-repo }}
      source-path: ${{ matrix.source-path }}
