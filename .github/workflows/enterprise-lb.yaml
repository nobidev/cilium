name: Enterprise LoadBalancer (ci-lb)

# Any change in triggers needs to be reflected in the concurrency group.
on:
  workflow_dispatch:
    inputs:
      PR-number:
        description: "Pull request number."
        required: true
      context-ref:
        description: "Context in which the workflow runs. If PR is from a fork, will be the PR target branch (general case). If PR is NOT from a fork, will be the PR branch itself (this allows committers to test changes to workflows directly from PRs)."
        required: true
      SHA:
        description: "SHA under test (head of the PR branch)."
        required: true
      extra-args:
        description: "[JSON object] Arbitrary arguments passed from the trigger comment via regex capture group. Parse with 'fromJson(inputs.extra-args).argName' in workflow."
        required: false
        default: "{}"
  # Run every 8 hours
  schedule:
    - cron: "0 2/8 * * *"

# By specifying the access of one of the scopes, all of those that are not
# specified are set to 'none'.
permissions:
  # To read actions state with catchpoint/workflow-telemetry-action
  actions: read
  # To be able to access the repository with actions/checkout
  contents: read
  # To allow retrieving information from the PR API
  pull-requests: read
  # To be able to set commit status
  statuses: write

concurrency:
  # Structure:
  # - Workflow name
  # - Event type
  # - A unique identifier depending on event type:
  #   - schedule: SHA
  #   - workflow_dispatch: PR number
  #
  # This structure ensures a unique concurrency group name is generated for each
  # type of testing, such that re-runs will cancel the previous run.
  group: |
    ${{ github.workflow }}
    ${{ github.event_name }}
    ${{
      (github.event_name == 'schedule' && github.sha) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.PR-number)
    }}
  cancel-in-progress: true

env:
  cilium_cli_ci_version:

jobs:
  echo-inputs:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    name: Echo Workflow Dispatch Inputs
    runs-on: ubuntu-24.04
    steps:
      - name: Echo Workflow Dispatch Inputs
        run: |
          echo '${{ tojson(inputs) }}'

  commit-status-start:
    name: Commit Status Start
    runs-on: ubuntu-latest
    steps:
      - name: Set initial commit status
        uses: myrotvorets/set-commit-status-action@3730c0a348a2ace3c110851bed53331bc6406e9f # v2.0.1
        with:
          sha: ${{ inputs.SHA || github.sha }}

  setup-and-test:
    runs-on: ${{ vars.GH_RUNNER_EXTRA_POWER }}
    name: "Setup & Test"
    env:
      job_name: "Setup & Test"
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - mode: "multi-node"
            kernel: "6.1-20240710.064909"
          - mode: "single-node"
            kernel: "6.1-20240710.064909"

    timeout-minutes: 60
    steps:
      - name: Collect Workflow Telemetry
        uses: catchpoint/workflow-telemetry-action@94c3c3d9567a0205de6da68a76c428ce4e769af1 # v2.0.0
        with:
          comment_on_pr: false

      - name: Checkout PR
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ steps.vars.outputs.sha }}
          persist-credentials: false

      - name: Set Environment Variables
        uses: ./.github/actions/set-env-variables

      - name: Set up job variables
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHA="${{ inputs.SHA }}"
          else
            SHA="${{ github.sha }}"
          fi
          echo sha=${SHA} >> $GITHUB_OUTPUT

          echo kind-params="--xdp \"\" 2 \"\" \"\" \"none\" \"ipv4\"" >> $GITHUB_OUTPUT

      - name: Install Cilium CLI
        uses: cilium/cilium-cli@62bd4511031211b50a4623870955a5ad27b43e3b # v0.16.16
        with:
          skip-build: ${{ env.CILIUM_CLI_SKIP_BUILD }}
          image-repo: ${{ env.CILIUM_CLI_IMAGE_REPO }}
          image-tag: ${{ steps.vars.outputs.sha }}

      - name: Provision K8s control-plane on LVH VM
        uses: ./.github/actions/lvh-kind
        with:
          test-name: enterprise-lb
          kernel: ${{ matrix.kernel }}
          kind-params: "${{ steps.vars.outputs.kind-params }}"
          kind-image: ${{ env.KIND_K8S_IMAGE }}
          port-forward: "6443:6443,22375:2375,22376:22376"

      - name: Preconfigure K8s nodes
        shell: bash
        run: |
          export DOCKER_HOST="tcp://127.0.0.1:22375"

          kubectl label node kind-control-plane service.cilium.io/node=t1
          kubectl taint node kind-control-plane service.cilium.io/node=t1:NoSchedule
          kubectl label node kind-worker service.cilium.io/node=t2
          kubectl label node kind-worker2 service.cilium.io/node=t2

          kind get nodes --name kind  | xargs -I container_name docker exec container_name sysctl -w net.ipv4.ip_unprivileged_port_start=0

      - name: Create testing host (single-node)
        id: single-node
        if: ${{ matrix.mode == 'single-node' }}
        shell: bash
        run: |
          export DOCKER_HOST="tcp://127.0.0.1:22375"

          # Create DIND container to simulate the testing host
          docker run -d --name testing-host --env DOCKER_TLS_CERTDIR="" -p 22376:2375 --privileged --network kind-cilium docker:27.3.1-dind
          ip=$(docker inspect '--format={{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' testing-host)
          echo ip=${ip} >> $GITHUB_OUTPUT

      - name: Wait for images to be available
        timeout-minutes: 30
        shell: bash
        run: |
          for image in cilium-ci operator-generic-ci hubble-relay-ci ; do
            until docker manifest inspect quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/$image:${{ steps.vars.outputs.sha }} &> /dev/null; do sleep 45s; done
          done

      - name: Install Isovalent LB
        shell: bash
        run: |
          cilium install \
             --wait --chart-directory=./install/kubernetes/cilium \
             --helm-set=image.repository=quay.io/isovalent-dev/cilium-ci \
             --helm-set=image.useDigest=false \
             --helm-set=image.tag=${{ steps.vars.outputs.sha }} \
             --helm-set=operator.image.repository=quay.io/isovalent-dev/operator \
             --helm-set=operator.image.suffix=-ci \
             --helm-set=operator.image.tag=${{ steps.vars.outputs.sha }} \
             --helm-set=operator.image.useDigest=false \
             --helm-set=hubble.relay.image.repository=quay.io/isovalent-dev/hubble-relay-ci \
             --helm-set=hubble.relay.image.tag=${{ steps.vars.outputs.sha }} \
             --helm-set=hubble.relay.image.useDigest=false \
             --helm-set=enterprise.loadbalancer.enabled=true \
             --helm-set=enterprise.bgpControlPlane.enabled=true \
             --helm-set=enterprise.bgpControlPlane.enableServiceHealthChecking=true \
             --helm-set=enterprise.bfd.enabled=true \
             --helm-set=debug.enabled=true \
             --helm-set=debug.verbose="envoy datapath" \
             --helm-set-string=envoy.nodeSelector."service\.cilium\.io/node"=t2 \
             --helm-set=envoy.debug.admin.enabled=true \
             --helm-set=envoy.dnsPolicy=ClusterFirstWithHostNet \
             --helm-set=envoyConfig.enabled=true \
             --helm-set=bpf.monitorAggregation=none \
             --helm-set=kubeProxyReplacement=true \
             --helm-set-string=extraConfig.enable-ipip-termination=true \
             --helm-set-string=extraConfig.loadbalancer-cp-accesslog-enable-hc=true \
             --helm-set-string=extraConfig.loadbalancer-cp-t1-hc-probe-timeout-seconds=10 \
             --helm-set=enterprise.featureGates="{BGPControlPlane}"

          cilium status --wait
          kubectl get pods --all-namespaces -o wide
          kubectl -n kube-system exec daemonset/cilium -- cilium-dbg status

          echo "Waiting until CiliumNodeConfig CRD has been created"
          while ! kubectl get crds ciliumnodeconfigs.cilium.io &> /dev/null; do
            echo -n "."
            sleep 2
          done
          echo ""

          kubectl apply -f enterprise/examples/kubernetes/loadbalancer/lb/t1-nodeconfig.yaml
          kubectl -n kube-system delete pod -l k8s-app=cilium --field-selector spec.nodeName=kind-control-plane
          cilium status --wait

      - name: Run tests
        shell: bash
        run: |
          PARAMS=""
          if [ "${{ matrix.mode }}" == "single-node" ]; then
            export DOCKER_HOST="tcp://127.0.0.1:22376"
            PARAMS="--mode=single-node"
          else
            export DOCKER_HOST="tcp://127.0.0.1:22375"
            # Ideally, we want to replicate real world use cases as much as possible in the tests.
            # Hence we don't remove LB services after each test case run. This is not possible
            # in --mode=single-node due to all client/app containers running in the same
            # netns (port clashes).
            PARAMS="--cleanup=false"
          fi

          # Using rakyll/gotest to colorize the "go test" output.
          # It's also possible to use plain "go test" to execute the LB E2E tests.
          go install github.com/rakyll/gotest@latest

          DOCKER_API_VERSION=1.45 LOADBALANCER_TESTS=true gotest -test.v -test.timeout=30m ./enterprise/test/ilb $PARAMS

      - name: Run "cilium lb status"
        if: ${{ steps.run-tests.outcome != 'skipped' }}
        shell: bash
        run: |
          cilium lb status

      - name: Fetch artifacts
        if: ${{ !success() && steps.run-tests.outcome != 'skipped' }}
        shell: bash
        run: |
          kubectl get pods --all-namespaces -o wide
          cilium status
          mkdir -p cilium-sysdumps
          cilium sysdump --output-filename cilium-sysdump-${{ matrix.name }}-final

      - name: Upload artifacts
        if: ${{ !success() }}
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: cilium-sysdumps-${{ matrix.name }}
          path: cilium-sysdump-*.zip

  merge-upload:
    if: ${{ always() }}
    name: Merge and Upload Artifacts
    runs-on: ubuntu-latest
    needs: setup-and-test
    steps:
      - name: Merge Sysdumps
        if: ${{ needs.setup-and-test.result == 'failure' }}
        uses: actions/upload-artifact/merge@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: cilium-sysdumps
          pattern: cilium-sysdumps-*
          retention-days: 5
          delete-merged: true
        continue-on-error: true

  commit-status-final:
    if: ${{ always() }}
    name: Commit Status Final
    needs: setup-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Set final commit status
        uses: myrotvorets/set-commit-status-action@3730c0a348a2ace3c110851bed53331bc6406e9f # v2.0.1
        with:
          sha: ${{ inputs.SHA || github.sha }}
          status: ${{ needs.setup-and-test.result }}
