name: CodeQL

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      PR-number:
        description: "Pull request number."
        required: true
      UID:
        description: "A second number, to differentiate multiple runs of the same workflow by the same PR"
        required: false
        default: 1
      context-ref:
        description: "Context in which the workflow runs. If PR is from a fork, will be the PR target branch (general case). If PR is NOT from a fork, will be the PR branch itself (this allows committers to test changes to workflows directly from PRs)."
        required: true
      SHA:
        description: "SHA under test (head of the PR branch)."
        required: true
      base-SHA:
        description: "SHA of the base branch (target branch of the PR)."
        required: false
      extra-args:
        description: "[JSON object] Arbitrary arguments passed from the trigger comment via regex capture group. Parse with 'fromJson(inputs.extra-args).argName' in workflow."
        required: false
        default: '{}'

# By specifying the access of one of the scopes, all of those that are not
# specified are set to 'none'.
permissions:
  # To read actions state with cilium/workflow-telemetry-action
  actions: read
  # To be able to access the repository with actions/checkout
  contents: read
  # To allow retrieving information from the PR API
  pull-requests: read
  # To be able to set commit status
  statuses: write
  # To be able to request the JWT from GitHub's OIDC provider
  id-token: write

jobs:
  echo-inputs:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    name: Echo Workflow Dispatch Inputs
    runs-on: ubuntu-24.04
    steps:
      - name: Echo Workflow Dispatch Inputs
        run: |
          echo '${{ tojson(inputs) }}'

  commit-status-start:
    name: Commit Status Start
    runs-on: ubuntu-24.04
    steps:
      - name: Set initial commit status
        uses: cilium/cilium/.github/actions/set-commit-status@main
        with:
          sha: ${{ inputs.SHA || github.sha }}

  analyze:
    name: Analyze
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      security-events: write
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: ['actions']
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        uses: github/codeql-action/autobuild@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          category: '/language:${{matrix.language}}'
          output: sarif-results
          upload: false

      - name: Checking for missing-workflow-permissions issues
        run: |
          set -euo pipefail

          SARIF_FILE="sarif-results/${{ matrix.language }}.sarif"
          if [[ ! -f "$SARIF_FILE" ]]; then
            echo "No SARIF file found"
            touch /tmp/affected_files.txt
            exit 0
          fi

          AFFECTED_FILES=$(jq -r '
            .runs[].results // [] |
            .[] |
            select(.ruleId == "actions/missing-workflow-permissions") |
            .locations[0].physicalLocation.artifactLocation.uri
          ' "$SARIF_FILE" | sort -u)

          if [[ -z "$AFFECTED_FILES" ]]; then
            echo "✅  No issues found"
            touch /tmp/affected_files.txt
            exit 0
          fi

          echo "$AFFECTED_FILES" > /tmp/affected_files.txt
          echo "Found issues in $(echo "$AFFECTED_FILES" | wc -l) files"

      - name: Get modified files
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            BASE_SHA="${{ inputs.base-SHA }}"
            HEAD_SHA="${{ inputs.SHA }}"
            MODIFIED_FILES=$(git diff --name-only "$BASE_SHA"..."$HEAD_SHA")
          else
            MODIFIED_FILES=$(git diff --name-only HEAD~1)
          fi

          echo "$MODIFIED_FILES" > /tmp/modified_files.txt
          echo "Found $(echo "$MODIFIED_FILES" | wc -l) modified files"

      - name: Check for issues in modified files
        run: |
          set -euo pipefail

          SARIF_FILE="sarif-results/${{ matrix.language }}.sarif"
          AFFECTED_FILES=$(cat /tmp/affected_files.txt)
          MODIFIED_FILES=$(cat /tmp/modified_files.txt)

          # If no affected files, skip check
          if [[ -z "$AFFECTED_FILES" ]]; then
            echo "✅ No issues in modified files"
            exit 0
          fi

          # Check for issues in modified files
          FAILED=false
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            if echo "$MODIFIED_FILES" | grep -qx "$file"; then
              echo "❌ Missing permissions in modified file: $file"
              jq -r --arg file "$file" '
                .runs[].results // [] |
                .[] |
                select(.ruleId == "actions/missing-workflow-permissions" and
                       .locations[0].physicalLocation.artifactLocation.uri == $file) |
                "  Line \(.locations[0].physicalLocation.region.startLine): \(.message.text)"
              ' "$SARIF_FILE"
              FAILED=true
            fi
          done <<< "$AFFECTED_FILES"

          if [[ "$FAILED" == "true" ]]; then
            echo ""
            echo "❌ Pipeline failed: Modified files have missing workflow permissions"
            exit 1
          fi

          echo "✅ No issues in modified files"

      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codeql-sarif-${{ matrix.language }}
          path: sarif-results/${{ matrix.language }}.sarif
          retention-days: 7

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: sarif-results/${{ matrix.language }}.sarif
          category: '/language:${{matrix.language}}'

  merge-upload-and-status:
    name: Merge Upload and Status
    if: ${{ always() }}
    needs: analyze
    uses: ./.github/workflows/common-post-jobs.yaml
    secrets: inherit
    with:
      context-ref: ${{ inputs.context-ref || github.sha }}
      sha: ${{ inputs.SHA || github.sha }}
      success: ${{ needs.analyze.result == 'success' }}
