name: Hot fix release build for UBI images

on:
  push:
    branches:
      - hf/main-ce/**

permissions:
  # To be able to access the repository with `actions/checkout`
  contents: read
  # Required to generate OIDC tokens for `sigstore/cosign-installer` authentication
  id-token: write

env:
  # TODO: to be updated when an image is available in isovalent-dev
  RUNTIME_IMAGE: quay.io/frederic_giloux/cilium-runtime-ubi-dev:b8a85c972dcd56d2c3309c8f1634ccab1bd1b0c1-wip@sha256:19561a57550a3e1d331c9e46f5ef3508e446181bd2ec3d7df29af3c35de36ae2
  UBI_IMAGE: registry.redhat.io/ubi9/ubi-minimal:9.5-1741599792@sha256:30bbd445046a3a63f5f5557a3c67dee74e3c8e7855eb0347630b020f3689823f

jobs:
  build-and-push:
    timeout-minutes: 45
    name: Build and Push Images
    environment: release-developer-images
    runs-on: ubuntu-24.04
    outputs:
      ref: ${{ steps.tag.outputs.ref }}
      tag: ${{ steps.tag.outputs.tag }}
    strategy:
      matrix:
        include:
          - name: cilium
            image_name: cilium
          - name: operator
            image_name: operator-generic
          - name: hubble-relay
            image_name: hubble-relay
          - name: clustermesh-apiserver
            image_name: clustermesh-apiserver

    steps:
      - name: Checkout main branch to access local actions
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Cleanup Disk space in runner
        uses: ./.github/actions/disk-cleanup

      - name: Set Environment Variables
        uses: ./.github/actions/set-env-variables

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca # v3.9.0

      - name: Login to quay.io
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_DEVELOPER_USERNAME }}
          password: ${{ secrets.QUAY_DEVELOPER_PASSWORD }}

      - name: Login to registry.redhat.io
        # required for using Red Hat base image during build
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d #v3.0.0
        with:
          registry: registry.redhat.io
          username: ${{ secrets.REDHAT_USERNAME_CI }}
          password: ${{ secrets.REDHAT_PASSWORD_CI }}

      - name: Getting image tag
        id: tag
        run: |
          ref=${GITHUB_REF##*/}
          echo ref=${ref} >> $GITHUB_OUTPUT
          echo tag=${ref} >> $GITHUB_OUTPUT

      - name: Checking if tag already exists
        id: tag-in-repositories
        shell: bash
        run: |
          if docker buildx imagetools inspect quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/${{ matrix.image_name }}-ubi-dev:${{ steps.tag.outputs.tag }} &>/dev/null; then
            echo "Tag already exists!"
            echo exist='true' >> $GITHUB_OUTPUT
            exit 0
          fi

      - name: Checkout Source Code
        if: ${{ steps.tag-in-repositories.outputs.exist != 'true' }}
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Release Build ${{ matrix.name }}
        if: ${{ steps.tag-in-repositories.outputs.exist != 'true' }}
        id: docker_build_release
        shell: bash
        working-directory: ./enterprise/images
        run: |
          IMAGE_TAG=${{ steps.tag.outputs.tag }} REGISTRIES=quay.io/${{ env.QUAY_ORGANIZATION_DEV }} PUSH=true EXTRA_ARGS="--metadata-file .metadata.json --tag quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/${{ matrix.image_name }}-ubi-ci:${{ github.sha }}" make ${{ matrix.name }}-image
          echo digest=$(cat ../../.metadata.json | jq '."containerimage.digest"') >> $GITHUB_OUTPUT

      - name: Install Cosign
        if: ${{ steps.tag-in-repositories.outputs.exist != 'true' }}
        uses: sigstore/cosign-installer@c56c2d3e59e4281cc41dea2217323ba5694b171e # v3.8.0

      - name: Sign Container Image
        if: ${{ steps.tag-in-repositories.outputs.exist != 'true' }}
        run: |
          cosign sign -y quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/${{ matrix.image_name }}-ubi-dev@${{ steps.docker_build_release.outputs.digest }}
          cosign sign -y quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/${{ matrix.image_name }}-ubi-ci@${{ steps.docker_build_release.outputs.digest }}

      - name: Generate SBOM
        if: ${{ steps.tag-in-repositories.outputs.exist != 'true' }}
        uses: anchore/sbom-action@f325610c9f50a54015d37c8d16cb3b0e2c8f4de0 # v0.18.0
        with:
          artifact-name: sbom_${{ matrix.image_name }}-ubi_${{ steps.tag.outputs.tag }}.spdx.json
          output-file: ./sbom_${{ matrix.image_name }}-ubi_${{ steps.tag.outputs.tag }}.spdx.json
          image: quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/${{ matrix.image_name }}-ubi-dev:${{ steps.tag.outputs.tag }}

      - name: Attach SBOM attestation to container image
        if: ${{ steps.tag-in-repositories.outputs.exist != 'true' }}
        run: |
          cosign attest -r -y --predicate sbom_${{ matrix.image_name }}-ubi_${{ steps.tag.outputs.tag }}.spdx.json --type spdxjson quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/${{ matrix.image_name }}-ubi-dev@${{ steps.docker_build_release.outputs.digest }}
          cosign attest -r -y --predicate sbom_${{ matrix.image_name }}-ubi_${{ steps.tag.outputs.tag }}.spdx.json --type spdxjson quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/${{ matrix.image_name }}-ubi-ci@${{ steps.docker_build_release.outputs.digest }}

      - name: Image Release Digest
        if: ${{ steps.tag-in-repositories.outputs.exist != 'true' }}
        shell: bash
        run: |
          mkdir -p image-digest/
          echo "## ${{ matrix.image_name }}-ubi" > image-digest/${{ matrix.image_name }}-ubi.txt
          echo "" >> image-digest/${{ matrix.name }}-ubi.txt
          echo "\`quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/${{ matrix.image_name }}-ubi-dev:${{ steps.tag.outputs.tag }}@${{ steps.docker_build_release.outputs.digest }}\`" >> image-digest/${{ matrix.image_name }}-ubi.txt
          echo "\`quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/${{ matrix.image_name }}-ubi-ci:${{ github.sha }}@${{ steps.docker_build_release.outputs.digest }}\`" >> image-digest/${{ matrix.image_name }}-ubi.txt
          echo "" >> image-digest/${{ matrix.image_name }}-ubi.txt

      # Upload artifact digests
      - name: Upload artifact digests
        if: ${{ steps.tag-in-repositories.outputs.exist != 'true' }}
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: image-digest ${{ matrix.image_name }}-ubi
          path: image-digest
          retention-days: 1

  image-digests:
    name: Display Digests
    runs-on: ubuntu-24.04
    needs: build-and-push
    steps:
      - name: Downloading Image Digests
        shell: bash
        run: |
          mkdir -p image-digest/

      - name: Download digests of all images built
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          path: image-digest/
          pattern: "*image-digest *"

      - name: Image Digests Output
        shell: bash
        run: |
          cd image-digest/
          find -type f | sort | xargs -d '\n' cat
