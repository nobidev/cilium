name: Hot fix release build for UBI images

on:
  push:
    branches:
      - hf/main-ce/**

permissions:
  # To be able to access the repository with `actions/checkout`
  contents: read
  # Required to generate OIDC tokens for `sigstore/cosign-installer` authentication
  id-token: write

jobs:
  build-and-push:
    timeout-minutes: 45
    name: Build and Push Images
    environment: release-developer-images
    runs-on: ubuntu-24.04
    outputs:
      ref: ${{ steps.tag.outputs.ref }}
      tag: ${{ steps.tag.outputs.tag }}
    strategy:
      matrix:
        include:
          - name: cilium
            dockerfile: ./enterprise/images/cilium/Dockerfile
            # renovate: datasource=docker
            base_image: quay.io/isovalent-dev/cilium-runtime-ubi:0b93fa268c14630391e3eafd244040465dbb2be2
            postfix: ubi
            image_name: cilium

          - name: operator
            dockerfile: ./enterprise/images/operator/Dockerfile
            image_name: operator-generic
            # renovate: datasource=docker
            base_image: registry.redhat.io/ubi9/ubi-minimal:9.6@sha256:8d905a93f1392d4a8f7fb906bd49bf540290674b28d82de3536bb4d0898bf9d7
            postfix: ubi

          - name: hubble-relay
            dockerfile: ./enterprise/images/hubble-relay/Dockerfile
            image_name: hubble-relay
            # renovate: datasource=docker
            base_image: registry.redhat.io/ubi9/ubi-minimal:9.6@sha256:8d905a93f1392d4a8f7fb906bd49bf540290674b28d82de3536bb4d0898bf9d7
            postfix: ubi

          - name: clustermesh-apiserver
            dockerfile: ./enterprise/images/clustermesh-apiserver/Dockerfile
            image_name: clustermesh-apiserver
            # renovate: datasource=docker
            base_image: registry.redhat.io/ubi9/ubi-minimal:9.6@sha256:8d905a93f1392d4a8f7fb906bd49bf540290674b28d82de3536bb4d0898bf9d7
            postfix: ubi

    steps:
      - name: Checkout main branch to access local actions
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Cleanup Disk space in runner
        uses: ./.github/actions/disk-cleanup

      - name: Set Environment Variables
        uses: ./.github/actions/set-env-variables

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Login to quay.io
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_DEVELOPER_USERNAME }}
          password: ${{ secrets.QUAY_DEVELOPER_PASSWORD }}

      - name: Login to registry.redhat.io
        # required for using Red Hat base image during build
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: registry.redhat.io
          username: ${{ secrets.REDHAT_USERNAME_CI }}
          password: ${{ secrets.REDHAT_PASSWORD_CI }}

      - name: Getting image tag
        id: tag
        run: |
          ref=${GITHUB_REF##*/}
          echo ref=${ref} >> $GITHUB_OUTPUT
          echo tag=${ref} >> $GITHUB_OUTPUT

      - name: Checking if tag already exists
        id: tag-in-repositories
        shell: bash
        run: |
          if docker buildx imagetools inspect quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/${{ matrix.image_name }}-${{ matrix.postfix }}-dev:${{ steps.tag.outputs.tag }} &>/dev/null; then
            echo "Tag already exists!"
            echo exist='true' >> $GITHUB_OUTPUT
            exit 0
          fi

      - name: Checkout Source Code
        if: ${{ steps.tag-in-repositories.outputs.exist != 'true' }}
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Release Build ${{ matrix.name }} UBI based
        if: ${{ steps.tag-in-repositories.outputs.exist != 'true' }}
        id: docker_build_release_ubi
        shell: bash
        working-directory: ./enterprise/images
        run: |
          IMAGE_TAG=${{ steps.tag.outputs.tag }} \
          PLATFORMS=linux/amd64,linux/arm64 \
          REGISTRIES=quay.io/${{ env.QUAY_ORGANIZATION_DEV }} \
          PUSH=true \
          RUNTIME_IMAGE=${{ matrix.base_image }} \
          UBI_IMAGE=${{ matrix.base_image }} \
          EXTRA_ARGS="--metadata-file .metadata.json --tag quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/${{ matrix.image_name }}-${{ matrix.postfix }}-ci:${{ github.sha }}" \
          make ${{ matrix.name }}-image
          echo digest="$(cat ../../.metadata.json | jq '."containerimage.digest"')" >> $GITHUB_OUTPUT

      - name: Release ${{ matrix.name }} digest
        id: docker_digest
        shell: bash
        run: |
          digest=${{ steps.docker_build_release_ubi.outputs.digest }}
          echo digest=${digest} >> $GITHUB_OUTPUT

      - name: Install Cosign
        if: ${{ steps.tag-in-repositories.outputs.exist != 'true' }}
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      - name: Sign Container Image
        if: ${{ steps.tag-in-repositories.outputs.exist != 'true' }}
        run: |
          cosign sign -y quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/${{ matrix.image_name }}-${{ matrix.postfix }}-dev@${{ steps.docker_digest.outputs.digest }}
          cosign sign -y quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/${{ matrix.image_name }}-${{ matrix.postfix }}-ci@${{ steps.docker_digest.outputs.digest }}

      - name: Generate SBOM
        if: ${{ steps.tag-in-repositories.outputs.exist != 'true' }}
        uses: anchore/sbom-action@43a17d6e7add2b5535efe4dcae9952337c479a93 # v0.20.11
        with:
          artifact-name: sbom_${{ matrix.image_name }}-${{ matrix.postfix }}_${{ steps.tag.outputs.tag }}.spdx.json
          output-file: ./sbom_${{ matrix.image_name }}-${{ matrix.postfix }}_${{ steps.tag.outputs.tag }}.spdx.json
          image: quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/${{ matrix.image_name }}-${{ matrix.postfix }}-dev:${{ steps.tag.outputs.tag }}

      - name: Attach SBOM attestation to container image
        if: ${{ steps.tag-in-repositories.outputs.exist != 'true' }}
        run: |
          cosign attest -y --predicate sbom_${{ matrix.image_name }}-${{ matrix.postfix }}_${{ steps.tag.outputs.tag }}.spdx.json --type spdxjson quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/${{ matrix.image_name }}-${{ matrix.postfix }}-dev@${{ steps.docker_digest.outputs.digest }}
          cosign attest -y --predicate sbom_${{ matrix.image_name }}-${{ matrix.postfix }}_${{ steps.tag.outputs.tag }}.spdx.json --type spdxjson quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/${{ matrix.image_name }}-${{ matrix.postfix }}-ci@${{ steps.docker_digest.outputs.digest }}

      - name: Image Release Digest
        if: ${{ steps.tag-in-repositories.outputs.exist != 'true' }}
        shell: bash
        run: |
          mkdir -p image-digest/
          echo "## ${{ matrix.image_name }}-${{ matrix.postfix }}" > image-digest/${{ matrix.image_name }}-${{ matrix.postfix }}.txt
          echo "" >> image-digest/${{ matrix.name }}-${{ matrix.postfix }}.txt
          echo "\`quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/${{ matrix.image_name }}-${{ matrix.postfix }}-dev:${{ steps.tag.outputs.tag }}@${{ steps.docker_digest.outputs.digest }}\`" >> image-digest/${{ matrix.image_name }}-${{ matrix.postfix }}.txt
          echo "\`quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/${{ matrix.image_name }}-${{ matrix.postfix }}-ci:${{ github.sha }}@${{ steps.docker_digest.outputs.digest }}\`" >> image-digest/${{ matrix.image_name }}-${{ matrix.postfix }}.txt
          echo "" >> image-digest/${{ matrix.image_name }}-${{ matrix.postfix }}.txt

      # Upload artifact digests
      - name: Upload artifact digests
        if: ${{ steps.tag-in-repositories.outputs.exist != 'true' }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: image-digest ${{ matrix.image_name }}-${{ matrix.postfix }}
          path: image-digest
          retention-days: 1

  image-digests:
    name: Display Digests
    runs-on: ubuntu-24.04
    needs: build-and-push
    steps:
      - name: Downloading Image Digests
        shell: bash
        run: |
          mkdir -p image-digest/

      - name: Download digests of all images built
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: image-digest/
          pattern: "*image-digest *"

      - name: Image Digests Output
        shell: bash
        run: |
          cd image-digest/
          find -type f | sort | xargs -d '\n' cat
