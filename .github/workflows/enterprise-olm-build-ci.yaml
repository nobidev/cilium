name: OLM Build CI

on:
  pull_request:
    branches:
      - main-ce
      # TODO: cover release branches later on
    paths:
      - enterprise/olm/**
  push:
    branches:
      - main-ce
      # TODO: cover release branches later on
    paths:
      - enterprise/olm/**

permissions:
  # To be able to access the repository with `actions/checkout`
  contents: read

jobs:
  build-and-push-prs:
    timeout-minutes: 15
    name: Build and Push Images
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout the repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          sparse-checkout: |
            .github/actions
            enterprise/olm

      - name: Set Environment Variables
        uses: ./.github/actions/set-env-variables

      - name: Setup go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # v5.0.2
        with:
          cache: false
          # renovate: datasource=golang-version depName=go
          go-version: 1.23.2

      - name: Login to quay.io
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: quay.io
          # TODO: Check whether these or other (dedicated) credentials should be used
          username: ${{ secrets.QUAY_USERNAME_CI }}
          password: ${{ secrets.QUAY_PASSWORD_CI }}

      - name: Getting image tag
        id: tag
        run: |
          if [ "${{ github.event.pull_request.head.sha }}" != "" ]; then
            tag=${{ github.event.pull_request.head.sha }}
          else
            tag=${{ github.sha }}
          fi
          echo tag=${tag} >> $GITHUB_OUTPUT

      - name: Build and Push OLM container image
        # TODO: Sign container image and generate SBOM
        # TODO: Multi-arch builds
        env:
          # TODO: set the image reference using the commit sha as tag
          IMG: "quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/clife:${{ steps.tag.outputs.tag }}"
        run: |
          cd enterprise/olm
          make docker-build docker-push

