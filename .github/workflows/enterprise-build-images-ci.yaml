name: Enterprise Image CI Build

# Any change in triggers needs to be reflected in the concurrency group.
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main-ce
      - ft/main-ce/**
  merge_group:
    types: [checks_requested]

  # If the cache was cleaned we should re-build the cache with the latest commit
  workflow_run:
    workflows:
     - "Image CI Cache Cleaner"
    branches:
     - main-ce
     - ft/main-ce/**
    types:
     - completed

permissions:
  # To be able to access the repository with `actions/checkout`
  contents: read
  # Required to generate OIDC tokens for `sigstore/cosign-installer` authentication
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.after }}
  cancel-in-progress: true

jobs:
  load-versions:
    name: Load UBI base image versions
    runs-on: ubuntu-24.04
    outputs:
      ubi-minimal: ${{ steps.load.outputs.ubi-minimal }}
      ubi-micro: ${{ steps.load.outputs.ubi-micro }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Load UBI versions
        id: load
        uses: ./.github/actions/load-ubi-versions

  build-and-push-prs:
    timeout-minutes: 45
    name: Build and Push Images
    needs: load-versions
    runs-on: ${{ vars.GH_RUNNER_EXTRA_POWER_UBUNTU_LATEST || 'ubuntu-24.04' }}
    outputs:
      sha: ${{ steps.tag.outputs.sha }}
    strategy:
      matrix:
        include:
          - name: cilium
            distro: ubi
            dockerfile: ./enterprise/images/cilium/Dockerfile
            image_name: cilium-ubi
            build_args: |
              PUSH=true
              # renovate: datasource=docker
              RUNTIME_IMAGE=quay.io/isovalent-dev/cilium-runtime-ubi:fc521c0d940550f6682a1f59102d7e22978bb9ee
              # renovate: datasource=docker
              UBI_IMAGE=quay.io/isovalent-dev/cilium-runtime-ubi:fc521c0d940550f6682a1f59102d7e22978bb9ee
              OPERATOR_VARIANT=cilium-ubi

          - name: operator
            distro: ubi
            dockerfile: ./enterprise/images/operator/Dockerfile
            image_name: operator-generic-ubi
            build_args: |
              PUSH=true
              RUNTIME_IMAGE=${{ needs.load-versions.outputs.ubi-micro }}
              UBI_IMAGE=${{ needs.load-versions.outputs.ubi-micro }}
              OPERATOR_VARIANT=operator-generic-ubi

          - name: hubble-relay
            distro: ubi
            dockerfile: ./enterprise/images/hubble-relay/Dockerfile
            image_name: hubble-relay-ubi
            build_args: |
              PUSH=true
              RUNTIME_IMAGE=${{ needs.load-versions.outputs.ubi-micro }}
              UBI_IMAGE=${{ needs.load-versions.outputs.ubi-micro }}
              OPERATOR_VARIANT=hubble-relay-ubi

          - name: clustermesh-apiserver
            distro: ubi
            dockerfile: ./enterprise/images/clustermesh-apiserver/Dockerfile
            image_name: clustermesh-apiserver-ubi
            build_args: |
              PUSH=true
              RUNTIME_IMAGE=${{ needs.load-versions.outputs.ubi-micro }}
              UBI_IMAGE=${{ needs.load-versions.outputs.ubi-micro }}
              OPERATOR_VARIANT=clustermesh-apiserver-ubi

          - name: cilium
            distro: chainguard
            dockerfile: ./images/cilium/Dockerfile
            image_name: cilium
            platforms: linux/amd64,linux/arm64
            build_args: |
              CILIUM_RUNTIME_IMAGE=quay.io/isovalent-dev/cilium-runtime-wfi:a23cb179a0f1ca69f3e0a03d46f4748fbf02d204@sha256:ad3ab1a22177673568e44cbbcb4a09ea521fff7c9dd39ee1b6a4386846fe5acd

          - name: cilium-cli
            distro: distroless
            dockerfile: ./cilium-cli/Dockerfile
            image_name: cilium-cli
            platforms: linux/amd64
            require-dir: cilium-cli
            build_args: |
              CILIUM_RUNTIME_IMAGE=quay.io/isovalent-dev/cilium-runtime-wfi:a23cb179a0f1ca69f3e0a03d46f4748fbf02d204@sha256:ad3ab1a22177673568e44cbbcb4a09ea521fff7c9dd39ee1b6a4386846fe5acd

          - name: operator-aws
            distro: scratch
            dockerfile: ./images/operator/Dockerfile
            image_name: operator-aws
            platforms: linux/amd64,linux/arm64
            build_args: |
              CILIUM_RUNTIME_IMAGE=quay.io/isovalent-dev/cilium-runtime-wfi:a23cb179a0f1ca69f3e0a03d46f4748fbf02d204@sha256:ad3ab1a22177673568e44cbbcb4a09ea521fff7c9dd39ee1b6a4386846fe5acd
              OPERATOR_VARIANT=operator-aws

          - name: operator-azure
            distro: scratch
            dockerfile: ./images/operator/Dockerfile
            image_name: operator-azure
            platforms: linux/amd64,linux/arm64
            build_args: |
              CILIUM_RUNTIME_IMAGE=quay.io/isovalent-dev/cilium-runtime-wfi:a23cb179a0f1ca69f3e0a03d46f4748fbf02d204@sha256:ad3ab1a22177673568e44cbbcb4a09ea521fff7c9dd39ee1b6a4386846fe5acd
              OPERATOR_VARIANT=operator-azure

          - name: operator-alibabacloud
            distro: scratch
            dockerfile: ./images/operator/Dockerfile
            image_name: operator-alibabacloud
            platforms: linux/amd64,linux/arm64
            build_args: |
              CILIUM_RUNTIME_IMAGE=quay.io/isovalent-dev/cilium-runtime-wfi:a23cb179a0f1ca69f3e0a03d46f4748fbf02d204@sha256:ad3ab1a22177673568e44cbbcb4a09ea521fff7c9dd39ee1b6a4386846fe5acd
              OPERATOR_VARIANT=operator-alibabacloud

          - name: operator-generic
            distro: scratch
            dockerfile: ./images/operator/Dockerfile
            image_name: operator-generic
            platforms: linux/amd64,linux/arm64
            build_args: |
              CILIUM_RUNTIME_IMAGE=quay.io/isovalent-dev/cilium-runtime-wfi:a23cb179a0f1ca69f3e0a03d46f4748fbf02d204@sha256:ad3ab1a22177673568e44cbbcb4a09ea521fff7c9dd39ee1b6a4386846fe5acd
              OPERATOR_VARIANT=operator-generic

          - name: hubble-relay
            distro: distroless
            dockerfile: ./images/hubble-relay/Dockerfile
            image_name: hubble-relay
            platforms: linux/amd64,linux/arm64
            build_args: |
              CILIUM_RUNTIME_IMAGE=quay.io/isovalent-dev/cilium-runtime-wfi:a23cb179a0f1ca69f3e0a03d46f4748fbf02d204@sha256:ad3ab1a22177673568e44cbbcb4a09ea521fff7c9dd39ee1b6a4386846fe5acd

          - name: clustermesh-apiserver
            distro: distroless
            dockerfile: ./images/clustermesh-apiserver/Dockerfile
            image_name: clustermesh-apiserver
            platforms: linux/amd64,linux/arm64
            build_args: |
              CILIUM_RUNTIME_IMAGE=quay.io/isovalent-dev/cilium-runtime-wfi:a23cb179a0f1ca69f3e0a03d46f4748fbf02d204@sha256:ad3ab1a22177673568e44cbbcb4a09ea521fff7c9dd39ee1b6a4386846fe5acd

          - name: docker-plugin
            distro: scratch
            dockerfile: ./images/cilium-docker-plugin/Dockerfile
            image_name: docker-plugin
            platforms: linux/amd64,linux/arm64
            build_args: |
              CILIUM_RUNTIME_IMAGE=quay.io/isovalent-dev/cilium-runtime-wfi:a23cb179a0f1ca69f3e0a03d46f4748fbf02d204@sha256:ad3ab1a22177673568e44cbbcb4a09ea521fff7c9dd39ee1b6a4386846fe5acd

          - name: cilium-dnsproxy
            distro: chainguard
            dockerfile: ./enterprise/fqdn-proxy/images/cilium-dnsproxy/Dockerfile
            image_name: cilium-dnsproxy
            platforms: linux/amd64,linux/arm64
            build_args: |
              CILIUM_RUNTIME_IMAGE=quay.io/isovalent-dev/cilium-runtime-wfi:a23cb179a0f1ca69f3e0a03d46f4748fbf02d204@sha256:ad3ab1a22177673568e44cbbcb4a09ea521fff7c9dd39ee1b6a4386846fe5acd

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Cleanup Disk space in runner
        if: runner.name == 'ubuntu-24.04'
        uses: ./.github/actions/disk-cleanup

      - name: Set Environment Variables
        uses: ./.github/actions/set-env-variables

      - name: Setup docker volumes into /mnt
        # This allows us to make use of all available disk.
        shell: bash
        run: |
          sudo systemctl stop docker
          sudo mv /var/lib/docker/volumes /mnt/docker-volumes
          sudo ln -s /mnt/docker-volumes /var/lib/docker/volumes
          sudo systemctl start docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        # Disable GC entirely to avoid buildkit from GC caches.
        with:
          buildkitd-config-inline: |
            [worker.oci]
             gc=false

      - name: Login to quay.io for CI
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME_CI }}
          password: ${{ secrets.QUAY_PASSWORD_CI }}

      - name: Login to registry.redhat.io for CI
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: registry.redhat.io
          username: ${{ secrets.REDHAT_USERNAME_CI }}
          password: ${{ secrets.REDHAT_PASSWORD_CI }}

      - name: Getting image tag
        id: tag
        run: |
          if [ "${{ github.event.pull_request.head.sha }}" != "" ]; then
            sha=${{ github.event.pull_request.head.sha }}
          else
            sha=${{ github.sha }}
          fi
          echo sha=${sha} >> $GITHUB_OUTPUT

          tag=${sha}
          echo tag=${tag} >> $GITHUB_OUTPUT

          if [[ "${{ github.event_name == 'push' }}" == "true" ]]; then
            if [[ "${{ github.ref_name }}" == "${{ github.event.repository.default_branch }}" ]]; then
              floating_tag=latest
            else
              floating_tag="${{ github.ref_name }}"
              # Remove slashes from branch names
              floating_tag=${floating_tag##*/}
            fi
            echo floating_tag=${floating_tag} >> $GITHUB_OUTPUT
          fi

          normal_tag="quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/${{ matrix.image_name }}-ci:${tag}"
          race_tag="${normal_tag}-race"
          unstripped_tag="${normal_tag}-unstripped"
          extra_tags="--tag ${normal_tag}"

          if [ -n "${floating_tag}" ]; then
            floating_normal_tag="quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/${{ matrix.image_name }}-ci:${floating_tag}"
            extra_tags="${extra_tags} --tag ${floating_normal_tag}"
          fi

          if [[ "${{ github.event_name }}" == 'merge_group' || "${{ github.event_name }}" == 'push' ]]; then
            # Don't build race and unstripped images for merge_group or push events.
            race_tag=""
            unstripped_tag=""
          fi

          echo primary_tag=${normal_tag} >> $GITHUB_OUTPUT
          echo race_tag=${race_tag} >> $GITHUB_OUTPUT
          echo unstripped_tag=${unstripped_tag} >> $GITHUB_OUTPUT
          echo extra_tags=${extra_tags} >> $GITHUB_OUTPUT

      - name: Check for disk usage
        shell: bash
        run: |
          df -h

      # Load Golang cache build from GitHub
      - name: Restore Golang cache build from GitHub
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        id: go-cache
        with:
          path: /tmp/.cache/go
          key: ${{ runner.os }}-go-${{ matrix.name }}-cache-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.name }}-cache-

      - name: Check for disk usage
        shell: bash
        run: |
          df -h
          docker buildx du

      - name: Create cache directories if they don't exist
        if: ${{ steps.go-cache.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          mkdir -p /tmp/.cache/go

      # Import GitHub's cache build to docker cache
      - name: Copy ${{ matrix.name }} Golang cache to docker cache
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          provenance: false
          context: /tmp/.cache/go
          file: ./images/cache/Dockerfile
          push: false
          platforms: linux/amd64
          target: import-cache

      - name: Check for disk usage
        shell: bash
        run: |
          df -h
          docker buildx du

      - name: Check build constraints
        id: check
        run: |
          if [[ -z "${{ matrix.require-dir }}" ]] ||
             [[ -d "${{ matrix.require-dir }}" ]]; then
            echo build="true" >> $GITHUB_OUTPUT
          fi

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: CI Build ${{ matrix.name }} UBI
        if: ${{ steps.check.outputs.build != '' && matrix.distro == 'ubi' }}
        id: docker_build_ci_ubi
        shell: bash
        working-directory: ./enterprise/images
        run: |
          # shellcheck disable=SC2046
          export $(echo "${{ matrix.build_args }}" | grep -v "^[[:space:]]*#" | xargs)
          IMAGE_TAG=${{ steps.tag.outputs.tag }} \
          REGISTRIES=quay.io/${{ env.QUAY_ORGANIZATION_DEV }} \
          EXTRA_ARGS="${{ steps.tag.outputs.extra_tags }}" \
          make ${{ matrix.name }}-image

      - name: CI Build ${{ matrix.name }}
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        if: ${{ steps.check.outputs.build != '' && matrix.distro != 'ubi' }}
        id: docker_build_ci
        with:
          provenance: false
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: ${{ matrix.platforms }}
          tags: ${{ steps.tag.outputs.primary_tag }}
          target: release
          build-args: ${{ matrix.build_args }}

      - name: CI race detection Build ${{ matrix.name }}
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        id: docker_build_ci_detect_race_condition
        if: ${{ steps.check.outputs.build != '' && steps.tag.outputs.race_tag != '' && matrix.distro != 'ubi' }}
        with:
          provenance: false
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tag.outputs.race_tag }}
          target: release
          build-args: |
            BASE_IMAGE=quay.io/isovalent-dev/cilium-runtime-wfi:a23cb179a0f1ca69f3e0a03d46f4748fbf02d204@sha256:ad3ab1a22177673568e44cbbcb4a09ea521fff7c9dd39ee1b6a4386846fe5acd
            ${{ matrix.build_args }}
            MODIFIERS="LOCKDEBUG=1 RACE=1"

      - name: CI Unstripped Binaries Build ${{ matrix.name }}
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        id: docker_build_ci_unstripped
        if: ${{ steps.check.outputs.build != '' && steps.tag.outputs.unstripped_tag != '' && matrix.distro != 'ubi' }}
        with:
          provenance: false
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tag.outputs.unstripped_tag }}
          target: release
          build-args: |
            ${{ matrix.build_args }}
            MODIFIERS="NOSTRIP=1"

      - name: CI Build ${{ matrix.name }} digest
        id: docker_digest
        if: ${{ steps.check.outputs.build != '' }}
        shell: bash
        run: |
          digest=$(images/scripts/get-image-digest.sh "${{ steps.tag.outputs.primary_tag }}")
          echo digest=${digest} >> $GITHUB_OUTPUT

      - name: Generate SBOM, Sign, and Attest Main CI Image
        if: ${{ matrix.name != 'cilium-cli' && steps.check.outputs.build != '' }}
        uses: ./.github/actions/cosign
        with:
          image: "quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/${{ matrix.image_name }}-ci@${{ steps.docker_digest.outputs.digest }}"
          image_tag: "${{ steps.tag.outputs.primary_tag }}"
          sbom_name: "ci_${{ matrix.name }}_${{ matrix.distro }}_${{ steps.tag.outputs.tag }}"

      - name: Generate SBOM, Sign, and Attest Race Detection Image
        if: ${{ matrix.name != 'cilium-cli' && steps.docker_build_ci_detect_race_condition.outcome != 'skipped' }}
        uses: ./.github/actions/cosign
        with:
          image: "quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/${{ matrix.image_name }}-ci@${{ steps.docker_build_ci_detect_race_condition.outputs.digest }}"
          image_tag: "${{ steps.tag.outputs.race_tag }}"
          sbom_name: "ci_race_${{ matrix.name }}_${{ matrix.distro }}_${{ steps.tag.outputs.tag }}"
          install_cosign: 'false'

      - name: Generate SBOM, Sign, and Attest Unstripped Image
        if: ${{ matrix.name != 'cilium-cli' && steps.docker_build_ci_unstripped.outcome != 'skipped' }}
        uses: ./.github/actions/cosign
        with:
          image: "quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/${{ matrix.image_name }}-ci@${{ steps.docker_build_ci_unstripped.outputs.digest }}"
          image_tag: "${{ steps.tag.outputs.unstripped_tag }}"
          sbom_name: "ci_unstripped_${{ matrix.name }}_${{ matrix.distro }}_${{ steps.tag.outputs.tag }}"
          install_cosign: 'false'

      - name: CI Image Releases digests
        if: ${{ steps.check.outputs.build != '' }}
        shell: bash
        run: |
          mkdir -p image-digest/
          # shellcheck disable=SC2078
          if [ ${{ github.event_name == 'push' && !startsWith(github.ref_name, 'ft/') }} ]; then
            echo "quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/${{ matrix.image_name }}-ci:${{ steps.tag.outputs.floating_tag }}@${{ steps.docker_digest.outputs.digest }}" > image-digest/${{ matrix.image_name }}.txt
          fi
          echo "${{ steps.tag.outputs.primary_tag}}@${{ steps.docker_digest.outputs.digest }}" >> image-digest/${{ matrix.image_name }}.txt

      # Upload artifact digests
      - name: Upload artifact digests
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: ${{ steps.check.outputs.build != '' }}
        with:
          name: image-digest ${{ matrix.image_name }}
          path: image-digest
          retention-days: 1

      - name: Check for disk usage
        if: ${{ always() }}
        shell: bash
        run: |
          df -h

  image-digests:
    if: ${{ always() }}
    name: Display Digests
    runs-on: ubuntu-24.04
    needs: build-and-push-prs
    steps:
      - name: Downloading Image Digests
        shell: bash
        run: |
          mkdir -p image-digest/

      - name: Download digests of all images built
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: image-digest/
          pattern: "*image-digest *"

      - name: Image Digests Output
        shell: bash
        run: |
          cd image-digest/
          find -type f | sort | xargs -d '\n' cat

  push-chart:
    name: Push dev chart
    needs: build-and-push-prs
    permissions:
      contents: read
      pull-requests: read
      statuses: write
    uses: ./.github/workflows/push-chart-ci.yaml
    with:
      checkout_ref: ${{ needs.build-and-push-prs.outputs.sha }}
      image_tag: ${{ needs.build-and-push-prs.outputs.sha }}
    secrets: inherit

  pre-comment:
    # Avoid running the "Trigger CI from renovate PRs" environment if we don't need to.
    name: Pre-Comment
    needs: build-and-push-prs
    runs-on: ubuntu-24.04
    if: ${{
         github.event_name == 'pull_request' &&
         github.event.pull_request.user.login == vars.RENOVATE_BOT_USERNAME
        }}
    steps:
    - name: Debug
      run: |
        echo ${{ github.event.pull_request.user.login }}
        echo ${{ github.event_name }}

  comment:
    name: Post test comment for Renovate PRs after images built
    runs-on: ubuntu-24.04
    needs: pre-comment
    environment: "Trigger CI from renovate PRs"
    if: ${{
         github.event_name == 'pull_request' &&
         github.event.pull_request.user.login == vars.RENOVATE_BOT_USERNAME
        }}
    steps:
      - name: Generate Github App Token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: generate-token
        with:
          app-id: ${{ secrets.AUTO_COMMENT_BOT_APP_ID }}
          private-key: ${{ secrets.AUTO_COMMENT_BOT_PEM }}
      - name: Post /test comment
        env:
          TOKEN: ${{ steps.generate-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo ${TOKEN} | gh auth login --with-token
          gh pr --repo ${GITHUB_REPOSITORY} comment ${PULL_REQUEST_NUMBER} --body "/test"
