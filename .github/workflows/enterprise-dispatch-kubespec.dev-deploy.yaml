---
name: Trigger kubespec.dev @ Isovalent CRD Deployments
on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+-*

permissions:
  id-token: write

jobs:
  dispatch:
    name: Dispatch kubespec.dev workflow event
    runs-on:
      labels: extra-small
      group: isovalent-wait-runners
    steps:
      - name: Get Vault Credentials
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          url: ${{ vars.VAULT_URL }}
          method: jwt
          namespace: ${{ vars.VAULT_NAMESPACE }}
          secrets: |
            secret/data/release-mgmt/${{ github.repository_owner }} github_app_pem | GH_WF_DISPATCH_APP_PEM;
            secret/data/release-mgmt/${{ github.repository_owner }} github_app_id | GH_WF_DISPATCH_APP_ID;

      - name: Get Token for kubespec.dev
        id: generate-token
        uses: actions/create-github-app-token@df432ceedc7162793a195dd1713ff69aefc7379e # v2.0.6
        with:
          app-id: ${{ env.GH_WF_DISPATCH_APP_ID }}
          private-key: ${{ env.GH_WF_DISPATCH_APP_PEM }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ vars.CRDS_TARGET_REPO_NAME }}

      - name: Trigger kubespec.dev CRD Deployments
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          script: |
            const { repo, owner } = context.repo;
            const target_repo = '${{ vars.CRDS_TARGET_REPO_NAME }}';
            const workflow_id = '${{ vars.CRDS_TARGET_REPO_WORKFLOW_NAME }}';
            const default_branch = '${{ vars.DEFAULT_BRANCH }}';

            const response = await github.rest.actions.createWorkflowDispatch({
              owner: owner,
              repo: target_repo,
              workflow_id: workflow_id,
              ref: default_branch,
            });
