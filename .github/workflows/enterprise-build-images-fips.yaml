name: FIPs Image Build

on:
  push:
    branches:
      - main-ce
      - ft/main-ce/**
      - v1.[0-9]+-ce
    tags:
      - v[0-9]+.[0-9]+.[0-9]+-*


permissions:
  # To be able to access the repository with `actions/checkout`
  contents: read
  # Required to generate OIDC tokens for `sigstore/cosign-installer` authentication
  id-token: write

env:
  # renovate: datasource=golang-version depName=go
  go_version: 1.23.2

jobs:
  sanity-checks:
    timeout-minutes: 10
    name: Sanity Checks
    runs-on: ubuntu-24.04
    steps:
      - name: Sanity checks
        run: |
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "Sanity check failed, should only build on pushes"
            exit 1
          fi

          if [ "${{ github.repository }}" != "isovalent/cilium" ]; then
            echo "Sanity check failed, should only run in isovalent/cilium"
            exit 1
          fi

  build-and-push:
    timeout-minutes: 45
    name: Build and Push Images
    environment: ${{ startsWith(github.event.ref, 'refs/tags/v') && 'release' || '' }}
    runs-on: ubuntu-24.04
    needs: sanity-checks
    strategy:
      matrix:
        include:
            # Name of the image.
          - name: cilium
            # Path to the image's Dockerfile
            dockerfile: ./images/cilium/Dockerfile
            # Space separated list of binaries to verify
            # usage of the correct crypto libraries.
            binaries: "cilium-agent"

          - name: operator-aws
            dockerfile: ./images/operator/Dockerfile
            binaries: "cilium-operator-aws"

          - name: operator-azure
            dockerfile: ./images/operator/Dockerfile
            binaries: "cilium-operator-azure"

          - name: operator-alibabacloud
            dockerfile: ./images/operator/Dockerfile
            binaries: "cilium-operator-alibabacloud"

          - name: operator-generic
            dockerfile: ./images/operator/Dockerfile
            binaries: "cilium-operator-generic"

    steps:
      - name: Checkout main branch to access local actions
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false
          sparse-checkout: |
            .github/actions

      - name: Cleanup Disk space in runner
        uses: ./.github/actions/set-env-variables

      - name: Set Environment Variables
        uses: ./.github/actions/set-env-variables

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

        # Required outputs for the 'tags' step:
        # - target: The name of the image that is being built (ie cilium, operator-generic)
        # - base_image_name: The image name, including the registry and org, without any tags.
        # - tag: A single image tag to uniquely identiy the build.
        # - image_tag_primary: Full image name, including a tag, for the final manifest list.
        # - image_tag_secondary: A second full image name, including a tag, for the final manifest list. Can be blank.
        # - image_tag_amd64: Full image name, including a tag, for the temporary amd64 build.
        # - image_tag_arm64: Full image name, including a tag, for the temporary arm64 build.

      - name: Get image information based on the trigger
        id: tags
        run: |
          # Ensure that this logic is synced with the logic in the next job!
          if [ "${{ startsWith(github.event.ref, 'refs/tags/v') }}" == "true" ]; then
            target=${{ matrix.name }}
            echo target=$target >> $GITHUB_OUTPUT

            base_image_name="quay.io/${{ env.QUAY_ORGANIZATION }}/${target}"
            echo base_image_name=$base_image_name >> $GITHUB_OUTPUT

            tag=${GITHUB_REF##*/}-fips
            echo tag=$tag >> $GITHUB_OUTPUT

            # Need one for each platform and a generic one for the manifest at the end
            echo "image_tag_primary=${base_image_name}:${tag}" >> $GITHUB_OUTPUT
            echo image_tag_secondary="" >> $GITHUB_OUTPUT
            echo "image_tag_amd64=${base_image_name}:${tag}-amd64" >> $GITHUB_OUTPUT
            echo "image_tag_arm64=${base_image_name}:${tag}-arm64" >> $GITHUB_OUTPUT
          else
            # Create two image tags: one 'floating' tag which is based on the stable branch name
            # or "latest" for main-ce, and a standard tag which contains the commit SHA.
            target=${{ matrix.name }}-ci
            echo target=$target >> $GITHUB_OUTPUT

            base_image_name="quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/${target}"
            echo base_image_name=$base_image_name >> $GITHUB_OUTPUT

            tag=${{ github.sha }}-fips
            echo tag=$tag >> $GITHUB_OUTPUT

            if [ "${{ github.event.ref_name }}" == "main-ce" ]; then
              floating_tag="latest-fips"
            else
              ft="${{ github.ref_name }}"
              # Replace all occurrences of "/" with "-"
              floating_tag="${ft//\//-}-fips"
            fi

            # Sanity check
            if [ "${floating_tag}" == "" ]; then
              echo "Sanity check failed, floating tag is empty"
              exit 1
            fi

            echo "image_tag_primary=${base_image_name}:${tag}" >> $GITHUB_OUTPUT
            echo "image_tag_secondary=${base_image_name}:${floating_tag}" >> $GITHUB_OUTPUT
            echo "image_tag_amd64=${base_image_name}:${tag}-amd64" >> $GITHUB_OUTPUT
            echo "image_tag_arm64=${base_image_name}:${tag}-arm64" >> $GITHUB_OUTPUT
          fi

      - name: Print image tag information
        run: |
          echo "base_image_name"
          echo "${{ steps.tags.outputs.base_image_name }}"
          echo "tag"
          echo "${{ steps.tags.outputs.tag }}"
          echo "image_tag_primary"
          echo "${{ steps.tags.outputs.image_tag_primary }}"
          echo "image_tag_secondary"
          echo "${{ steps.tags.outputs.image_tag_secondary }}"
          echo "image_tag_amd64"
          echo "${{ steps.tags.outputs.image_tag_amd64 }}"
          echo "image_tag_arm64"
          echo "${{ steps.tags.outputs.image_tag_arm64 }}"

      - name: Login to quay.io - release
        if: ${{ startsWith(github.event.ref, 'refs/tags/v') }}
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME_RELEASE_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD_RELEASE_PASSWORD }}

      - name: Login to quay.io - non-release
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        if: ${{ ! startsWith(github.event.ref, 'refs/tags/') }}
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME_CI }}
          password: ${{ secrets.QUAY_PASSWORD_CI }}

      - name: Install Go
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version: ${{ env.go_version }}

      - name: Checkout Source Code
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          persist-credentials: false

      - name: Fail if fips.go is not present
        run: |
          if ! [ -f ./enterprise/fips/fips.go ]; then
            exit 1
          fi

      # This workflow builds each platform as part of separate steps and then merges the
      # built images into a manifest before pushing. This is done for two reasons:
      # 1. Before pushing, it must be confirmed that the crypto libraries the images
      #    are using are correct.
      # 2. Before pushing, an SBOM must be created and attached to each individual image.
      # TODO: Is there a way to parallelize the individual steps below before merging?

      - name: Build ${{ matrix.name }} - amd64
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        id: docker_build_amd64_pre
        with:
          provenance: false
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.image_tag_amd64 }}
          target: release
          build-args: |
            OPERATOR_VARIANT=${{ matrix.name }}
            MODIFIERS=FIPS=1\ NOSTRIP=1

        # TODO: arm64 builds are currently broken for the cilium-operator.
        # See issue cilium/cilium#35324.

      - name: Build ${{ matrix.name }} - arm64
        if: ${{ false }}
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        id: docker_build_arm64_pre
        with:
          provenance: false
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          platforms: linux/arm64
          tags: ${{ steps.tags.outputs.image_tag_arm64 }}
          target: release
          build-args: |
            OPERATOR_VARIANT=${{ matrix.name }}
            MODIFIERS=FIPS=1\ NOSTRIP=1

      - name: Ensure binaries are using the correct crypto libraries
        shell: bash
        # Use /tmp so we don't touch the build context.
        working-directory: /tmp
        run: |
          set -xeo pipefail
          # "catch exit status 1" grep wrapper
          # https://stackoverflow.com/questions/6550484/prevent-grep-returning-an-error-when-input-doesnt-match/49627999#49627999
          c1grep() { grep "$@" || test $? = 1; }

          image_base="${{ steps.tags.outputs.base_image_name }}"
          # When the images are loaded into the local docker daemon without being pushed, the
          # digests aren't attached. This means we need to reference them by their tag.
          # In this step.
          image_amd64="${{ steps.tags.outputs.image_tag_amd64 }}"
          # image_arm64="${{ steps.tags.outputs.image_tag_arm64 }}"

          for image in "${image_amd64}"; do  # "${image_arm64}"; do
            if ! docker image inspect $image; then
              echo "Image ${image} was not put into local store"
              exit 1
            fi
            container_name=$(uuidgen | cut -d'-' -f1)

            mkdir -p ./binaries
            touch ./symbols.txt
            docker create --name $container_name $image
            for binary in ${{ matrix.binaries }}; do
              docker cp $container_name:/usr/bin/$binary ./binaries/$binary
              echo "$binary" >> ./symbols.txt
              go tool nm ./binaries/$binary | grep -E "sig\.(BoringCrypto|FIPSOnly|StandardCrypto)" >> ./symbols.txt
            done
            docker rm $container_name

            cat ./symbols.txt

            nstandard="$(cat ./symbols.txt | c1grep 'sig.StandardCrypto' | wc -l)"
            nboring="$(cat ./symbols.txt | c1grep 'sig.BoringCrypto' | wc -l)"
            nfips="$(cat ./symbols.txt | c1grep 'sig.FIPSOnly' | wc -l)"

            if [ "${nstandard}" != "0" ]; then
              echo "Fail for image ${image}, standard crypto is used in ${nstandard} binaries"
              exit 1
            fi

            if [ "${nboring}" != "${nfips}" ]; then
              echo "Fail for image ${image}, mismatch between number of FIPSOnly binaries and BoringCrypto binaries: ${nfips} != ${nboring}"
              exit 1
            fi

          done

       # Now that the images have been checked, we can push them. This will populate the image's
       # digest, which is required by cosign for signing.

      - name: Push ${{ matrix.name }} - amd64
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        id: docker_build_amd64
        with:
          provenance: false
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.image_tag_amd64 }}
          target: release
          build-args: |
            OPERATOR_VARIANT=${{ matrix.name }}
            MODIFIERS=FIPS=1\ NOSTRIP=1

        # TODO: arm64 builds are currently broken for the cilium-operator.
        # See issue cilium/cilium#35324.

      - name: Push ${{ matrix.name }} - arm64
        if: ${{ false }}
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        id: docker_build_arm64
        with:
          provenance: false
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/arm64
          tags: ${{ steps.tags.outputs.image_tag_arm64 }}
          target: release
          build-args: |
            OPERATOR_VARIANT=${{ matrix.name }}
            MODIFIERS=FIPS=1\ NOSTRIP=1

      - name: Ensure image digest didn't change
        run: |
          if [ "${{ steps.docker_build_amd64_pre.outputs.digest }}" != "${{ steps.docker_build_amd64.outputs.digest }}" ]; then
            echo "Sanity check failed, amd64 image digest changed"
            exit 1
          fi

          # if [ "${{ steps.docker_build_arm64_pre.outputs.digest }}" != "${{ steps.docker_build_arm64.outputs.digest }}" ]; then
          #   echo "Sanity check failed, amd64 image digest changed"
          #   exit 1
          # fi

      - name: Install Cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Sign Container Images
        run: |
          cosign sign -y ${{ steps.tags.outputs.base_image_name }}@${{ steps.docker_build_amd64.outputs.digest }}
          # cosign sign -y ${{ steps.tags.outputs.base_image_name }}@${{ steps.docker_build_arm64.outputs.digest }}

      - name: Generate SBOM - amd64
        uses: anchore/sbom-action@61119d458adab75f756bc0b9e4bde25725f86a7a # v0.17.2
        with:
          artifact-name: sbom_${{ steps.tags.outputs.target }}_${{ steps.tags.outputs.tag }}_amd64.spdx.json
          output-file: ./sbom_${{ steps.tags.outputs.target }}_${{ steps.tags.outputs.tag }}_amd64.spdx.json
          image: ${{ steps.tags.outputs.image_tag_amd64 }}
          syft-version: v1.4.1
          upload-release-assets: false

      - name: Generate SBOM - arm64
        if: ${{ false }}
        uses: anchore/sbom-action@61119d458adab75f756bc0b9e4bde25725f86a7a # v0.17.2
        with:
          artifact-name: sbom_${{ steps.tags.outputs.target }}_${{ steps.tags.outputs.tag }}_arm64.spdx.json
          output-file: ./sbom_${{ steps.tags.outputs.target }}_${{ steps.tags.outputs.tag }}_arm64.spdx.json
          image: ${{ steps.tags.outputs.image_tag_arm64 }}
          syft-version: v1.4.1
          upload-release-assets: false

      - name: Attach SBOM attestation to container images
        run: |
          cosign attest -r -y --predicate sbom_${{ steps.tags.outputs.target }}_${{ steps.tags.outputs.tag }}_amd64.spdx.json --type spdxjson ${{ steps.tags.outputs.base_image_name }}@${{ steps.docker_build_amd64.outputs.digest }}
          # cosign attest -r -y --predicate sbom_${{ steps.tags.outputs.target }}_${{ steps.tags.outputs.tag }}_arm64.spdx.json --type spdxjson ${{ steps.tags.outputs.base_image_name }}@${{ steps.docker_build_arm64.outputs.digest }}

      - name: Create manifest
        id: docker_manifest
        shell: bash
        run: |
          set -xeo pipefail

          image_tags="-t ${{ steps.tags.outputs.image_tag_primary }}"

          if [ ! -z "${{ steps.tags.outputs.image_tag_secondary }}" ]; then
            image_tags+=" -t ${{ steps.tags.outputs.image_tag_secondary }}"
          fi

          docker buildx imagetools create \
            $image_tags \
            ${{ steps.tags.outputs.base_image_name }}@${{ steps.docker_build_amd64.outputs.digest }}  # \
            # ${{ steps.tags.outputs.base_image_name }}@${{ steps.docker_build_arm64.outputs.digest }}

          # For some reason, if you just use {{ .Manifest.Digest }} in the go template, it'll just print
          # its normal text output
          output="$(docker buildx imagetools inspect ${{ steps.tags.outputs.image_tag_primary }} --format 'digest={{ .Manifest.Digest }}')"

          echo $output >> $GITHUB_OUTPUT

      - name: Image Release Digest
        shell: bash
        run: |
          mkdir -p image-digest/
          job_name=${{ matrix.name }}
          job_name_capital=${job_name^^}
          job_name_underscored=${job_name_capital//-/_}
          echo "${job_name_underscored}_DIGEST := \"${{ steps.docker_manifest.outputs.digest }}\"" > image-digest/makefile-digest.txt

          echo "### ${{ matrix.name }}" > image-digest/${{ matrix.name }}.txt
          echo "" >> image-digest/${{ matrix.name }}.txt
          echo "\`${{ steps.tags.outputs.image_tag_primary }}@${{ steps.docker_manifest.outputs.digest }}\`" >> image-digest/${{ matrix.name }}.txt
          echo "" >> image-digest/${{ matrix.name }}.txt

      # Upload artifact digests
      - name: Upload artifact digests
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: image-digest ${{ matrix.name }}
          path: image-digest
          retention-days: 10

  image-digests:
    name: Display Digests
    runs-on: ubuntu-24.04
    needs: build-and-push
    steps:
      - name: Getting image tag
        id: tag
        run: |
          # Ensure that this logic is synced with the logic in the previous job!
          if [ "${{ startsWith(github.event.ref, 'refs/tags/v') }}" == "true" ]; then
            tag=${GITHUB_REF##*/}-fips
            echo tag=$tag >> $GITHUB_OUTPUT
          else
            tag=${{ github.sha }}-fips
            echo tag=$tag >> $GITHUB_OUTPUT
          fi
      - name: Downloading Image Digests
        shell: bash
        run: |
          mkdir -p image-digest/

      - name: Download digests of all images built
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          path: image-digest/
          pattern: "*image-digest *"

      - name: Image Digests Output
        shell: bash
        run: |
          cd image-digest/
          echo "## Docker Manifests" > ../image-digest-output.txt
          echo "" >> ../image-digest-output.txt
          find -type f -not -name "makefile-digest.txt" | sort | xargs -d '\n' cat >> ../image-digest-output.txt

      - name: Image Makefile Digests
        shell: bash
        run: |
          cd image-digest/
          echo "# File generated by .github/workflows/enterprise-build-images-releases-fips.yaml; DO NOT EDIT." > ../Makefile.digests
          echo "# Copyright (C) Isovalent, Inc. - All Rights Reserved." >> ../Makefile.digests
          echo "" >> ../Makefile.digests
          find -type f  -name "makefile-digest.txt" | sort | xargs -d '\n' awk '{print "export " $0}' >> ../Makefile.digests

      # Upload artifact digests
      - name: Upload artifact digests
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: image-digest-output.txt-${{ steps.tag.outputs.tag }}
          path: image-digest-output.txt
          retention-days: 10

      # Upload artifact digests
      - name: Upload artifact digests
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: Makefile.digests-${{ steps.tag.outputs.tag }}
          path: Makefile.digests
          retention-days: 10
