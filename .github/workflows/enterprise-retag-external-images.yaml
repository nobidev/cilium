name: Enterprise External Image retagging

on:
  workflow_dispatch: {}
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+-*

permissions:
  # To be able to access the repository with `actions/checkout`
  contents: read
  # Required to generate OIDC tokens for `sigstore/cosign-installer` authentication
  id-token: write

jobs:
  build-and-push:

    timeout-minutes: 45
    name: Retag and Push Images
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && matrix.tag == 'preserve-tag')
    strategy:
      max-parallel: 4
      matrix:
        tag:
          - preserve-tag
          - retag-version
        image:
          - startup-script
          - cilium-envoy
          - busybox
          - spire-agent
          - spire-server
          - certgen
          - hubble-ui
          - hubble-ui-backend
        include:
          - image: startup-script
            destination-repo: quay.io/isovalent/startup-script
            source-repo: quay.io/cilium/startup-script
            yq-path: nodeinit.image
          - image: cilium-envoy
            destination-repo: quay.io/isovalent/cilium-envoy
            source-repo: quay.io/cilium/cilium-envoy
            yq-path: envoy.image
          - image: busybox
            destination-repo: quay.io/isovalent/busybox
            source-repo: docker.io/library/busybox
            yq-path: authentication.mutual.spire.install.initImage
          - image: spire-agent
            destination-repo: quay.io/isovalent/spire-agent
            source-repo: ghcr.io/spiffe/spire-agent
            yq-path: authentication.mutual.spire.install.agent.image
          - image: spire-server
            destination-repo: quay.io/isovalent/spire-server
            source-repo: ghcr.io/spiffe/spire-server
            yq-path: authentication.mutual.spire.install.server.image
          - image: certgen
            destination-repo: quay.io/isovalent/certgen
            source-repo: quay.io/cilium/certgen
            yq-path: certgen.image
          - image: hubble-ui
            destination-repo: quay.io/isovalent/hubble-ui
            source-repo: quay.io/cilium/hubble-ui
            yq-path: hubble.ui.frontend.image
          - image: hubble-ui-backend
            destination-repo: quay.io/isovalent/hubble-ui-backend
            source-repo: quay.io/cilium/hubble-ui-backend
            yq-path: hubble.ui.backend.image

    steps:
      - name: Checkout main branch to access local actions
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Set Environment Variables
        uses: ./.github/actions/set-env-variables

      - name: Checkout Source Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install Skopeo
        uses: warjiang/setup-skopeo@71776e03c10d767c04af8924fe5a67763f9b3d34 # v0.1.3

      - name: Login to quay.io
        run: skopeo login -u ${{ secrets.QUAY_USERNAME_RELEASE_USERNAME }} -p ${{ secrets.QUAY_PASSWORD_RELEASE_PASSWORD }} quay.io

      - name: Get Tag of Docker Image
        id: image-tag
        uses: mikefarah/yq@8bf425b4d1344db7cd469a8d10a390876e0c77fd # v4.45.1
        with:
          cmd: yq eval '.${{ matrix.yq-path }}.tag' install/kubernetes/cilium/values.yaml

      - name: Get Digest of Docker Image
        id: image-digest
        uses: mikefarah/yq@8bf425b4d1344db7cd469a8d10a390876e0c77fd # v4.45.1
        with:
          cmd: yq eval '.${{ matrix.yq-path }}.digest' install/kubernetes/cilium/values.yaml

      - name: Determine destination tags
        id: destination-tag
        run: |
          if [[ "${{ matrix.tag }}" == "preserve-tag" ]]; then
            DESTINATION_TAG=${{ steps.image-tag.outputs.result }}
          else
            DESTINATION_TAG=$(cat VERSION)
          fi
          echo "retagging as ${{ matrix.destination-repo }}:${DESTINATION_TAG}"
          echo  "result=${DESTINATION_TAG}" >> $GITHUB_OUTPUT


      - name: Copy Image from Source to Target
        run: |
          skopeo copy --all --preserve-digests docker://${{ matrix.source-repo }}:${{ steps.image-tag.outputs.result }} \
            docker://${{ matrix.destination-repo }}:${{ steps.destination-tag.outputs.result }}

      - name: Login to quay.io
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME_RELEASE_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD_RELEASE_PASSWORD }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Sign Container Image
        run: cosign sign -y ${{ matrix.destination-repo }}@${{ steps.image-digest.outputs.result }}

      - name: Generate SBOM
        uses: anchore/sbom-action@df80a981bc6edbc4e220a492d3cbe9f5547a6e75 # v0.17.9
        with:
          artifact-name: sbom_${{ matrix.image }}_${{ steps.destination-tag.outputs.result }}.spdx.json
          output-file: ./sbom_${{ matrix.image }}_${{ steps.destination-tag.outputs.result }}.spdx.json
          image: ${{ matrix.destination-repo }}:${{ steps.destination-tag.outputs.result }}
          upload-release-assets: false

      - name: Attach SBOM attestation to container image
        run: |
          cosign attest -r -y --predicate sbom_${{ matrix.image }}_${{ steps.destination-tag.outputs.result }}.spdx.json \
            --type spdxjson ${{ matrix.destination-repo }}@${{ steps.image-digest.outputs.result }}

      - name: Image Release Digest
        shell: bash
        run: |
          mkdir -p image-digest/
          job_name=${{ matrix.image }}
          job_name_capital=${job_name^^}
          job_name_underscored=${job_name_capital//-/_}
          echo "${job_name_underscored}_DIGEST := \"${{ steps.image-digest.outputs.result }}\"" > image-digest/makefile-digest.txt
          echo "### ${{ matrix.image }}" > image-digest/${{ matrix.image }}.txt
          echo "" >> image-digest/${{ matrix.image }}.txt
          echo "\`quay.io/isovalent/${{ matrix.image }}:${{ steps.destination-tag.outputs.result }}@${{ steps.image-digest.outputs.result }}\`" >> image-digest/${{ matrix.image }}.txt
          echo "" >> image-digest/${{ matrix.image }}.txt

      # Upload artifact digests
      - name: Upload artifact digests
        if: ${{ matrix.tag == 'preserve-tag' }}
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: image-digest ${{ matrix.image }}
          path: image-digest
          retention-days: 10

  image-digests:
    name: Display Digests
    runs-on: ubuntu-24.04
    needs: build-and-push
    steps:
      - name: Getting image tag
        id: tag
        run: |
          echo tag=${GITHUB_REF##*/} >> $GITHUB_OUTPUT

      - name: Downloading Image Digests
        shell: bash
        run: |
          mkdir -p image-digest/

      - name: Download digests of all images built
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          path: image-digest/
          pattern: "*image-digest *"

      - name: Image Digests Output
        shell: bash
        run: |
          cd image-digest/
          echo "## Docker Manifests" > ../image-digest-output.txt
          echo "" >> ../image-digest-output.txt
          find -type f -regex ".*image-digest .*" -not -name "makefile-digest.txt" | sort | xargs -d '\n' cat >> ../image-digest-output.txt

      - name: Image Makefile Digests
        shell: bash
        run: |
          cd image-digest/
          echo "# File generated by .github/workflows/build-images-releases.yaml; DO NOT EDIT." > ../Makefile.digests
          echo "# Copyright "$(date +'%Y')" Authors of Cilium" >> ../Makefile.digests
          echo "# SPDX-License-Identifier: Apache-2.0" >> ../Makefile.digests
          echo "" >> ../Makefile.digests
          find -type f  -name "makefile-digest.txt" | sort | xargs -d '\n' awk '{print "export " $0}' >> ../Makefile.digests

      # Upload artifact digests
      - name: Upload artifact digests
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: image-digest-output.txt-${{ steps.tag.outputs.tag }}
          path: image-digest-output.txt

      # Upload artifact digests
      - name: Upload artifact digests
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: Makefile.digests-${{ steps.tag.outputs.tag }}
          path: Makefile.digests
