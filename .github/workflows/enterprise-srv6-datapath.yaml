name: Enterprise SRv6 Datapath (ci-srv6-datapath)

# Any change in triggers needs to be reflected in the concurrency group.
on:
  workflow_dispatch:
    inputs:
      PR-number:
        description: "Pull request number."
        required: true
      context-ref:
        description: "Context in which the workflow runs. If PR is from a fork, will be the PR target branch (general case). If PR is NOT from a fork, will be the PR branch itself (this allows committers to test changes to workflows directly from PRs)."
        required: true
      SHA:
        description: "SHA under test (head of the PR branch)."
        required: true
      extra-args:
        description: "[JSON object] Arbitrary arguments passed from the trigger comment via regex capture group. Parse with 'fromJson(inputs.extra-args).argName' in workflow."
        required: false
        default: '{}'
  # Run every 6 hours
  schedule:
    - cron: '0 5/6 * * *'

# By specifying the access of one of the scopes, all of those that are not
# specified are set to 'none'.
permissions:
  # Required by the telemetry collection step
  actions: read
  # To be able to access the repository with actions/checkout
  contents: read
  # To allow retrieving information from the PR API
  pull-requests: read
  # To be able to set commit status
  statuses: write

concurrency:
  # Structure:
  # - Workflow name
  # - Event type
  # - A unique identifier depending on event type:
  #   - schedule: SHA
  #   - workflow_dispatch: PR number
  #
  # This structure ensures a unique concurrency group name is generated for each
  # type of testing, such that re-runs will cancel the previous run.
  group: |
    ${{ github.workflow }}
    ${{ github.event_name }}
    ${{
      (github.event_name == 'schedule' && github.sha) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.PR-number)
    }}
  cancel-in-progress: true

env:
  srv6_datapath_test: enterprise/test/srv6/datapath-test.sh

jobs:
  commit-status-start:
    name: Commit Status Start
    runs-on: ubuntu-24.04
    steps:
      - name: Set initial commit status
        uses: myrotvorets/set-commit-status-action@3730c0a348a2ace3c110851bed53331bc6406e9f # v2.0.1
        with:
          sha: ${{ inputs.SHA || github.sha }}

  wait-for-images:
    name: Wait for images
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout context ref (trusted)
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ inputs.context-ref || github.sha }}
          persist-credentials: false
      - name: Wait for images
        uses: ./.github/actions/wait-for-images
        with:
          SHA: ${{ inputs.SHA || github.sha }}
          images: cilium-ci operator-generic-ci hubble-relay-ci

  enterprise-srv6-datapath-test:
    needs: [wait-for-images]
    name: Enterprise SRv6 Datapath Test
    runs-on: ubuntu-latest-4cores-16gb
    timeout-minutes: 60
    env:
      job_name: 'Enterprise SRv6 Datapath Test'

    strategy:
      fail-fast: false
      max-parallel: 16
      matrix:
        include:
          - name: '1'
            # renovate: datasource=docker depName=quay.io/lvh-images/kind
            kernel: '5.15-20251008.075427'
            encap-mode: 'srh' # reduced not supported on kernels below 6.0
            sid-manger-enabled: 'true'

          - name: '2'
            # renovate: datasource=docker depName=quay.io/lvh-images/kind
            kernel: '6.1-20251008.075427'
            encap-mode: 'reduced'
            sid-manger-enabled: 'true'

          - name: '3'
            # renovate: datasource=docker depName=quay.io/lvh-images/kind
            kernel: '6.6-20251008.075427'
            encap-mode: 'reduced'
            sid-manger-enabled: 'false'

    steps:
      - name: Collect Workflow Telemetry
        uses: catchpoint/workflow-telemetry-action@94c3c3d9567a0205de6da68a76c428ce4e769af1 # v2.0.0
        with:
          comment_on_pr: false

      - name: Checkout context ref (trusted)
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ inputs.context-ref || github.sha }}
          persist-credentials: false

      - name: Set Environment Variables
        uses: ./.github/actions/set-env-variables

      - name: Get Cilium's default values
        id: default_vars
        uses: ./.github/actions/helm-default
        with:
          image-tag: ${{ inputs.SHA || github.sha }}
          chart-dir: ./untrusted/install/kubernetes/cilium

      - name: Set up job variables
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHA="${{ inputs.SHA }}"
          else
            SHA="${{ github.sha }}"
          fi

          CILIUM_INSTALL_DEFAULTS="${{ steps.default_vars.outputs.cilium_install_defaults }} \
            --nodes-without-cilium \
            --helm-set=autoDirectNodeRoutes=true \
            --helm-set=bpf.masquerade=false \
            --helm-set=devices='{eth+}' \
            --helm-set=endpointRoutes.enabled=true \
            --helm-set=kubeProxyReplacement=true \
            --helm-set=routingMode=native \
            --helm-set=ipam.mode=cluster-pool \
            --helm-set=ipam.operator.clusterPoolIPv4PodCIDRList=\"{10.244.0.0/16}\" \
            --helm-set=ipam.operator.clusterPoolIPv4MaskSize=24 \
            --helm-set=ipam.operator.clusterPoolIPv6PodCIDRList=\"{fd00:10:244::/48}\" \
            --helm-set=ipam.operator.clusterPoolIPv6MaskSize=64 \
            --helm-set=k8s.requireIPv4PodCIDR=true \
            --helm-set=k8s.requireIPv6PodCIDR=true \
            --helm-set=ipv4NativeRoutingCIDR=10.244.0.0/16 \
            --helm-set=ipv6NativeRoutingCIDR=fd00:10:244::/48 \
            --helm-set=ipv6.enabled=true \
            --helm-set=enterprise.srv6.enabled=true \
            --helm-set=enterprise.srv6.encapMode=${{ matrix.encap-mode }} \
            --helm-set=enterprise.srv6.locatorPoolEnabled=${{ matrix.sid-manger-enabled }} \
            --helm-set=enterprise.featureGate.strict=true \
            --helm-set='enterprise.featureGate.approved={SRv6,DatapathIPModeDualStack,ClusterMeshPhantomServices}' \
          "

          echo sha=${SHA} >> $GITHUB_OUTPUT
          echo cilium_install_defaults=${CILIUM_INSTALL_DEFAULTS} >> $GITHUB_OUTPUT

      - name: Install Cilium CLI
        uses: cilium/cilium-cli@024e340cca1465e2a6336521f12370c7ca58c59a # v0.18.7
        with:
          skip-build: ${{ env.CILIUM_CLI_SKIP_BUILD }}
          image-repo: ${{ env.CILIUM_CLI_IMAGE_REPO }}
          image-tag: ${{ steps.vars.outputs.sha }}
          repository: ${{ env.CILIUM_CLI_RELEASE_REPO }}
          release-version: ${{ env.CILIUM_CLI_VERSION }}

      - name: Provision K8s on LVH VM
        uses: ./.github/actions/lvh-kind
        with:
          test-name: srv6-datapath
          kernel: ${{ matrix.kernel }}
          kind-params: '"" 2 "" "" none dual'
          kind-image: ${{ env.KIND_K8S_IMAGE }}

      # Warning: since this is a privileged workflow, subsequent workflow job
      # steps must take care not to execute untrusted code.
      - name: Checkout pull request branch (NOT TRUSTED)
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ steps.vars.outputs.sha }}
          persist-credentials: false
          path: untrusted
          sparse-checkout: |
            install/kubernetes/cilium

      - name: Install Cilium
        shell: bash
        run: |
          # label node without cilium - used in connectivity tests
          kubectl patch node kind-worker2 --type=json -p='[{"op":"add","path":"/metadata/labels/cilium.io~1no-schedule","value":"true"}]'

          export CILIUM_CLI_MODE=helm
          cilium install ${{ steps.vars.outputs.cilium_install_defaults }}

          cilium status --wait
          kubectl get pods --all-namespaces -o wide
          kubectl -n kube-system exec daemonset/cilium -- cilium-dbg status

      - name: Run SRv6 datapath tests
        uses: cilium/little-vm-helper@01debd6cb7e5514cfdb4a33e776bdc647bc5306e # v0.0.27
        with:
          provision: 'false'
          cmd: |
            set -eux

            export SRV6_ENCAP_MODE=${{ matrix.encap-mode }}
            export SID_MANGER_ENABLED=${{ matrix.sid-manger-enabled }}
            export KIND_EXPERIMENTAL_DOCKER_NETWORK=${{ env.KIND_EXPERIMENTAL_DOCKER_NETWORK }}

            # NOTE: runs the test from the trusted context (i.e. target branch)
            cd /host/ && ./${{ env.srv6_datapath_test }}

      - name: Run connectivity tests
        shell: bash
        run: |
          mkdir -p cilium-junits

          cilium connectivity test --test-concurrency=5 \
            --flow-validation=disabled --hubble=false --collect-sysdump-on-failure \
            --log-code-owners --code-owners=${CILIUM_CLI_CODE_OWNERS_PATHS} \
            --exclude-code-owners=${CILIUM_CLI_EXCLUDE_OWNERS} \
            --sysdump-output-filename "cilium-sysdump-${{ matrix.name }}-<ts>" \
            --junit-file "cilium-junits/${{ env.job_name }} (${{ matrix.name }}).xml" \
            --junit-property github_job_step="Run tests (${{ matrix.name }})"

      - name: Run common post steps
        if: ${{ always() }}
        uses: ./.github/actions/post-logic
        with:
          artifacts_suffix: "enterprise-srv6-datapath-${{ matrix.name }}"
          job_status: "${{ job.status }}"

  merge-upload-and-status:
    name: Merge Upload and Status
    if: ${{ always() }}
    needs: enterprise-srv6-datapath-test
    uses: ./.github/workflows/common-post-jobs.yaml
    secrets: inherit
    with:
      context-ref: ${{ inputs.context-ref || github.sha }}
      sha: ${{ inputs.SHA || github.sha }}
      result: ${{ needs.enterprise-srv6-datapath-test.result }}
