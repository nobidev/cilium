name: Enterprise CodeQL

on:
  workflow_dispatch:
  schedule:
    # Run at the end of every day from Monday to Friday
    - cron: '0 0 * * 1-5'

jobs:
  analyze:
    name: Analyze
    runs-on: ${{ matrix.config.runner }}
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        config:
          - runner: ubuntu-24.04
            language: 'actions'
          - runner: ubuntu-24.04
            language: 'go'
            build-mode: manual

    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Initialize CodeQL=======
        if: matrix.config.language == 'go'
        uses: github/codeql-action/init@0499de31b99561a6d14a36a5f662c2a54f91beee # v4
        with:
          languages: ${{ matrix.config.language }}
          build-mode: manual

      - name: Initialize CodeQL
        if: matrix.config.language != 'go'
        uses: github/codeql-action/init@0499de31b99561a6d14a36a5f662c2a54f91beee # v4
        with:
          languages: ${{ matrix.config.language }}

      - name: Build agent
        if: matrix.config.language == 'go'
        working-directory: ./daemon
        run: make

      - name: Build operator
        if: matrix.config.language == 'go'
        working-directory: ./operator
        run: make

      - name: Build hubble-relay
        if: matrix.config.language == 'go'
        working-directory: ./hubble-relay
        run: make

      - name: Build clustermesh-apiserver
        if: matrix.config.language == 'go'
        working-directory: ./clustermesh-apiserver
        run: make

      - name: Autobuild
        if: matrix.config.language != 'go'
        uses: github/codeql-action/autobuild@0499de31b99561a6d14a36a5f662c2a54f91beee # v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@0499de31b99561a6d14a36a5f662c2a54f91beee # v4
        with:
          category: '/language:${{matrix.config.language}}'
