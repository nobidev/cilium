name: Enterprise CodeQL

on:
  workflow_dispatch:
  schedule:
    # Run at the end of every day from Monday to Friday
    - cron: '0 0 * * 1-5'

jobs:
  analyze:
    name: Analyze
    runs-on: ${{ matrix.config.runner }}
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        config:
          - runner: ubuntu-24.04
            language: 'actions'
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@181d5eefc20863364f96762470ba6f862bdef56b # v3
        with:
          languages: ${{ matrix.config.language }}

      - name: Autobuild
        if: matrix.config.language != 'cpp'
        uses: github/codeql-action/autobuild@181d5eefc20863364f96762470ba6f862bdef56b # v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@181d5eefc20863364f96762470ba6f862bdef56b # v3
        with:
          category: '/language:${{matrix.config.language}}'
