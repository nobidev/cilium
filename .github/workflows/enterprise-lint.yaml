name: Enterprise Lint
on:
  # Check mindfulness on each PR (when applicable per filter below)
  pull_request:
    branches:
      - main-ce
  # Validate mindfulness for each pushed commit
  push:
    branches:
      - main-ce
  # Additionally run once a day at midnight
  schedule:
    - cron:  '0 0 * * *'
  # Allow to run manually via GitHub UI
  workflow_dispatch: {}

permissions: read-all

jobs:
  mindfulness:
    name: Mindfulness
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          persist-credentials: false
          fetch-depth: '0'
      - name: Fetch OSS branch
        id: checkout-oss
        env:
          UPSTREAM: "https://github.com/cilium/cilium"
        run: |
          git remote add upstream "$UPSTREAM"
          git fetch --no-write-fetch-head upstream "refs/heads/main:refs/remotes/upstream/main"
      - name: Diff against upstream tree for files that should not diverge from OSS
        if: ${{ always() && steps.checkout.outcome == 'success' && steps.checkout-oss.outcome == 'success' }}
        run: |
          contrib/scripts/enterprise-meditation.sh \
            --repo cilium/cilium --debug
          contrib/scripts/enterprise-meditation.sh \
            --repo cilium/cilium --stat --exit-code
      - name: Diff against upstream tree for files that may diverge from OSS
        if: ${{ always() && steps.checkout.outcome == 'success' && steps.checkout-oss.outcome == 'success' }}
        run: |
          # Note: This does not fail when encountering a diff!
          contrib/scripts/enterprise-meditation.sh \
            --repo cilium/cilium --debug \
            --noisy
          contrib/scripts/enterprise-meditation.sh \
            --repo cilium/cilium --stat \
            --noisy

  codeowners:
    name: CODEOWNERS
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          persist-credentials: false

      - name: Check TESTOWNERS.enterprise is up to date
        run: |
          ./contrib/scripts/enterprise-testowners.sh
          if ! git diff --exit-code; then
            echo "Run './contrib/scripts/enterprise-testowners.sh' and submit your changes"
            exit 1
          fi
      - name: Check that all enterprise files are covered in CODEOWNERS
        run: |
          ./contrib/scripts/enterprise-codeowners.sh

  generate-enterprise-api:
    runs-on: ubuntu-24.04
    name: Generate Enterprise API
    steps:
      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          persist-credentials: false

      - name: Check api generated files
        run: |
          contrib/scripts/enterprise-check-api-code-gen.sh

  gomod-override:
    runs-on: ubuntu-24.04
    name: go.mod
    steps:
      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version-file: 'go.mod'

      - name: Check generated go.mod
        run: |
          contrib/scripts/enterprise-gomod-override.sh
