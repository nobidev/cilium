name: Enterprise Base Image Release Build

# Any change in triggers needs to be reflected in the concurrency group.
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - enterprise/images/wolfi/runtime/**
      - enterprise/images/wolfi/runtime-base/**
  # This workflow can be reused so that renovate can execute this workflow_dispatch:
  # run from a different environment than 'release-base-images'. See
  # build-images-base-renovate.yaml
  workflow_call:
    inputs:
      environment:
        type: string
        default: 'release-base-images'

permissions:
  # To be able to access the repository with `actions/checkout`
  contents: read
  # Required to generate OIDC tokens for `sigstore/cosign-installer` authentication
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and Push Images
    timeout-minutes: 45
    environment: ${{ inputs.environment || 'release-base-images' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Get token
        uses: getsentry/action-github-app-token@d4b5da6c5e37703f8c3b3e43abb5705b46e159cc # v3
        id: get_token
        with:
          private_key: ${{ secrets.ISOVALENT_MIRROR_UPSTREAM_BOT_APP_PEM }}
          app_id: ${{ secrets.ISOVALENT_MIRROR_UPSTREAM_BOT_APP_ID }}

      - name: Checkout default branch (trusted)
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: true
          token: ${{ steps.get_token.outputs.token }}

      - name: Cleanup Disk space in runner
        uses: ./.github/actions/disk-cleanup

      - name: Checkout base branch (trusted)
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ github.base_ref }}
          persist-credentials: true
          token: ${{ steps.get_token.outputs.token }}

      - name: Set Environment Variables
        uses: ./.github/actions/set-env-variables

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Set up QEMU
        id: qemu
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@d7543c93d881b35a8faa02e8e3605f69b7a1ce62 # v3.10.0

      - name: Checkout pull request branch (NOT TRUSTED)
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: true
          ref: ${{ github.event.pull_request.head.sha }}
          token: ${{ steps.get_token.outputs.token }}

      - name: Set-up git
        run: |
          git config user.name "Isovalent Imagebot"
          git config user.email "noreply@isovalent.com"

      - name: Generating image tag for cilium-runtime-base-wfi and verify if it exists already
        id: runtime-base-tag
        run: |
          base_tag=$(git ls-tree --full-tree --object-only HEAD -- ./enterprise/images/wolfi/runtime-base)
          echo tag="$base_tag" >> $GITHUB_OUTPUT

          if docker buildx imagetools inspect quay.io/${{ env.QUAY_ORGANIZATION }}/cilium-runtime-base-wfi:$base_tag &>/dev/null; then
            echo exists="true" >> $GITHUB_OUTPUT
          else
            echo exists="false" >> $GITHUB_OUTPUT
          fi

      - name: Login to quay.io
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME_BASE_CEE_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD_BASE_CEE_PASSWORD }}

      - name: Release enterprise-runtime-base
        if: ${{ steps.runtime-base-tag.outputs.exists == 'false' }}
        id: enterprise-runtime-base-release
        uses: chainguard-images/actions/apko-publish@main
        with:
          config: ./enterprise/images/wolfi/runtime-base/image.yaml
          tag: quay.io/${{ env.QUAY_ORGANIZATION }}/cilium-runtime-base-wfi:${{  steps.runtime-base-tag.outputs.tag }}
          generic-user: ${{ secrets.QUAY_USERNAME_BASE_CEE_USERNAME }}
          generic-pass: ${{ secrets.QUAY_PASSWORD_BASE_CEE_PASSWORD }}

      - name: Sign Container Image Runtime
        if: ${{ steps.runtime-base-tag.outputs.exists == 'false' }}
        run: |
          cosign sign -y ${{ steps.enterprise-runtime-base-release.outputs.digest }}

      - name: Update Runtime Base Image
        id: update-runtime-base-image
        if: ${{ steps.runtime-base-tag.outputs.exists == 'false' }}
        run: |
          digest=$(images/scripts/get-image-digest.sh "quay.io/${{ env.QUAY_ORGANIZATION }}/cilium-runtime-base-wfi:${{ steps.runtime-base-tag.outputs.tag }}")
          enterprise/images/wolfi/runtime-base/update-enterprise-runtime-base-image.sh "quay.io/${{ env.QUAY_ORGANIZATION }}/cilium-runtime-base-wfi:${{ steps.runtime-base-tag.outputs.tag }}@${digest}"
          git commit -sam "images: update CEE cilium-runtime-base-wfi"
          echo committed="true" >> $GITHUB_OUTPUT

      # stage 2 of the workflow, updating cilium-runtime-wfi
      - name: Generating image tag for cilium-runtime-wfi
        id: runtime-tag
        run: |
          echo tag="$(git ls-tree --full-tree HEAD -- ./enterprise/images/wolfi/runtime | awk '{ print $3 }')" >> $GITHUB_OUTPUT

      - name: Checking if tag for cilium-runtime-wfi already exists
        if: ${{ steps.runtime-base-tag.outputs.exists == 'true' }}
        id: cilium-enterprise-runtime-tag-in-repositories
        shell: bash
        run: |
          if docker buildx imagetools inspect quay.io/${{ env.QUAY_ORGANIZATION }}/cilium-runtime-wfi:${{  steps.runtime-tag.outputs.tag }} &>/dev/null; then
            echo exists="true" >> $GITHUB_OUTPUT
          else
            echo exists="false" >> $GITHUB_OUTPUT
          fi

      - name: Release build cilium-runtime-wfi
        if: ${{ steps.runtime-base-tag.outputs.exists == 'true' && steps.cilium-enterprise-runtime-tag-in-repositories.outputs.exists == 'false' }}
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        id: docker_build_release_builder
        with:
          provenance: false
          context: .
          file: ./enterprise/images/wolfi/runtime/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            quay.io/${{ env.QUAY_ORGANIZATION }}/cilium-runtime-wfi:${{  steps.runtime-tag.outputs.tag }}

      - name: Update Runtime Image
        id: update-runtime-image
        if: ${{ steps.runtime-base-tag.outputs.exists == 'true' && steps.cilium-enterprise-runtime-tag-in-repositories.outputs.exists == 'false' }}
        run: |
          digest=$(images/scripts/get-image-digest.sh "quay.io/${{ env.QUAY_ORGANIZATION }}/cilium-runtime-wfi:${{ steps.runtime-tag.outputs.tag }}")
          enterprise/images/wolfi/runtime/update-cilium-runtime-image.sh "quay.io/${{ env.QUAY_ORGANIZATION }}/cilium-runtime-wfi:${{ steps.runtime-tag.outputs.tag }}@${digest}"
          git commit -sam "images: update CEE cilium-runtime-wfi"
          echo committed="true" >> $GITHUB_OUTPUT

      - name: Push changes into PR
        if: ${{ steps.update-runtime-base-image.outputs.committed == 'true' ||  steps.update-runtime-image.outputs.committed == 'true' }}
        env:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          repository:  ${{ github.event.pull_request.head.repo.full_name || github.repository }}
        run: |
          git diff HEAD^
          git push https://x-access-token:${{ steps.get_token.outputs.token }}@github.com/${{ env.repository }}.git HEAD:${{ env.ref }}
