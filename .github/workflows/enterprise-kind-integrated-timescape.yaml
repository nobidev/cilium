name: Enterprise Integrated Hubble Timescape

# Any change in triggers needs to be reflected in the concurrency group.
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths-ignore:
      - 'Documentation/**'
      - 'test/**'

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.after }}
  cancel-in-progress: true

env:
  helm_chart_repo: oci://quay.io/isovalent-charts-dev/cilium
  kind_config: ".github/kind-config.yaml"

jobs:
  test-integrated-timescape:
    name: Integrated Timescape E2E test
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Collect Workflow Telemetry
        uses: catchpoint/workflow-telemetry-action@94c3c3d9567a0205de6da68a76c428ce4e769af1 # v2.0.0
        with:
          comment_on_pr: false

      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # checkout pull request head ref so that print-chart-version.sh prints the correct chart version.
          ref: ${{ github.event.pull_request.head.ref }}
          # required for git describe
          fetch-depth: 0

      - name: Set Environment Variables
        uses: ./.github/actions/set-env-variables

      - name: Set up job variables
        id: vars
        run: |
          version=$(bash contrib/scripts/print-chart-version.sh)
          echo "version=${version}" >> $GITHUB_OUTPUT
          echo ${version}

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHA="${{ inputs.SHA }}"
          else
            SHA="${{ github.event.pull_request.head.sha }}"
          fi

          echo sha=${SHA} >> $GITHUB_OUTPUT

      - name: Install Go
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          # renovate: datasource=golang-version depName=go
          go-version: 1.23.2

      - name: Configure Git to be able to access isovalent repositories
        run: |
          git config --global url."https://${{ secrets.ISOVALENT_BOT_READ_PRIVATE_REPOSITORIES }}:@github.com/".insteadOf "https://github.com/"
          git config --global --add url."https://${{ secrets.ISOVALENT_BOT_READ_PRIVATE_REPOSITORIES }}:@github.com/".insteadOf "git@github.com:"

      - name: Run go mod tidy in enterprise/hubble-timescape
        run: |
          cd enterprise/hubble-timescape
          go mod tidy
          test -z "$(git status --porcelain)" || (echo "please run 'go mod tidy' and submit your changes"; exit 1)

      - name: Create kind cluster
        uses: helm/kind-action@9fdad0686e6f19fcd572f62516f5e0436f562ee7 # v1.10.0
        with:
          version: ${{ env.KIND_VERSION }}
          node_image: ${{ env.KIND_K8S_IMAGE }}
          kubectl_version: ${{ env.KIND_K8S_VERSION }}
          config: ${{ env.kind_config }}
          wait: 0 # The control-plane never becomes ready, since no CNI is present

      - name: Install Cilium CLI
        uses: cilium/cilium-cli@6977c4a640ad45da3a95eb12054497f2bdd22c48 # v0.16.19
        with:
          skip-build: ${{ env.CILIUM_CLI_SKIP_BUILD }}
          image-repo: ${{ env.CILIUM_CLI_IMAGE_REPO }}
          image-tag: ${{ steps.vars.outputs.sha }}

      - name: Wait for Helm dev chart to be available
        timeout-minutes: 30
        shell: bash
        run: |
          echo ${{ secrets.QUAY_CHARTS_DEV_PASSWORD }} | helm registry login quay.io -u ${{ secrets.QUAY_CHARTS_DEV_USERNAME }} --password-stdin
          until helm pull ${{ env.helm_chart_repo }} --version ${{ steps.vars.outputs.version }}; do sleep 30s; done

      - name: Install Cilium
        run: |
          helm install -n kube-system cilium ${{ env.helm_chart_repo }} \
            --version ${{ steps.vars.outputs.version }} \
            --wait \
            --set hubble.timescape.enabled=true \
            --set hubble.tls.enabled=true \
            --set hubble.tls.auto.enabled=true

      - name: Port forward Timescape Server
        run: |
          kubectl port-forward -n kube-system svc/hubble-timescape 4245:443 &
          sleep 10s
          [[ $(pgrep -f "kubectl.*port-forward.*hubble-timescape.*4245" | wc -l) == 1 ]]

      - name: Port forward Timescape Push API
        run: |
          kubectl port-forward -n kube-system svc/hubble-timescape 4260:4260 &
          sleep 10s
          [[ $(pgrep -f "kubectl.*port-forward.*hubble-timescape.*4260" | wc -l) == 1 ]]

      - name: Get client certificate
        run: |
          kubectl -n kube-system get secret hubble-timescape-client-certs  -o jsonpath={.data."tls\.crt"} | base64 -d > client.crt
          kubectl -n kube-system get secret hubble-timescape-client-certs  -o jsonpath={.data."tls\.key"} | base64 -d > client.key
        shell: bash

      - name: Run tests
        env:
          TEST_HUBBLE_OBSERVE_TLS: true
          TEST_PUSH_API_CLIENT_CRT: ${{ github.workspace }}/client.crt
          TEST_PUSH_API_CLIENT_KEY: ${{ github.workspace }}/client.key
        run: |
          cd enterprise/hubble-timescape
          go test -tags enterprise_integrated_timescape_e2e ./tests/...
        shell: bash

      - name: Cleanup
        if: ${{ always() }}
        run: |
          cilium status
          kubectl get pods --all-namespaces -o wide
          echo ""
          echo "===Timescape Logs==="
          kubectl -n kube-system logs statefulset/hubble-timescape -c timescape
          echo ""
          echo "===Timescape ClickHouse Logs==="
          kubectl -n kube-system logs statefulset/hubble-timescape -c clickhouse
          cilium sysdump --output-filename cilium-sysdump-out --hubble-flows-count 10000
        shell: bash {0} # Disable default fail-fast behaviour so that all commands run independently

      - name: Upload artifacts
        if: ${{ !success() }}
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: cilium-sysdumps
          path: cilium-sysdump-*.zip
          retention-days: 5
