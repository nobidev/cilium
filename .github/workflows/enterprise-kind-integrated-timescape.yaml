name: Enterprise Integrated Hubble Timescape

# Any change in triggers needs to be reflected in the concurrency group.
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths-ignore:
      - 'Documentation/**'
      - 'test/**'

  # Run every 8 hours
  schedule:
    - cron:  '0 3/8 * * *'

permissions: read-all

concurrency:
  # Structure:
  # - Workflow name
  # - Event type
  # - A unique identifier depending on event type:
  #   - schedule: SHA
  #   - pull_request: PR number
  #
  # This structure ensures a unique concurrency group name is generated for each
  # type of testing, such that re-runs will cancel the previous run.
  group: |
    ${{ github.workflow }}
    ${{ github.event_name }}
    ${{
      (github.event_name == 'schedule' && github.sha) ||
      (github.event_name == 'pull_request' && github.event.pull_request.number)
    }}
  cancel-in-progress: true

env:
  helm_chart_repo: oci://quay.io/isovalent-charts-dev/cilium
  kind_config: ".github/kind-config.yaml"
  job_name: "Integrated Timescape E2E test"

jobs:
  test-integrated-timescape:
    name: Integrated Timescape E2E test
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Collect Workflow Telemetry
        uses: catchpoint/workflow-telemetry-action@94c3c3d9567a0205de6da68a76c428ce4e769af1 # v2.0.0
        with:
          comment_on_pr: false

      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          # checkout pull request head ref so that print-chart-version.sh prints the correct chart version.
          ref: ${{ github.event.pull_request.head.ref }}
          # required for git describe
          fetch-depth: 0

      - name: Cleanup Disk space in runner
        uses: ./.github/actions/disk-cleanup

      - name: Set Environment Variables
        uses: ./.github/actions/set-env-variables

      - name: Set up job variables
        id: vars
        run: |
          version=$(bash contrib/scripts/print-chart-version.sh)
          echo "version=${version}" >> $GITHUB_OUTPUT
          echo ${version}

          if [ "${{ github.event_name }}" = "schedule" ]; then
            SHA="${{ github.sha}}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            SHA="${{ github.event.pull_request.head.sha }}"
          else
            echo "Unknown event_name ${{ github.event_name }}"
            exit 1
          fi

          echo sha=${SHA} >> $GITHUB_OUTPUT

      - name: Install Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          # renovate: datasource=golang-version depName=go
          go-version: 1.25.4

      - name: Prepare environment
        timeout-minutes: 15
        run: |
          # renovate: datasource=github-releases depName=mfridman/tparse
          go install github.com/mfridman/tparse@baf229e8494613f134bc0e1f4cb9dc9b12f66442 # v0.14.0
          # renovate: datasource=github-releases depName=cilium/go-junit-report/v2/cmd/go-junit-report
          go install github.com/cilium/go-junit-report/v2/cmd/go-junit-report@cc2d3acf69eeefab6f9a23ad61b175cd1d570623 # v2.3.0

      - name: Configure Git to be able to access isovalent repositories
        run: |
          git config --global url."https://x-access-token:${{ secrets.ISOVALENT_BOT_READ_PRIVATE_REPOSITORIES }}@github.com/".insteadOf "https://github.com/"
          git config --global --add url."https://x-access-token:${{ secrets.ISOVALENT_BOT_READ_PRIVATE_REPOSITORIES }}@github.com/".insteadOf "git@github.com:"

      - name: Run go mod tidy in enterprise/hubble-timescape
        env:
          GOPRIVATE: github.com/isovalent
        run: |
          cd enterprise/hubble-timescape
          go mod tidy
          test -z "$(git status --porcelain)" || (echo "please run 'go mod tidy' and submit your changes"; exit 1)

      - name: Create kind cluster
        uses: helm/kind-action@92086f6be054225fa813e0a4b13787fc9088faab # v1.13.0
        with:
          version: ${{ env.KIND_VERSION }}
          node_image: ${{ env.KIND_K8S_IMAGE }}
          kubectl_version: ${{ env.KIND_K8S_VERSION }}
          config: ${{ env.kind_config }}
          wait: 0 # The control-plane never becomes ready, since no CNI is present

      - name: Install Cilium CLI
        uses: cilium/cilium-cli@db1773e48b18184dd2843eb5383cec4c70b228c5 # v0.18.8
        with:
          skip-build: ${{ env.CILIUM_CLI_SKIP_BUILD }}
          image-repo: ${{ env.CILIUM_CLI_IMAGE_REPO }}
          image-tag: ${{ steps.vars.outputs.sha }}
          repository: ${{ env.CILIUM_CLI_RELEASE_REPO }}
          release-version: ${{ env.CILIUM_CLI_VERSION }}

      - name: Wait for Helm dev chart to be available
        timeout-minutes: 30
        shell: bash
        run: |
          echo ${{ secrets.QUAY_CHARTS_DEV_PASSWORD }} | helm registry login quay.io -u ${{ secrets.QUAY_CHARTS_DEV_USERNAME }} --password-stdin
          until helm pull ${{ env.helm_chart_repo }} --version ${{ steps.vars.outputs.version }}; do sleep 30s; done

      - name: Install Cilium
        run: |
          helm install -n kube-system cilium ${{ env.helm_chart_repo }} \
            --version ${{ steps.vars.outputs.version }} \
            --wait \
            --set enterprise.featureGate.approved="{HubbleTimescape}" \
            --set hubble.timescape.enabled=true \
            --set hubble.tls.enabled=true \
            --set hubble.tls.auto.enabled=true

      - name: Port forward Timescape Server
        run: |
          kubectl port-forward -n kube-system svc/hubble-timescape 4245:443 &
          sleep 10s
          nc -nvz 127.0.0.1 4245

      - name: Port forward Timescape Push API
        run: |
          kubectl port-forward -n kube-system svc/hubble-timescape 4260:4260 &
          sleep 10s
          nc -nvz 127.0.0.1 4260

      - name: Get client certificate
        run: |
          kubectl -n kube-system get secret hubble-timescape-client-certs  -o jsonpath='{.data.tls\.crt}' | base64 -d > client.crt
          kubectl -n kube-system get secret hubble-timescape-client-certs  -o jsonpath='{.data.tls\.key}' | base64 -d > client.key
          if [ ! -s client.crt ] || [ ! -s client.key ]; then
            echo "Failed to retrieve client certificate and key, they are empty."
            exit 1
          fi
        shell: bash

      - name: Run tests
        env:
          TEST_HUBBLE_OBSERVE_TLS: true
          TEST_PUSH_API_CLIENT_CRT: ${{ github.workspace }}/client.crt
          TEST_PUSH_API_CLIENT_KEY: ${{ github.workspace }}/client.key
          CODEOWNERS_PATH: ../../CODEOWNERS,../../TESTOWNERS.enterprise
          JUNIT_PATH: ../../test/${{ env.job_name }}.xml
        run: |
          cd enterprise/hubble-timescape
          go test -count=1 \
              -tags enterprise_integrated_timescape_e2e \
              -json \
              ./tests/... \
          | tee >(go-junit-report \
                      -parser gojson \
                      -p owner=@isovalent/timescape \
                      -code-owners="$CODEOWNERS_PATH" \
                      -code-owners-prefix github.com/isovalent/cilium/ \
                      -out "$JUNIT_PATH") \
                >(tparse -follow) \
                >/dev/null \
          | cat # Wait for all output to complete
        shell: bash

      - name: Cleanup
        if: ${{ always() }}
        run: |
          echo "===Timescape Logs==="
          kubectl -n kube-system logs statefulset/hubble-timescape -c timescape
          echo ""
          echo "===Timescape ClickHouse Logs==="
          kubectl -n kube-system logs statefulset/hubble-timescape -c clickhouse
        shell: bash {0} # Disable default fail-fast behaviour so that all commands run independently

      - name: Fetch JUnits
        shell: bash
        run: |
          mkdir -p cilium-junits
          cd test/
          # junit_filename needs to be the same as the Job Name presented on the
          # GH web UI - In the Summary page of a workflow run, left column
          # "Jobs" - so that we can map the junit file to the right job - step
          # pair on datastudio.
          junit_filename="${{ env.job_name }}.xml"
          for filename in *.xml; do cp "${filename}" "../cilium-junits/${junit_filename}"; done;

      - name: Run common post steps
        if: ${{ always() }}
        uses: ./.github/actions/post-logic
        with:
          artifacts_suffix: "enterprise-kind-integrated-timescape"
          job_status: "${{ job.status }}"
