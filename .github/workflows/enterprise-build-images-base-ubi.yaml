name: UBI Base Image Release Build

# Any change in triggers needs to be reflected in the concurrency group.
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - enterprise/images/runtime/**
  # This workflow can be reused so that renovate can execute this workflow_dispatch:
  # run from a different environment than 'release-base-images'. See
  # build-images-base-renovate.yaml
  workflow_call:
    secrets:
      QUAY_BASE_RELEASE_USERNAME_202411:
        required: true
      QUAY_BASE_RELEASE_PASSWORD_202411:
        required: true
      AUTO_COMMITTER_PEM_202411:
        required: true
      AUTO_COMMITTER_APP_ID_202411:
        required: true
    inputs:
      environment:
        required: true
        type: string
        default: "release-base-images"

permissions:
  # To be able to access the repository with `actions/checkout`
  contents: read
  # Required to generate OIDC tokens for `sigstore/cosign-installer` authentication
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  has-credentials:
    name: Check for Quay secrets
    runs-on: ubuntu-24.04
    environment: ${{ inputs.environment || 'release-base-images' }}
    timeout-minutes: 2
    outputs:
      present: ${{ steps.secrets.outputs.present }}
    steps:
      - name: Check for secrets
        id: secrets
        env:
          has_credentials: ${{ secrets.QUAY_BASE_RELEASE_USERNAME_202411 && secrets.QUAY_BASE_RELEASE_PASSWORD_202411 && 1 }}
        if: ${{ env.has_credentials }}
        run:
          echo 'present=1' >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: has-credentials
    # Skip this workflow for repositories without credentials and branches that are created by renovate where the event type is pull_request_target
    if: ${{ needs.has-credentials.outputs.present && ! (github.event_name == 'pull_request' && startsWith(github.head_ref, 'renovate/')) }}
    name: Build and Push Images
    timeout-minutes: 45
    environment: ${{ inputs.environment || 'release-base-images' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Cleanup Disk space in runner
        uses: ./.github/actions/disk-cleanup

      - name: Set Environment Variables
        uses: ./.github/actions/set-env-variables

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Set up QEMU
        id: qemu
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a # v3.8.1

      - name: Checkout pull request branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set-up git
        run: |
          git config user.name "Isovalent Imagebot"
          git config user.email "noreply@isovalent.com"

      - name: Generating image tag for Cilium-Runtime
        id: runtime-tag
        run: |
          echo tag="$(git ls-tree --full-tree HEAD -- ./enterprise/images/runtime | awk '{ print $3 }')" >> $GITHUB_OUTPUT

      - name: Checking if tag for Cilium-Runtime already exists
        id: cilium-runtime-tag-in-repositories
        shell: bash
        run: |
          if docker buildx imagetools inspect quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/cilium-runtime-ubi:${{  steps.runtime-tag.outputs.tag }} &>/dev/null; then
            echo exists="true" >> $GITHUB_OUTPUT
          else
            echo exists="false" >> $GITHUB_OUTPUT
          fi

      - name: Login to registry.redhat.io for pulling images
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          registry: registry.redhat.io
          username: ${{ secrets.REDHAT_USERNAME_CI }}
          password: ${{ secrets.REDHAT_PASSWORD_CI }}

      - name: Login to quay.io
        if: ${{ steps.cilium-runtime-tag-in-repositories.outputs.exists == 'false' }}
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_BASE_RELEASE_USERNAME_202411 }}
          password: ${{ secrets.QUAY_BASE_RELEASE_PASSWORD_202411 }}

      - name: Release build cilium-runtime
        if: ${{ steps.cilium-runtime-tag-in-repositories.outputs.exists == 'false' }}
        uses: docker/build-push-action@ca877d9245402d1537745e0e356eab47c3520991 # v6.13.0
        id: docker_build_release_runtime
        with:
          provenance: false
          context: ./enterprise/images/runtime
          file: ./enterprise/images/runtime/Dockerfile
          push: false #TODO: change to true when we are live
          platforms: linux/amd64,linux/arm64
          tags: |
            quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/cilium-runtime-ubi:${{ steps.runtime-tag.outputs.tag }}
          build-args: | #TODO: change these to appropriate ones
            CILIUM_LLVM_IMAGE=quay.io/cilium/cilium-llvm:1732033893-de666b6@sha256:ee005bd47b20f78a727c06fdf2275861848be7acd242603c82f86ca8faaeda90
            CILIUM_BPFTOOL_IMAGE=quay.io/cilium/cilium-bpftool:5a9c4852a21287686009bfe1cdc1fed6e7aabdea@sha256:188e398ee30456373530698d0d29de66dda0c4428068ea430027ceb7e9c15b7c
            COMPILERS_IMAGE=quay.io/frederic_giloux/image-compilers-ubi:1740135205-66ff39e-wip

      - name: Sign Container Image Runtime
        if: ${{ steps.cilium-runtime-tag-in-repositories.outputs.exists == 'false' }}
        run: |
          cosign sign -y quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/cilium-runtime-ubi@${{ steps.docker_build_release_runtime.outputs.digest }}

      - name: Generate SBOM
        if: ${{ steps.cilium-runtime-tag-in-repositories.outputs.exists == 'false' }}
        uses: anchore/sbom-action@f325610c9f50a54015d37c8d16cb3b0e2c8f4de0 # v0.18.0
        with:
          artifact-name: sbom_cilium-runtime_${{ steps.runtime-tag.outputs.tag }}.spdx.json
          output-file: ./sbom_cilium-runtime_${{ steps.runtime-tag.outputs.tag }}.spdx.json
          image: quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/cilium-runtime-ubi:${{ steps.runtime-tag.outputs.tag }}

      - name: Attach SBOM attestation to container image
        if: ${{ steps.cilium-runtime-tag-in-repositories.outputs.exists == 'false' }}
        run: |
          cosign attest -r -y --predicate sbom_cilium-runtime_${{ steps.runtime-tag.outputs.tag }}.spdx.json --type spdxjson quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/cilium-runtime-ubi@${{ steps.docker_build_release_runtime.outputs.digest }}

      - name: Image Release Digest Runtime
        if: ${{ steps.cilium-runtime-tag-in-repositories.outputs.exists == 'false' }}
        shell: bash
        run: |
          mkdir -p image-digest/
          echo "## cilium-runtime-ubi" > image-digest/cilium-runtime-ubi.txt
          echo "" >> image-digest/cilium-runtime-ubi.txt
          echo "\`quay.io/${{ env.QUAY_ORGANIZATION_DEV }}/cilium-runtime-ubi:${{ steps.runtime-tag.outputs.tag }}@${{ steps.docker_build_release_runtime.outputs.digest }}\`" >> image-digest/cilium-runtime-ubi.txt
          echo "" >> image-digest/cilium-runtime-ubi.txt

      - name: Upload artifact digests runtime
        if: ${{ steps.cilium-runtime-tag-in-repositories.outputs.exists == 'false' }}
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: image-digest cilium-runtime-ubi
          path: image-digest
          retention-days: 1

      - name: Change runtime image, commit and push
        shell: bash
        run: echo "TODO"

  image-digests:
    name: Display Digests
    runs-on: ubuntu-24.04
    environment: ${{ inputs.environment || 'release-base-images' }}
    needs: build-and-push
    steps:
      - name: Downloading Image Digests
        shell: bash
        run: |
          mkdir -p image-digest/

      - name: Download digests of all images built
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          path: image-digest/
          pattern: "*image-digest *"

      - name: Image Digests Output
        shell: bash
        run: |
          cd image-digest/
          find -type f | sort | xargs -d '\n' cat
