bpf:
  masquerade: true
  monitorAggregation: medium

clustermesh:
  apiserver:
    image:
      override: localhost:5000/cilium/clustermesh-apiserver:privnet
      pullPolicy: Never
      useDigest: false
    updateStrategy:
      rollingUpdate:
        maxUnavailable: 1

    tls:
      auto:
        enabled: true
        method: certmanager
        certValidityDuration: 1 # days
        certManagerIssuerRef:
          group: cert-manager.io
          kind: Issuer
          name: cilium

  config:
    enabled: true

  useAPIServer: true

debug:
  enabled: true

devices:
  - eth+

enterprise:
  featureGate:
    approved:
    - DatapathIPModeDualStack
    - PrivateNetworks

  privateNetworks:
    enabled: true

    healthcheck:
      interval: 500ms
      timeout: 2s

envoy:
  image:
    pullPolicy: Never
    useDigest: false

hubble:
  tls:
    auto:
      enabled: true
      method: certmanager
      certValidityDuration: 1 # days
      certManagerIssuerRef:
        group: cert-manager.io
        kind: Issuer
        name: cilium

image:
  override: localhost:5000/cilium/cilium-dev:privnet
  pullPolicy: Never
  useDigest: false

ipam:
  mode: kubernetes

ipv4:
  enabled: true
ipv6:
  enabled: true

kubeProxyReplacement: true

operator:
  image:
    override: localhost:5000/cilium/operator-generic:privnet
    pullPolicy: Never
    useDigest: false
  replicas: 1

socketLB:
  enabled: true
  hostNamespaceOnly: true

routingMode: tunnel
tunnelProtocol: vxlan
