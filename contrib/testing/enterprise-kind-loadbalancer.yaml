enterprise:
  loadbalancer:
    enabled: true
  bgpControlPlane:
    enabled: true
    enableServiceHealthChecking: true
  bfd:
    enabled: true
  featureGates:
    - "BGPControlPlane"
    - "ArchARM64"
debug:
  enabled: true
  verbose: "envoy datapath"
envoy:
  nodeSelector:
    service.cilium.io/node: "t2"
  debug:
    admin:
      enabled: true
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
  # To make DNS-based backend discovery work within the cluster.
  dnsPolicy: ClusterFirstWithHostNet
envoyConfig:
  enabled: true
bpf:
  monitorAggregation: none
  ctAccounting: true
kubeProxyReplacement: true
ipv6:
  enabled: false
extraConfig:
  enable-ipip-termination: "true"
  loadbalancer-cp-requestid-generate: "true"
  loadbalancer-cp-requestid-response: "true"
  loadbalancer-cp-accesslog-file-path: "/var/log/envoy-accesslog.log"
  loadbalancer-cp-accesslog-enable-tcp: "true"
  loadbalancer-cp-accesslog-enable-hc: "true"
operator:
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
prometheus:
  enabled: true
  serviceMonitor:
    enabled: true
  controllerGroupMetrics:
    - all
