image:
  override: "quay.io/isovalent-dev/cilium-ci:latest"
  pullPolicy: IfNotPresent
enterprise:
  loadbalancer:
    enabled: true
  bgpControlPlane:
    enabled: true
    enableServiceHealthChecking: true
  bfd:
    enabled: true
envoy:
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
  # To make DNS-based backend discovery work within the cluster.
  dnsPolicy: ClusterFirstWithHostNet
envoyConfig:
  enabled: true
bpf:
  lbAlgorithmAnnotation: true
  lbModeAnnotation: true
  monitorAggregation: none
  ctAccounting: true
kubeProxyReplacement: true
loadBalancer:
  acceleration: native
  dsrDispatch: ipip
routingMode: native
enableIPv4Masquerade: false
autoDirectNodeRoutes: true
ipv6:
  enabled: false
extraConfig:
  loadbalancer-cp-requestid-generate: "true"
  loadbalancer-cp-requestid-response: "true"
operator:
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
  image:
    override: "quay.io/isovalent-dev/operator-generic-ci:latest"
    suffix: ""
    pullPolicy: IfNotPresent
prometheus:
  enabled: true
  serviceMonitor:
    enabled: true
  controllerGroupMetrics:
    - all
