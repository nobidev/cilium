enterprise:
  loadbalancer:
    enabled: true
  bgpControlPlane:
    enabled: true
    enableServiceHealthChecking: true
    nodeMaintenance:
      # immediate withdraw -> as any other T1 node can take over (at least in T1&T2 deployment mode)
      withdrawTime: 1ms
      gracefulShutdownCommunity:
        enabled: false # recommended if BGP router supports it
  bfd:
    enabled: true
  featureGate:
    minimumMaturity: Alpha
debug:
  enabled: true
  verbose: "envoy datapath"
envoy:
  # disable probes to prevent k8s kubelet killing the Pods during maintenance / draining.
  startupProbe:
    enabled: false
  livenessProbe:
    enabled: false
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
  # To make DNS-based backend discovery work within the cluster.
  dnsPolicy: ClusterFirstWithHostNet
  # Mount Envoy Accesslog from Container to Host
  extraHostPathMounts:
    - name: envoy-accesslog
      mountPath: /var/log/envoy
      hostPath: /var/log/envoy
      hostPathType: DirectoryOrCreate
      readOnly: false
      mountPropagation: HostToContainer
envoyConfig:
  enabled: true
bpf:
  lbAlgorithmAnnotation: true
  lbModeAnnotation: true
  monitorAggregation: none
  ctAccounting: true
  masquerade: true
kubeProxyReplacement: true
loadBalancer:
  acceleration: native
  dsrDispatch: ipip
routingMode: native
autoDirectNodeRoutes: true
enableIPv4Masquerade: true
# set to Kind Pod CIDR range to prevent pod-to-pod traffic from being masqueraded
ipv4NativeRoutingCIDR: 10.244.0.0/16
ipv6:
  enabled: true
ipv6NativeRoutingCIDR: "fd00:10:244::/56"
enableIPv6Masquerade: true
extraConfig:
  loadbalancer-cp-requestid-generate: "true"
  loadbalancer-cp-requestid-response: "true"
  loadbalancer-cp-accesslog-file-path: "/var/log/envoy/accesslog.log"
  loadbalancer-cp-accesslog-enable-hc: "true"
  loadbalancer-cp-t2-use-remote-address: "true"
  loadbalancer-cp-t2-xff-num-trusted-hops: "0"
  loadbalancer-flow-logs-enabled: "true"
  loadbalancer-flow-logs-sender: "stdout"
operator:
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
prometheus:
  enabled: true
  serviceMonitor:
    enabled: true
  controllerGroupMetrics:
    - all
