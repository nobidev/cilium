enterprise:
  loadbalancer:
    enabled: true
  bgpControlPlane:
    enableServiceHealthChecking: true
  bfd:
    enabled: true
debug:
  enabled: true
  verbose: "envoy datapath"
bgpControlPlane:
  enabled: true
envoy:
  nodeSelector:
    service.cilium.io/node: "t2"
  debug:
    admin:
      enabled: true
envoyConfig:
  enabled: true
bpf:
  monitorAggregation: none
kubeProxyReplacement: true
extraConfig:
  enable-ipip-termination: "true"
  loadbalancer-cp-requestid-response: "true"
