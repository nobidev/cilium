enterprise:
  loadbalancer:
    enabled: true
  bgpControlPlane:
    enabled: true
    enableServiceHealthChecking: true
  bfd:
    enabled: true
debug:
  enabled: true
  verbose: "envoy datapath"
envoy:
  nodeSelector:
    service.cilium.io/node: "t2"
  debug:
    admin:
      enabled: true
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
envoyConfig:
  enabled: true
bpf:
  monitorAggregation: none
kubeProxyReplacement: true
extraConfig:
  enable-ipip-termination: "true"
  loadbalancer-cp-requestid-response: "true"
  loadbalancer-cp-accesslog-enable-tcp: "true"
  loadbalancer-cp-accesslog-exclude-hc: "true"
operator:
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
prometheus:
  enabled: true
  serviceMonitor:
    enabled: true
  controllerGroupMetrics:
    - all
