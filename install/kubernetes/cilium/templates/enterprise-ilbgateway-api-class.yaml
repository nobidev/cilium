{{- if .Values.enterprise.loadbalancer.enabled -}}
{{- if .Values.enterprise.loadbalancer.gatewayAPI.enabled -}}
{{- if ( or (eq (.Values.gatewayAPI.gatewayClass.create | toString) "true") (and (.Capabilities.APIVersions.Has "gateway.networking.k8s.io/v1/GatewayClass") (eq (.Values.gatewayAPI.gatewayClass.create | toString) "auto"))) }}
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: ilbgateway
  {{- with .Values.commonLabels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  controllerName: io.isovalent/gateway-controller
  description: The default Isovalent LB GatewayClass
{{- end}}
{{- end}}
{{- end}}