{{- define "hubble.timescape.labels" }}
k8s-app: hubble-timescape
app.kubernetes.io/name: hubble-timescape
app.kubernetes.io/part-of: cilium
app.kubernetes.io/component: hubble-timescape
{{ with .Values.commonLabels }}
{{- toYaml . }}
{{- end }}
{{- end }}

{{- define "hubble.timescape.ttl" -}}
{{- $defaultTTL := "6h0m0s" }}
{{- if not .Values.hubble.timescape.persistence.enabled -}}
{{/* use even lower default ttl if there is no persistent clickhouse database */}}
{{- $defaultTTL = "1h0m0s" }}
{{- end }}
{{- .Values.hubble.timescape.ttl | default $defaultTTL | quote }}
{{- end }}

{{ if .Values.hubble.timescape.enabled }}

{{- if and
  .Values.hubble.timescape.clustermesh.primary.namespace
  .Values.hubble.timescape.clustermesh.primary.createNamespace
  (not (eq (int64 .Values.hubble.timescape.clustermesh.primary.id) (int64 .Values.cluster.id)))
}}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.hubble.timescape.clustermesh.primary.namespace }}
{{- end }}
---
# Service exposing the Timescape server and ingester push API
apiVersion: v1
kind: Service
metadata:
  name: hubble-timescape
  {{- if .Values.hubble.timescape.clustermesh.primary.namespace }}
  namespace: {{ .Values.hubble.timescape.clustermesh.primary.namespace }}
  {{- else }}
  namespace: {{ include "cilium.namespace" . }}
  {{- end }}
  labels: {{ include "hubble.timescape.labels" . | nindent 4 }}
  {{- if .Values.hubble.timescape.clustermesh.primary.id }}
  annotations:
    service.cilium.io/global: "true"
    {{- if not (eq (int64 .Values.hubble.timescape.clustermesh.primary.id) (int64 .Values.cluster.id)) }}
    service.cilium.io/shared: "false"
    {{- end }}
  {{- end }}
spec:
  type: ClusterIP
  ports:
    - protocol: TCP
      name: push
      targetPort: push
      port: 4260
    - protocol: TCP
      name: grpc
      port: {{ eq (include "hubble.timescape.tls.enabled" .) "true" | ternary 443 80 }}
      targetPort: {{ .Values.hubble.rbac.enabled | ternary "grpc-rbac" "server-grpc" }}
    {{- if .Values.hubble.timescape.ui.enabled }}
    - protocol: TCP
      name: ui
      port: 8080
      targetPort: ui
    {{- end }}
    {{- if .Values.hubble.timescape.metrics.enabled }}
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
    {{- end }}
    {{- if .Values.hubble.timescape.metrics.clickhouse.enabled }}
    - name: ch-metrics
      port: 8001
      targetPort: ch-metrics
      protocol: TCP
    {{- end }}
  selector:
    k8s-app: hubble-timescape
    app.kubernetes.io/name: hubble-timescape
    app.kubernetes.io/part-of: cilium
{{- if or
  (not .Values.hubble.timescape.clustermesh.primary.id)
  (eq (int64 .Values.hubble.timescape.clustermesh.primary.id) (int64 .Values.cluster.id))
}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: "hubble-timescape"
  namespace: {{ include "cilium.namespace" . }}
  labels: {{ include "hubble.timescape.labels" . | nindent 4 }}
---
# Required for the StatefulSet
apiVersion: v1
kind: Service
metadata:
  name: hubble-timescape-headless
  namespace: {{ include "cilium.namespace" . }}
  labels: {{ include "hubble.timescape.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  selector: {{ include "hubble.timescape.labels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hubble-timescape
  namespace: {{ include "cilium.namespace" . }}
  labels: {{ include "hubble.timescape.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      k8s-app: hubble-timescape
      app.kubernetes.io/name: hubble-timescape
      app.kubernetes.io/part-of: cilium
  serviceName: timescape
  template:
    metadata:
      labels: {{ include "hubble.timescape.labels" . | nindent 10  }}
    spec:
      serviceAccountName: "hubble-timescape"
      securityContext:
        {{- toYaml .Values.hubble.timescape.podSecurityContext | nindent 10 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      priorityClassName: {{ .Values.hubble.timescape.priorityClassName }}
      {{- with .Values.hubble.timescape.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.hubble.timescape.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.hubble.timescape.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: clickhouse
          image: {{ include "cilium.image" .Values.hubble.timescape.clickhouse.image | quote }}
          imagePullPolicy: {{ .Values.hubble.timescape.clickhouse.image.pullPolicy }}
          terminationMessagePolicy: FallbackToLogsOnError
          securityContext: {{- toYaml .Values.hubble.timescape.clickhouse.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.hubble.timescape.clickhouse.resources | nindent 12 }}
          volumeMounts:
          - mountPath: "/etc/clickhouse-server/config.d/"
            name: clickhouse-config
            readOnly: true
          - mountPath: "/etc/clickhouse-server/profiles.d/"
            name: clickhouse-profile
            readOnly: true
          - mountPath: "/etc/clickhouse-server/users.d/"
            name: clickhouse-user
            readOnly: true
          - name: clickhouse-data
            mountPath: /var/lib/clickhouse
          readinessProbe:
            httpGet:
              path: /ping
              port: ch-http
              scheme: HTTP
          livenessProbe:
            httpGet:
              path: /ping
              port: ch-http
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 3
          ports:
          - containerPort: 8123
            name: ch-http
            protocol: TCP
          {{- if .Values.hubble.timescape.metrics.clickhouse.enabled }}
          - containerPort: 8001
            name: ch-metrics
            protocol: TCP
          {{- end }}
        - name: timescape
          image: {{ include "cilium.image" .Values.hubble.timescape.image | quote }}
          imagePullPolicy: {{ .Values.hubble.timescape.image.pullPolicy }}
          terminationMessagePolicy: FallbackToLogsOnError
          securityContext:
            {{- toYaml .Values.hubble.timescape.securityContext | nindent 12 }}
          command:
            - /usr/bin/hubble-timescape
          args:
            - run
          env:
            - name: HUBBLE_TIMESCAPE_DSN
              value: "clickhouse://localhost:9000/hubble?dial_timeout=10s"
          {{- if and .Values.hubble.timescape.ui.enabled (eq (include "hubble.timescape.ui.auth.enabled" .) "true") }}
          {{- if not .Values.hubble.timescape.ui.auth.oidc.clientAssertionFile }}
            - name: HUBBLE_TIMESCAPE_UI__OAUTH2__OIDC__CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.hubble.timescape.ui.auth.oidc.clientSecret.secretName }}
                  key:  {{ .Values.hubble.timescape.ui.auth.oidc.clientSecret.secretKey }}
          {{- end }}
            - name: HUBBLE_TIMESCAPE_UI__SESSION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.hubble.timescape.ui.auth.sessionKey.secretName }}
                  key:  {{ .Values.hubble.timescape.ui.auth.sessionKey.secretKey }}
          {{- end }}
          ports:
            - name: health-grpc
              containerPort: 8083
              protocol: TCP
            - name: server-grpc
              containerPort: 4244
              protocol: TCP
            - name: push
              containerPort: 4260
              protocol: TCP
            {{- if .Values.hubble.timescape.ui.enabled }}
            - name: ui
              containerPort: 8080
              protocol: TCP
            {{- end }}
            {{- if .Values.hubble.timescape.metrics.enabled }}
            - name: metrics
              containerPort: 9090
              protocol: TCP
            {{- end }}
            - name: pprof
              containerPort: 6060
              protocol: TCP
          startupProbe:
            {{- include "hubble.timescape.probe" . | nindent 12 }}
            # The Timescape server implement a retry logic to connect to
            # ClickHouse with a timeout of 10s retrying 30 times before giving
            # up and crashing. Thus, it is expected to exit on its own after 5
            # minutes if it can't be ready. Since the default k8s periodSeconds
            # is 10s, a failureThreshold of 32 leave to the container a little
            # over 5m. See https://kubernetes.io/docs/concepts/workloads/pods/pod-lifecycle/#when-should-you-use-a-startup-probe
            failureThreshold: 32
          readinessProbe:
            {{- include "hubble.timescape.probe" . | nindent 12 }}
          livenessProbe:
            {{- include "hubble.timescape.probe" . | nindent 12 }}
          resources:
            {{- toYaml .Values.hubble.timescape.resources | nindent 12 }}
          volumeMounts:
          - mountPath: "/etc/hubble-timescape"
            name: config
            readOnly: true
          {{- if eq (include "hubble.timescape.tls.enabled" .) "true" }}
          - mountPath: "/var/lib/hubble-timescape/tls"
            name: tls
            readOnly: true
          {{- end }}
        {{- if .Values.hubble.rbac.enabled }}
        {{- with (include "container.rbac" (dict "Values" .Values "isTimescape" true)) | fromYaml | list | toYaml }}
        {{- . | nindent 8}}
        {{- end }}
        {{- end }}
      volumes:
      - name: config
        configMap:
          name: hubble-timescape-config
          items:
          - key: config.yaml
            path: config.yaml
      {{- if eq (include "hubble.timescape.tls.enabled" .) "true" }}
      - name: tls
        projected:
          defaultMode: 0400
          sources:
          - secret:
              name: {{ .Values.hubble.timescape.tls.server.existingSecret | default "hubble-timescape-server-certs" }}
              items:
              - key: tls.crt
                path: server.crt
              - key: tls.key
                path: server.key
              - key: ca.crt
                path: ca.crt
          {{- $oidcCAConfigMapName := .Values.hubble.rbac.auth.oidc.ca.configMap.name }}
          {{- $oidcCAConfigMapKey := .Values.hubble.rbac.auth.oidc.ca.configMap.key }}
          {{- if .Values.hubble.timescape.ui.auth.oidc.issuerCA.configMap.name }}
          {{- $oidcCAConfigMapName = .Values.hubble.timescape.ui.auth.oidc.issuerCA.configMap.name }}
          {{- $oidcCAConfigMapKey = .Values.hubble.timescape.ui.auth.oidc.issuerCA.configMap.key }}
          {{- end }}
          {{- if $oidcCAConfigMapName }}
          - configMap:
              name: {{ $oidcCAConfigMapName }}
              items:
              - key: {{ $oidcCAConfigMapKey }}
                path: oidc-provider-ca.pem
          {{- end -}}
      {{- end }}
      {{- if .Values.hubble.rbac.enabled }}
      - name: hubble-rbac-policy
        configMap:
          name: {{ .Values.hubble.rbac.policy.configMap.name }}
          defaultMode: 0400
      {{- if .Values.hubble.rbac.auth.oidc.ca.configMap.name }}
      - name: hubble-rbac-tls-oidc
        configMap:
          name: {{ .Values.hubble.rbac.auth.oidc.ca.configMap.name }}
          items:
          - key: {{ .Values.hubble.rbac.auth.oidc.ca.configMap.key }}
            path: hubble-oidc-provider-ca.pem
      {{- end }}
      {{- end }}
      - name: clickhouse-config
        configMap:
          name: hubble-timescape-clickhouse-settings
          items:
          - key: clickhouse-settings.xml
            path: clickhouse-settings.xml
      - name: clickhouse-profile
        configMap:
          name: hubble-timescape-clickhouse-settings
          items:
          - key: clickhouse-profiles.xml
            path: clickhouse-profiles.xml
      - name: clickhouse-user
        configMap:
          name: hubble-timescape-clickhouse-settings
          items:
          - key: clickhouse-users.xml
            path: clickhouse-user.xml
      - name: clickhouse-data
        {{- if .Values.hubble.timescape.persistence.enabled }}
        persistentVolumeClaim:
          claimName: hubble-timescape-clickhouse-data
        {{- else }}
        emptyDir:
          sizeLimit: 5Gi
        {{- end }}
{{- if .Values.hubble.timescape.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hubble-timescape-clickhouse-data
  namespace: {{ include "cilium.namespace" . }}
  labels: {{ include "hubble.timescape.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.hubble.timescape.persistence.volumeSize }}
  {{- with .Values.hubble.timescape.persistence.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hubble-timescape-clickhouse-settings
  namespace: {{ include "cilium.namespace" . }}
  labels: {{ include "hubble.timescape.labels" . | nindent 4 }}
data:
  clickhouse-users.xml: |-
    <?xml version="1.0"?>
    <clickhouse>
      <users>
        <default>
          <networks>
            <!-- only listen on localhost for default user -->
            <ip>::1</ip>
            <ip>127.0.0.1</ip>
          </networks>
          <profile>default</profile>
          <quota>default</quota>
        </default>
      </users>
    </clickhouse>
  clickhouse-profiles.xml: |-
    <?xml version="1.0"?>
    <clickhouse>
        <profiles>
            <default>
              <allow_ddl>1</allow_ddl>
              <log_queries>1</log_queries>
              <prefer_global_in_and_join>1</prefer_global_in_and_join>
              <query_profiler_cpu_time_period_ns>0</query_profiler_cpu_time_period_ns>
              <query_profiler_real_time_period_ns>0</query_profiler_real_time_period_ns>
              <readonly>0</readonly>
              <skip_unavailable_shards>1</skip_unavailable_shards>
            </default>
        </profiles>
    </clickhouse>
  clickhouse-settings.xml: |-
    <?xml version="1.0"?>
    <clickhouse>
      <!-- Listen wildcard address to allow accepting connections from other containers and host network. -->
      <listen_host>::</listen_host>
      <listen_host>0.0.0.0</listen_host>
      <listen_try>1</listen_try>
      <!-- see https://clickhouse.com/docs/en/operations/server-configuration-parameters/settings/#max-table-size-to-drop -->
      <max_table_size_to_drop>0</max_table_size_to_drop>
      <max_concurrent_queries>100</max_concurrent_queries>
      <max_connections>4096</max_connections>
      <asynchronous_insert_log replace="1">
        <ttl>event_time + INTERVAL 30 minute</ttl>
      </asynchronous_insert_log>
      <asynchronous_metric_log replace="1">
        <ttl>event_time + INTERVAL 30 minute</ttl>
      </asynchronous_metric_log>
      <backup_log remove="1"></backup_log>
      <blob_storage_log remove="1"></blob_storage_log>
      <crash_log replace="1">
        <partition_by>event_date</partition_by>
        <ttl>event_date + INTERVAL 1 month</ttl>
      </crash_log>
      <error_log replace="1">
        <partition_by>event_date</partition_by>
        <ttl>event_date + INTERVAL 14 day</ttl>
      </error_log>
      <metric_log replace="1">
        <ttl>event_time + INTERVAL 30 minute</ttl>
      </metric_log>
      <opentelemetry_span_log remove="1"></opentelemetry_span_log>
      <part_log replace="1">
        <ttl>event_time + INTERVAL 30 minute</ttl>
      </part_log>
      <processors_profile_log remove="1"></processors_profile_log>
      <query_log replace="1">
        <ttl>event_time + INTERVAL 30 minute</ttl>
      </query_log>
      <query_metric_log replace="1">
        <ttl>event_time + INTERVAL 30 minute</ttl>
      </query_metric_log>
      <query_thread_log remove="1"></query_thread_log>
      <query_views_log replace="1">
        <ttl>event_time + INTERVAL 30 minute</ttl>
      </query_views_log>
      <session_log remove="1"></session_log>
      <text_log remove="1"></text_log>
      <trace_log remove="1"></trace_log>
      <zookeeper_log remove="1"></zookeeper_log>
      <logger>
          <console>true</console>
          <level>information</level>
      </logger>
      {{- if .Values.hubble.timescape.metrics.clickhouse.enabled }}
      <prometheus>
        <asynchronous_metrics>true</asynchronous_metrics>
        <endpoint>/metrics</endpoint>
        <events>true</events>
        <metrics>true</metrics>
        <port>8001</port>
      </prometheus>
      {{- else }}
      <prometheus remove="1"></prometheus>
      {{- end }}
      <postgresql_port remove="1"></postgresql_port>
      <mysql_port remove="1"></mysql_port>
      <!-- we're always running with a single replica, no point in opening it -->
      <interserver_http_port remove="1"></interserver_http_port>
    </clickhouse>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hubble-timescape-config
  namespace: {{ include "cilium.namespace" . }}
  labels: {{ include "hubble.timescape.labels" . | nindent 4 }}
data:
  config.yaml: |
    log-level: {{ .Values.hubble.timescape.logLevel | quote }}
    {{- if .Values.hubble.timescape.metrics.enabled }}
    prometheus-serve-addr: ":9090"
    {{- end }}
    pprof: true
    pprof-address: "localhost"
    pprof-port: "6060"
    gops: true
    gops-port: "9898"
    flows-ttl: {{ include "hubble.timescape.ttl" . }}
    k8s-ttl: {{ include "hubble.timescape.ttl" . }}
    use-distributed-tables: false
    use-distributed-ddl: false
    enable-clickhouse-server-logs: false
    log-query-progress: false
    health-listen-address: ":8083"
    server:
      {{- if .Values.hubble.rbac.enabled }}
      listen-address: localhost:4244
      {{- else }}
      listen-address: :4244
      {{- end }}
      {{- if and (not .Values.hubble.rbac.enabled) ( eq (include "hubble.timescape.tls.enabled" .) "true" )}}
      enable-tls: true
      tls-cert-file: /var/lib/hubble-timescape/tls/server.crt
      tls-key-file: /var/lib/hubble-timescape/tls/server.key
      {{- end }}
      enable-experimental-api: true
    ingester:
      batch-size: 10000
      cluster-name: "{{ .Values.cluster.name }}"
      enable-flows-ingestion: true
      enable-fgs-events-ingestion: false
      enable-k8s-events-ingestion: true
      report-interval: 60s
      enable-push-api: true
      push-api-listen-address: :4260
      {{- if eq (include "hubble.timescape.tls.enabled" .) "true" }}
      push-api-tls-enabled: true
      push-api-tls-cert-file: /var/lib/hubble-timescape/tls/server.crt
      push-api-tls-key-file: /var/lib/hubble-timescape/tls/server.key
      push-api-tls-client-ca-files:
        - /var/lib/hubble-timescape/tls/ca.crt
      {{- end }}
      push-api-async-insert: "true"
      push-api-async-insert-busy-timeout: 2s
      push-api-async-insert-max-data-size: 104857600
      filter-batch-size: 100
      filter-batch-window: 10s
      enable-k8s-importer: false
    migrate:
      clickhouse-nodes-count: "0"
    trimmer:
      flows-count: {{ .Values.hubble.timescape.trimmer.flowsCount }}
      trim-interval: {{ printf "%.fm" .Values.hubble.timescape.trimmer.intervalMinutes }}
      timeout: {{ .Values.hubble.timescape.trimmer.timeout | default (printf "%.fm" .Values.hubble.timescape.trimmer.intervalMinutes) }}
    enable-analyzer: false
    enable-ui: {{ .Values.hubble.timescape.ui.enabled }}
    {{- if .Values.hubble.timescape.ui.enabled }}
    ui:
      http-address: ":8080"
      {{- if .Values.hubble.rbac.enabled }}
      timescape-address: "localhost:4245"
      {{- else }}
      timescape-address: "localhost:4244"
      {{- end }}
      {{- if eq (include "hubble.timescape.tls.enabled" .) "true" }}
      timescape-enable-tls: true
      timescape-ca-files: /var/lib/hubble-timescape/tls/ca.crt
      {{- else }}
      timescape-enable-tls: false
      {{- end }}
      {{- if (eq (include "hubble.timescape.ui.auth.enabled" .) "true") }}
      oauth2:
        enabled: true
        oidc:
          {{- $clientID := .Values.hubble.timescape.ui.auth.oidc.clientID | default .Values.hubble.rbac.auth.oidc.clientID }}
          {{- if not $clientID }}
          {{ fail "Invalid configuration, .hubble.timescape.ui.auth.oidc.clientID needs to be set when authentication is enabled." }}
          {{- end }}
          client-id: {{ $clientID }}
          client-assertion-type: {{ .Values.hubble.timescape.ui.auth.oidc.clientAssertionType }}
          client-assertion-file: {{ .Values.hubble.timescape.ui.auth.oidc.clientAssertionFile }}

          {{- $issuerURL := .Values.hubble.timescape.ui.auth.oidc.issuerURL | default .Values.hubble.rbac.auth.oidc.issuerUrl }}
          {{- if not $issuerURL }}
          {{ fail "Invalid configuration, .hubble.timescape.ui.auth.oidc.issuerURL needs to be set when authentication is enabled." }}
          {{- end }}
          issuer-url: {{ $issuerURL }}
          {{- $oidcRedirectURL := .Values.hubble.timescape.ui.auth.oidc.redirectURL }}
          {{- if and (not $oidcRedirectURL) .Values.hubble.timescape.ui.ingress.enabled .Values.hubble.timescape.ui.ingress.hosts }}
          {{- if .Values.hubble.timescape.ui.ingress.tls }}
          {{- $oidcRedirectURL = printf "https://%s/oauth2/callback" (index .Values.hubble.timescape.ui.ingress.hosts 0) }}
          {{- else }}
          {{- $oidcRedirectURL = printf "http://%s/oauth2/callback" (index .Values.hubble.timescape.ui.ingress.hosts 0) }}
          {{- end }}
          {{- end }}
          {{- if not $oidcRedirectURL }}
          {{ fail "Invalid configuration, .hubble.timescape.ui.auth.oidc.redirectURL needs to be set to to URI_USED_TO_ACCESS_TIMESCAPE_UI/oauth2/callback, when authentication is enabled." }}
          {{- end }}
          redirect-url: {{ $oidcRedirectURL }}
          scopes: {{- .Values.hubble.timescape.ui.auth.oidc.scopes | toYaml | nindent 10 }}
          {{- if or .Values.hubble.timescape.ui.auth.oidc.issuerCA.configMap.name .Values.hubble.rbac.auth.oidc.ca.configMap.name }}
          issuer-ca: /var/lib/hubble-timescape/tls/oidc-provider-ca.pem
          {{- end }}
          id-token-user-claim: {{ .Values.hubble.timescape.ui.auth.oidc.idTokenUserClaim | quote }}
          {{- with .Values.hubble.timescape.ui.auth.oidc.extraFields }}
          {{- $extraFields := list }}
          {{- range . }}
            {{- if not .key }}
            {{ fail "Invalid configuration, .Values.hubble.timescape.ui.auth.oidc.extraFields[].key is required and cannot be empty." }}
            {{- end }}
            {{- $extraField := printf "%s=%s" .key (.value | default "") }}
            {{- $extraFields = append $extraFields $extraField }}
          {{- end }}
          extra-fields: {{ join "," $extraFields | quote }}
          {{- end }}
      {{- end }}
    {{- end }}
---
{{- if .Values.hubble.timescape.ui.enabled }}
{{- if .Values.hubble.timescape.ui.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hubble-timescape-ui
  namespace: {{ include "cilium.namespace" . }}
  labels: {{ include "hubble.timescape.labels" . | nindent 4 }}
  {{- with .Values.hubble.timescape.ui.ingress.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.hubble.timescape.ui.ingress.className }}
  ingressClassName: {{ .Values.hubble.timescape.ui.ingress.className }}
  {{- end }}
  {{- with .Values.hubble.timescape.ui.ingress.tls }}
  tls: {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
  {{- range .Values.hubble.timescape.ui.ingress.hosts }}
    - host: {{ . }}
      http:
        paths:
          - path: "/"
            pathType: Prefix
            backend:
              service:
                name: hubble-timescape
                port:
                  name: ui
  {{- end }}
{{- end }}
{{- if .Values.hubble.timescape.ui.route.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hubble-timescape-ui
  namespace: {{ include "cilium.namespace" . }}
  labels: {{ include "hubble.timescape.labels" . | nindent 4 }}
  {{- with .Values.hubble.timescape.ui.route.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.hubble.timescape.ui.route.parentRefs }}
  parentRefs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.hubble.timescape.ui.route.hostnames }}
  hostnames:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
  rules:
    {{- if .Values.hubble.timescape.ui.route.additionalRules }}
    {{- tpl (toYaml .Values.hubble.timescape.ui.route.additionalRules) $ | nindent 4 }}
    {{- end }}
    - backendRefs:
        - name: hubble-timescape
          port: 8080
      {{- with .Values.hubble.timescape.ui.route.filters }}
      filters:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.hubble.timescape.ui.route.matches }}
      matches:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
