{{- define "cilium.vector.labels" }}
k8s-app: cilium-vector
app.kubernetes.io/name: cilium-vector
app.kubernetes.io/part-of: cilium
{{ with .Values.commonLabels }}
{{- toYaml . }}
{{- end }}
{{- end }}

{{- if .Values.hubble.timescape.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cilium-vector
  namespace: {{ include "cilium.namespace" . }}
  labels: {{ include "cilium.vector.labels" . | nindent 4 }}
automountServiceAccountToken: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cilium-vector
  namespace: {{ include "cilium.namespace" . }}
  labels: {{ include "cilium.vector.labels" . | nindent 4 }}
data:
  vector.yaml: |
    api:
      address: 127.0.0.1:8686
      enabled: true
      playground: false
    data_dir: /vector-data-dir
    sinks:
      http_push_timescape_flow:
        batch:
          max_size: 50MB
          timeout_secs: 5
        encoding:
          codec: raw_message
        framing:
          method: newline_delimited
        inputs:
        - flow_logs
        type: http
        {{- if eq (include "hubble.timescape.tls.enabled" .) "true" }}
        uri: https://hubble-timescape.{{ .Release.Namespace }}.svc.cluster.local:4260/push?object_type=OBJECT_TYPE_FLOW
        tls:
          ca_file: "/var/lib/hubble/tls/ca.crt"
          crt_file: "/var/lib/hubble/tls/client.crt"
          key_file: "/var/lib/hubble/tls/client.key"
        {{- else }}
        uri: http://hubble-timescape.{{ .Release.Namespace }}.svc.cluster.local:4260/push?object_type=OBJECT_TYPE_FLOW
        {{- end }}
      http_push_timescape_k8sevent:
        batch:
          max_size: 50MB
          timeout_secs: 5
        encoding:
          codec: raw_message
        framing:
          method: newline_delimited
        inputs:
        - k8sevent_logs
        type: http
        {{- if eq (include "hubble.timescape.tls.enabled" .) "true" }}
        uri: https://hubble-timescape.{{ .Release.Namespace }}.svc.cluster.local:4260/push?object_type=OBJECT_TYPE_K8S_EVENT
        tls:
          ca_file: "/var/lib/hubble/tls/ca.crt"
          crt_file: "/var/lib/hubble/tls/client.crt"
          key_file: "/var/lib/hubble/tls/client.key"
        {{- else }}
        uri: http://hubble-timescape.{{ .Release.Namespace }}.svc.cluster.local:4260/push?object_type=OBJECT_TYPE_K8S_EVENT
        {{- end }}
      prom_exporter:
        address: 0.0.0.0:9090
        inputs:
        - internal_metrics
        type: prometheus_exporter
    sources:
      flow_logs:
        include:
        {{- if and .Values.extraConfig (hasKey .Values.extraConfig "export-file-path") }}
        - {{ index .Values.extraConfig "export-file-path" }}
        {{- else }}
        - /var/run/cilium/hubble/hubble.log
        {{- end }}
        type: file
      k8sevent_logs:
        include:
        - {{ .Values.hubble.k8sExporter.export.filePath }}
        type: file
      internal_metrics:
        type: internal_metrics
---
apiVersion: v1
kind: Service
metadata:
  name: cilium-vector-headless
  namespace: {{ include "cilium.namespace" . }}
  labels: {{ include "cilium.vector.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - name: api
      port: 8686
      protocol: TCP
      targetPort: 8686
    - name: prom-exporter
      port: 9090
      protocol: TCP
      targetPort: 9090
  selector: {{ include "cilium.vector.labels" . | nindent 4 }}
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: cilium-vector
  namespace: {{ include "cilium.namespace" . }}
  labels: {{ include "cilium.vector.labels" . | nindent 4 }}
spec:
  ports:
    - name: api
      port: 8686
      protocol: TCP
      targetPort: 8686
    - name: prom-exporter
      port: 9090
      protocol: TCP
      targetPort: 9090
  selector: {{ include "cilium.vector.labels" . | nindent 4 }}
  type: ClusterIP
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cilium-vector
  namespace: {{ include "cilium.namespace" . }}
  labels: {{ include "cilium.vector.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels: {{ include "cilium.vector.labels" . | nindent 8 }}
  minReadySeconds: 0
  template:
    metadata:
      labels: {{ include "cilium.vector.labels" . | nindent 10 }}
    spec:
      serviceAccountName: cilium-vector
      dnsPolicy: ClusterFirst
      containers:
        - name: vector
          image: {{ include "cilium.image" .Values.hubble.timescape.vector.image | quote }}
          imagePullPolicy: {{ .Values.hubble.timescape.vector.image.pullPolicy }}
          args:
            - --config-dir
            - /etc/vector/
          env:
            - name: VECTOR_LOG
              value: "info"
            - name: VECTOR_SELF_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: VECTOR_SELF_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: VECTOR_SELF_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: api
              containerPort: 8686
              protocol: TCP
            - name: prom-exporter
              containerPort: 9090
              protocol: TCP
          resources: {{ .Values.hubble.timescape.vector.resources | toYaml | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: "/vector-data-dir"
            - name: config
              mountPath: "/etc/vector/"
              readOnly: true
            - mountPath: /var/run/cilium/hubble
              name: hubble-logs
              readOnly: true
            {{- if eq (include "hubble.timescape.tls.enabled" .) "true" }}
            - mountPath: "/var/lib/hubble/tls"
              name: hubble-tls
              readOnly: true
            {{- end }}
      terminationGracePeriodSeconds: 60
      volumes:
        - name: config
          projected:
            sources:
              - configMap:
                  name: cilium-vector
        - name: data
          hostPath:
            path: "/var/lib/vector-cilium"
        - hostPath:
            path: /var/run/cilium/hubble
          name: hubble-logs
        {{- if eq (include "hubble.timescape.tls.enabled" .) "true" }}
        - name: hubble-tls
          projected:
            defaultMode: 0400
            sources:
            - secret:
                items:
                - key: tls.crt
                  path: client.crt
                - key: tls.key
                  path: client.key
                - key: ca.crt
                  path: ca.crt
                name: {{ .Values.hubble.timescape.tls.client.existingSecret | default "hubble-timescape-client-certs" }}
        {{- end }}
{{- end }}
