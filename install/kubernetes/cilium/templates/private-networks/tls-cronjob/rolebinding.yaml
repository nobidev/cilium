{{- if and .Values.enterprise.privateNetworks.enabled .Values.enterprise.privateNetworks.api.tls.enabled (eq .Values.enterprise.privateNetworks.api.tls.method "cronJob") .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cilium-private-networks-generate-certs
  namespace: {{ include "cilium.namespace" . }}
  labels:
    app.kubernetes.io/part-of: cilium
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cilium-private-networks-generate-certs
subjects:
- kind: ServiceAccount
  name: "cilium-private-networks-generate-certs"
  namespace: {{ include "cilium.namespace" . }}
{{- end }}
