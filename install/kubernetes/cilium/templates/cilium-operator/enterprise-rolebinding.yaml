{{- if and .Values.operator.enabled .Values.serviceAccounts.operator.create .Values.enterprise.standaloneLoadbalancer.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cilium-operator-slb-secrets
  namespace: {{ .Values.envoyConfig.secretsNamespace.Name | quote }}
  {{- with .Values.operator.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    app.kubernetes.io/part-of: cilium
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cilium-operator-slb-secrets
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccounts.operator.name | quote }}
    namespace: {{ .Release.Namespace }}
{{- end }}

