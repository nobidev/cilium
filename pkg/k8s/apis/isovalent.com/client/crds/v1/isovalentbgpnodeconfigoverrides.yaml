                            type: string
                          localPort:
                            description: LocalPort is source port to use for connecting
                              to this peer.
                            format: int32
                            type: integer
                          name:
                            description: Name is the name of the peer for which the
                              configuration is overridden.
                            maxLength: 255
                            minLength: 1
                            type: string
                        required:
                        - name
                        type: object
                      type: array
                      x-kubernetes-list-map-keys:
                      - name
                      x-kubernetes-list-type: map
                    routerID:
                      description: RouterID is BGP router id to use for this instance.
                        It must be unique across all BGP instances.
                      format: ipv4
                      type: string
                    srv6Responder:
                      description: SRv6 Responder is a flag to enable SRv6 responder
                        functionality on this BGP instance.
                      type: boolean
                  required:
                  - name
                  type: object
                minItems: 1
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
            required:
            - bgpInstances
            type: object
