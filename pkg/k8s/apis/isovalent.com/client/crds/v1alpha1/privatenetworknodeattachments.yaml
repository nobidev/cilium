---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: privatenetworknodeattachments.isovalent.com
spec:
  group: isovalent.com
  names:
    categories:
    - cilium
    - isovalent
    kind: PrivateNetworkNodeAttachment
    listKind: PrivateNetworkNodeAttachmentList
    plural: privatenetworknodeattachments
    shortNames:
    - pnna
    singular: privatenetworknodeattachment
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: PrivateNetworkNodeAttachment defines a node device management
          of private networks.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: The private network specification.
            properties:
              attachments:
                description: Attachments is a list of egress devices to be configured
                  on the selected nodes.
                items:
                  properties:
                    interface:
                      description: |-
                        Interface specifies the network interface used for private network
                        traffic ingress and egress on the selected nodes. This interface must be
                        present on the node and appropriately connected to underlying network
                        infrastructure.
                      type: string
                    subnetRefs:
                      description: |-
                        Subnets is a list of subnets reachable via this attachment.

                        If empty / nil means all subnets configured in the private-network resource
                        are selected.
                      items:
                        properties:
                          name:
                            description: Name of the Subnet specified in the private-network
                              resource.
                            type: string
                        required:
                        - name
                        type: object
                      type: array
                    vlanID:
                      description: |-
                        VlanID, when specified, result in Cilium to create a DOT1Q VLAN subinterface
                        with parent device specified in Interface.
                      maximum: 4094
                      minimum: 1
                      type: integer
                  required:
                  - interface
                  type: object
                minItems: 1
                type: array
                x-kubernetes-list-map-keys:
                - interface
                x-kubernetes-list-type: map
              nodeSelector:
                description: |-
                  NodeSelector selects the nodes to which this configuration applies.

                  If empty / omitted then this config will apply to all nodes.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          enum:
                          - In
                          - NotIn
                          - Exists
                          - DoesNotExist
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      description: MatchLabelsValue represents the value from the
                        MatchLabels {key,value} pair.
                      maxLength: 63
                      pattern: ^(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])?$
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
