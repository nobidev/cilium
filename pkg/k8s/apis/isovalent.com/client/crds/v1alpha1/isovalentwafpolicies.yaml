---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: isovalentwafpolicies.isovalent.com
spec:
  group: isovalent.com
  names:
    categories:
    - cilium
    - isovalent
    - loadbalancer
    kind: IsovalentWAFPolicy
    listKind: IsovalentWAFPolicyList
    plural: isovalentwafpolicies
    shortNames:
    - wafpolicy
    singular: isovalentwafpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.status
      name: Status
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          IsovalentWAFPolicy defines reusable WAF settings and custom rules that can be
          attached to selected resources within the same namespace. For MVP, targets
          only support LBServices.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              enabled:
                description: Enabled explicitly enables or disables WAF for the selected
                  resources.
                type: boolean
              failureMode:
                description: |-
                  FailureMode controls what happens when the WAF backend cannot evaluate a request.
                  If omitted, the global WAF setting is used.
                enum:
                - Open
                - Close
                type: string
              mode:
                description: |-
                  Mode controls whether WAF only monitors traffic or actively enforces decisions.
                  If omitted, the global WAF setting is used.
                enum:
                - Monitor
                - Enforce
                type: string
              rules:
                description: |-
                  Rules selects either a managed WAF profile or a fully custom ruleset.
                  If omitted, the global WAF rules are used.
                properties:
                  custom:
                    description: Custom provides a fully custom WAF ruleset.
                    properties:
                      inline:
                        description: |-
                          Inline provides a fully custom WAF ruleset directly in the resource.
                          Multi-line values should be provided as a YAML block scalar.
                        type: string
                      profile:
                        description: |-
                          Profile provides explicit CRS tuning for this policy as an alternative
                          to inline custom rules.
                        properties:
                          blockingParanoiaLevel:
                            description: BlockingParanoiaLevel controls which CRS
                              blocking rules are enabled.
                            format: int32
                            maximum: 4
                            minimum: 1
                            type: integer
                          detectionParanoiaLevel:
                            description: DetectionParanoiaLevel controls which CRS
                              detection rules run.
                            format: int32
                            maximum: 4
                            minimum: 1
                            type: integer
                          inboundAnomalyScoreThreshold:
                            description: InboundAnomalyScoreThreshold controls the
                              inbound blocking threshold.
                            format: int32
                            minimum: 0
                            type: integer
                          outboundAnomalyScoreThreshold:
                            description: OutboundAnomalyScoreThreshold controls the
                              outbound blocking threshold.
                            format: int32
                            minimum: 0
                            type: integer
                        required:
                        - blockingParanoiaLevel
                        - detectionParanoiaLevel
                        - inboundAnomalyScoreThreshold
                        - outboundAnomalyScoreThreshold
                        type: object
                    type: object
                    x-kubernetes-validations:
                    - message: exactly one of inline or profile must be specified
                      rule: has(self.inline) != has(self.profile)
                  managed:
                    description: Managed selects the built-in WAF rules shipped by
                      the platform.
                    properties:
                      profile:
                        description: Profile selects the built-in WAF profile to use
                          with managed rules.
                        enum:
                        - max_security
                        - high_security
                        - balanced
                        - low_friction
                        - min_friction
                        type: string
                    required:
                    - profile
                    type: object
                type: object
                x-kubernetes-validations:
                - message: exactly one of managed or custom must be specified
                  rule: has(self.managed) != has(self.custom)
              targets:
                anyOf:
                - properties:
                    lbServices: {}
                  required:
                  - lbServices
                description: Targets defines the resources that this WAF policy should
                  apply to.
                properties:
                  lbServices:
                    anyOf:
                    - properties:
                        labelSelector: {}
                      required:
                      - labelSelector
                    description: |-
                      LBServices selects the LBServices that should be handled by this
                      IsovalentWAFPolicy.
                    properties:
                      labelSelector:
                        description: |-
                          LabelSelector is a label selector that selects the LBServices within the same namespace.

                          Note: An empty label selector (neither MatchLabels nor MatchExpressions defined)
                          matches all LBServices in the same namespace.
                        properties:
                          matchExpressions:
                            description: matchExpressions is a list of label selector
                              requirements. The requirements are ANDed.
                            items:
                              description: |-
                                A label selector requirement is a selector that contains values, a key, and an operator that
                                relates the key and values.
                              properties:
                                key:
                                  description: key is the label key that the selector
                                    applies to.
                                  type: string
                                operator:
                                  description: |-
                                    operator represents a key's relationship to a set of values.
                                    Valid operators are In, NotIn, Exists and DoesNotExist.
                                  enum:
                                  - In
                                  - NotIn
                                  - Exists
                                  - DoesNotExist
                                  type: string
                                values:
                                  description: |-
                                    values is an array of string values. If the operator is In or NotIn,
                                    the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                    the values array must be empty. This array is replaced during a strategic
                                    merge patch.
                                  items:
                                    type: string
                                  type: array
                                  x-kubernetes-list-type: atomic
                              required:
                              - key
                              - operator
                              type: object
                            type: array
                            x-kubernetes-list-type: atomic
                          matchLabels:
                            additionalProperties:
                              description: MatchLabelsValue represents the value from
                                the MatchLabels {key,value} pair.
                              maxLength: 63
                              pattern: ^(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])?$
                              type: string
                            description: |-
                              matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                              map is equivalent to an element of matchExpressions, whose key field is "key", the
                              operator is "In", and the values array contains only "value". The requirements are ANDed.
                            type: object
                        type: object
                        x-kubernetes-map-type: atomic
                    type: object
                type: object
            required:
            - enabled
            - targets
            type: object
            x-kubernetes-validations:
            - message: spec.targets.lbServices must be specified
              rule: has(self.targets.lbServices)
          status:
            properties:
              conditions:
                description: The current conditions of the IsovalentWAFPolicy.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              status:
                description: Status of the resource.
                enum:
                - OK
                - ConditionNotMet
                type: string
            required:
            - status
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
