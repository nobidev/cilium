---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.3
  name: lbfrontends.isovalent.com
spec:
  group: isovalent.com
  names:
    categories:
    - cilium
    - isovalent
    - loadbalancer
    kind: LBFrontend
    listKind: LBFrontendList
    plural: lbfrontends
    shortNames:
    - lbfe
    singular: lbfrontend
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.vipRef.name
      name: VIP Reference
      type: string
    - jsonPath: .status.addresses.ipv4
      name: VIP IPv4
      type: string
    - jsonPath: .spec.port
      name: Port
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              applications:
                description: |-
                  The configuration for the applications that running on the port.
                  While the name is plural, only one application can be specified
                  currently.
                properties:
                  httpProxy:
                    description: |-
                      Defining this stanza enables HTTPProxy application that proxies the
                      HTTP traffic to the backends over TCP connection.
                    properties:
                      httpConfig:
                        description: The application-wide HTTP configuration.
                        properties:
                          enableHTTP2:
                            description: Setting this to true enables HTTP2.
                            type: boolean
                          enableHTTP11:
                            description: Setting this to true enables HTTP/1.1.
                            type: boolean
                        type: object
                        x-kubernetes-validations:
                        - message: At least one http version must be enabled
                          rule: (has(self.enableHTTP11) && self.enableHTTP11) || (has(self.enableHTTP2)
                            && self.enableHTTP2)
                      routes:
                        description: The HTTP routing configuration.
                        items:
                          properties:
                            backendRef:
                              description: |-
                                The reference to the LBBackendPool resource that this route should
                                forward the traffic to when the route is matched. The referred
                                LBBackendPool must exist in the same namespace as the LBFrontend.
                              properties:
                                name:
                                  description: The name of the LBBackendPool resource.
                                  minLength: 1
                                  type: string
                              required:
                              - name
                              type: object
                            match:
                              description: |-
                                The HTTP route matching criteria. All conditions must be satisfied
                                for the route to be matched.
                              properties:
                                hostNames:
                                  description: |-
                                    The list of host names that the route should match. The host name is
                                    the value of the Host header in the HTTP request for plain-text
                                    HTTP. When TLS is enabled, the host name must match both the SNI and
                                    the Host header. The following formats are supported:

                                    - Exact domain names: www.example.com

                                    - Suffix domain wildcards: *.example.com or *-bar.example.com

                                    - Prefix domain wildcards: foo.* or foo-*.

                                    - Special wildcard: * matching any domain

                                    Omitting this field is identical to specifying a wildcard "*".
                                  items:
                                    maxLength: 253
                                    minLength: 1
                                    pattern: ^(\*\.)?[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                                    type: string
                                  type: array
                                path:
                                  description: |-
                                    The path matching criteria. When omitted, the route matches all
                                    paths.
                                  properties:
                                    exact:
                                      description: Exact matching. The path must be
                                        exactly the same as the value.
                                      minLength: 1
                                      type: string
                                    prefix:
                                      description: Prefix matching. The path must
                                        start with the value.
                                      minLength: 1
                                      type: string
                                  type: object
                                  x-kubernetes-validations:
                                  - message: Exactly one path type (exact or prefix)
                                      must be specified
                                    rule: (has(self.exact) || has(self.prefix)) &&
                                      !(has(self.exact) && has(self.prefix))
                              type: object
                          required:
                          - backendRef
                          type: object
                        minItems: 1
                        type: array
                    required:
                    - routes
                    type: object
                  httpsProxy:
                    description: |-
                      Defining this stanza enables HTTPSProxy application that proxies the
                      HTTPS traffic to the backends over TLS and TCP connections.
                    properties:
                      httpConfig:
                        description: The application-wide HTTP configuration.
                        properties:
                          enableHTTP2:
                            description: Setting this to true enables HTTP2.
                            type: boolean
                          enableHTTP11:
                            description: Setting this to true enables HTTP/1.1.
                            type: boolean
                        type: object
                        x-kubernetes-validations:
                        - message: At least one http version must be enabled
                          rule: (has(self.enableHTTP11) && self.enableHTTP11) || (has(self.enableHTTP2)
                            && self.enableHTTP2)
                      routes:
                        description: The HTTP routing configuration.
                        items:
                          properties:
                            backendRef:
                              description: |-
                                The reference to the LBBackendPool resource that this route should
                                forward the traffic to when the route is matched. The referred
                                LBBackendPool must exist in the same namespace as the LBFrontend.
                              properties:
                                name:
                                  description: The name of the LBBackendPool resource.
                                  minLength: 1
                                  type: string
                              required:
                              - name
                              type: object
                            match:
                              description: |-
                                The HTTP route matching criteria. All conditions must be satisfied
                                for the route to be matched.
                              properties:
                                hostNames:
                                  description: |-
                                    The list of host names that the route should match. The host name is
                                    the value of the Host header in the HTTP request for plain-text
                                    HTTP. When TLS is enabled, the host name must match both the SNI and
                                    the Host header. The following formats are supported:

                                    - Exact domain names: www.example.com

                                    - Suffix domain wildcards: *.example.com or *-bar.example.com

                                    - Prefix domain wildcards: foo.* or foo-*.

                                    - Special wildcard: * matching any domain

                                    Omitting this field is identical to specifying a wildcard "*".
                                  items:
                                    maxLength: 253
                                    minLength: 1
                                    pattern: ^(\*\.)?[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                                    type: string
                                  type: array
                                path:
                                  description: |-
                                    The path matching criteria. When omitted, the route matches all
                                    paths.
                                  properties:
                                    exact:
                                      description: Exact matching. The path must be
                                        exactly the same as the value.
                                      minLength: 1
                                      type: string
                                    prefix:
                                      description: Prefix matching. The path must
                                        start with the value.
                                      minLength: 1
                                      type: string
                                  type: object
                                  x-kubernetes-validations:
                                  - message: Exactly one path type (exact or prefix)
                                      must be specified
                                    rule: (has(self.exact) || has(self.prefix)) &&
                                      !(has(self.exact) && has(self.prefix))
                              type: object
                          required:
                          - backendRef
                          type: object
                        minItems: 1
                        type: array
                      tlsConfig:
                        description: The application-wide TLS configuration.
                        properties:
                          allowedCipherSuites:
                            description: |-
                              Allowed TLS cipher suites.

                              If not defined, the defaults of the Envoy proxy are used.
                              https://www.envoyproxy.io/docs/envoy/latest/api-v3/extensions/transport_sockets/tls/v3/common.proto#extensions-transport-sockets-tls-v3-tlsparameters
                            items:
                              minLength: 1
                              type: string
                            type: array
                          allowedECDHCurves:
                            description: |-
                              Allowed ECDH Curves.

                              If not defined, the defaults of the Envoy proxy are used.
                              https://www.envoyproxy.io/docs/envoy/latest/api-v3/extensions/transport_sockets/tls/v3/common.proto#extensions-transport-sockets-tls-v3-tlsparameters
                            items:
                              minLength: 1
                              type: string
                            type: array
                          allowedSignatureAlgorithms:
                            description: |-
                              Allowed signature algorithms. The list is ordered by preference.

                              If not defined, the defaults of the Envoy proxy are used.
                              https://www.envoyproxy.io/docs/envoy/latest/api-v3/extensions/transport_sockets/tls/v3/common.proto#extensions-transport-sockets-tls-v3-tlsparameters
                            items:
                              minLength: 1
                              type: string
                            type: array
                          certificates:
                            description: The list of certificates that the frontend
                              uses.
                            items:
                              properties:
                                secretRef:
                                  description: |-
                                    Reference to K8s secret in the same namespace that contains
                                    the certificate and the private key that the frontend uses.

                                    The secret type must be kubernetes.io/tls and the
                                    format must follow the spec.

                                    https://kubernetes.io/docs/concepts/configuration/secret/#tls-secrets
                                  properties:
                                    name:
                                      description: The name of the K8s Secret resource.
                                      minLength: 1
                                      type: string
                                  required:
                                  - name
                                  type: object
                              required:
                              - secretRef
                              type: object
                            minItems: 1
                            type: array
                          maxTLSVersion:
                            description: |-
                              Maximum TLS version.

                              If not defined, the defaults of the Envoy proxy are used.
                              https://www.envoyproxy.io/docs/envoy/latest/api-v3/extensions/transport_sockets/tls/v3/common.proto#extensions-transport-sockets-tls-v3-tlsparameters
                            enum:
                            - TLSv1_0
                            - TLSv1_1
                            - TLSv1_2
                            - TLSv1_3
                            type: string
                          minTLSVersion:
                            description: |-
                              Minimum TLS version.

                              If not defined, the defaults of the Envoy proxy are used.
                              https://www.envoyproxy.io/docs/envoy/latest/api-v3/extensions/transport_sockets/tls/v3/common.proto#extensions-transport-sockets-tls-v3-tlsparameters
                            enum:
                            - TLSv1_0
                            - TLSv1_1
                            - TLSv1_2
                            - TLSv1_3
                            type: string
                          validation:
                            description: Optional certificate verification.
                            properties:
                              secretRef:
                                description: The k8s secret that contains the trusted
                                  CA in the secret data field `ca.crt`.
                                properties:
                                  name:
                                    description: The name of the K8s Secret resource.
                                    minLength: 1
                                    type: string
                                required:
                                - name
                                type: object
                              subjectAlternativeNames:
                                description: Allowed subject alternative names
                                items:
                                  properties:
                                    exact:
                                      description: Exact matching. The SAN must be
                                        exactly the same as the value.
                                      minLength: 1
                                      type: string
                                  required:
                                  - exact
                                  type: object
                                type: array
                            required:
                            - secretRef
                            type: object
                        required:
                        - certificates
                        type: object
                    required:
                    - routes
                    type: object
                  tlsPassthrough:
                    description: |-
                      Defining this stanza enables TLSPassthrough application that proxies
                      the TLS traffic without terminating the TLS connection.
                    properties:
                      routes:
                        description: The TLS passthrough routing configuration.
                        items:
                          properties:
                            backendRef:
                              description: |-
                                The reference to the LBBackendPool resource that this route should
                                forward the traffic to when the route is matched. The referred
                                LBBackendPool must exist in the same namespace as the LBFrontend.
                              properties:
                                name:
                                  description: The name of the LBBackendPool resource.
                                  minLength: 1
                                  type: string
                              required:
                              - name
                              type: object
                            match:
                              description: |-
                                The TLS route matching criteria. All conditions must be satisfied
                                for the route to be matched.
                              properties:
                                hostNames:
                                  description: |-
                                    The list of host names that the route should match. The host name is
                                    the value of the Host header in the HTTP request for plain-text
                                    HTTP. When TLS is enabled, the host name must match both the SNI and
                                    the Host header. The following formats are supported:

                                    - Exact domain names: www.example.com

                                    - Suffix domain wildcards: *.example.com or *-bar.example.com

                                    - Prefix domain wildcards: foo.* or foo-*.

                                    - Special wildcard: * matching any domain

                                    Omitting this field is identical to specifying a wildcard "*".
                                  items:
                                    maxLength: 253
                                    minLength: 1
                                    pattern: ^(\*\.)?[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                                    type: string
                                  type: array
                              type: object
                          required:
                          - backendRef
                          type: object
                        minItems: 1
                        type: array
                    required:
                    - routes
                    type: object
                type: object
                x-kubernetes-validations:
                - message: Exactly one application (httpProxy, httpsProxy or tlsPassthrough)
                    must be specified
                  rule: (has(self.httpProxy) || has(self.httpsProxy) || has(self.tlsPassthrough))
                    && !(has(self.httpProxy) && has(self.httpsProxy)) && !(has(self.httpProxy)
                    && has(self.tlsPassthrough)) && !(has(self.httpsProxy) && has(self.tlsPassthrough))
              port:
                description: The port that this frontend should listen on.
                format: int32
                maximum: 65535
                minimum: 1
                type: integer
              vipRef:
                description: |-
                  The reference to the LBVIP resource that the LBFrontend should be
                  associated with. The referred LBVIP must exist in the same namespace
                  as the frontend. Multiple LBFrontends can refer to the same LBVIP to
                  share the same VIP, but the port must be different.
                properties:
                  name:
                    description: The name of the LBVIP resource.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
            required:
            - applications
            - port
            - vipRef
            type: object
          status:
            properties:
              addresses:
                description: |-
                  Allocated addresses for the LBFrontend. The value is copied from the
                  LBVIP's status that the frontend refers to. This field exists for
                  the cosmetic purpose of showing the VIP in the kubectl output. You
                  should use LBVIP's status field as the source of truth.
                properties:
                  ipv4:
                    description: IPv4 VIP assigned to the LBFrontend.
                    type: string
                type: object
              conditions:
                description: The current conditions of the LBFrontend.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            required:
            - addresses
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
