---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
  name: clusterwideprivatenetworks.isovalent.com
spec:
  group: isovalent.com
  names:
    categories:
    - cilium
    - isovalent
    kind: ClusterwidePrivateNetwork
    listKind: ClusterwidePrivateNetworkList
    plural: clusterwideprivatenetworks
    shortNames:
    - icpn
    singular: clusterwideprivatenetwork
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ClusterwidePrivateNetwork defines a private network to which
          workloads can be attached.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: The private network specification.
            properties:
              interface:
                description: |-
                  The network interface providing external connectivity to this private
                  network. This stanza shall be specified in the Isovalent Network Bridge
                  cluster only.
                properties:
                  name:
                    description: |-
                      The name of the network interface providing connectivity towards the
                      given private network. This field shall be specified in the Isovalent
                      Network Bridge cluster only.
                    type: string
                type: object
              networkBridges:
                description: |-
                  The list of Isovalent Network Bridges (INBs) serving this private network.
                  Currently, only a single INB per private network is supported, and
                  subsequent ones are ignored. This stanza shall be specified in the
                  main workload cluster(s) only, and not in the INB clusters.
                items:
                  properties:
                    ip:
                      description: The node IP of the Isovalent Network Bridge.
                      format: ip
                      type: string
                  required:
                  - ip
                  type: object
                type: array
              routes:
                description: The set of routes configured for this private network.
                items:
                  description: RouteSpec is the routing specification for a pod network.
                  properties:
                    destination:
                      description: Destination is the route's destination CIDR.
                      format: cidr
                      type: string
                    gateway:
                      description: Gateway is the route's gateway IP address.
                      format: ip
                      type: string
                  required:
                  - destination
                  type: object
                type: array
              subnets:
                description: |-
                  The set of subnets (that is, L2 domains) associated with, and directly
                  reachable, from this private network.
                items:
                  properties:
                    cidr:
                      description: The CIDR (either v4 or v6) associated with the
                        private network.
                      format: cidr
                      type: string
                  required:
                  - cidr
                  type: object
                minItems: 1
                type: array
            required:
            - subnets
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
