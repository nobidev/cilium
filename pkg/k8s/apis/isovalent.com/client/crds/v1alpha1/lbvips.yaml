---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: lbvips.isovalent.com
spec:
  group: isovalent.com
  names:
    categories:
    - cilium
    - isovalent
    - loadbalancer
    kind: LBVIP
    listKind: LBVIPList
    plural: lbvips
    shortNames:
    - lbvip
    singular: lbvip
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.addresses.ipv4
      name: IPv4
      type: string
    - jsonPath: .status.addresses.ipv6
      name: IPv6
      type: string
    - jsonPath: .status.status
      name: Status
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              addressFamily:
                description: |-
                  AddressFamily defines the IP address families that should be handled by this VIP.
                  For address family 'dual' an IP pool with free IPs for IPv4 and IPv6 must be configured.

                  If not defined, the default is ipv4.
                enum:
                - ipv4
                - ipv6
                - dual
                type: string
              ipv4Request:
                description: |-
                  Desired IPv4 VIP. If the address is unspecified, and the address
                  family is IPv4 or Dual, then it tries to allocate available VIP from
                  the pool. If address is specified, it tries to allocate specified
                  VIP from the pool.
                format: ipv4
                type: string
              ipv6Request:
                description: |-
                  Desired IPv6 VIP. If the address is unspecified, and the address
                  family is IPv6 or Dual, then it tries to allocate available VIP from
                  the pool. If address is specified, it tries to allocate specified
                  VIP from the pool.
                format: ipv6
                type: string
            type: object
            x-kubernetes-validations:
            - message: For addressFamily dual only no or all (IPv4 & IPv6) IPs can
                be requested
              rule: '!has(self.addressFamily) || self.addressFamily != ''dual'' ||
                (has(self.ipv4Request) == has(self.ipv6Request))'
            - message: IPv4 can only be requested for addressFamily ipv4 or dual
              rule: '!has(self.ipv4Request) || (!has(self.addressFamily) || self.addressFamily
                == ''dual'' || self.addressFamily == ''ipv4'')'
            - message: IPv6 can only be requested for addressFamily ipv6 or dual
              rule: '!has(self.ipv6Request) || (has(self.addressFamily) && (self.addressFamily
                == ''dual'' || self.addressFamily == ''ipv6''))'
          status:
            properties:
              addresses:
                description: Allocated addresses
                properties:
                  ipv4:
                    description: The allocated IPv4 VIP.
                    type: string
                  ipv6:
                    description: The allocated IPv6 VIP.
                    type: string
                type: object
              conditions:
                description: The current conditions of the LBVIP.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              status:
                description: Status of the resource.
                enum:
                - OK
                - ConditionNotMet
                type: string
            required:
            - addresses
            - status
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
