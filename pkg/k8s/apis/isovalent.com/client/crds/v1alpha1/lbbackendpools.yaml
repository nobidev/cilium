---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.3
  name: lbbackendpools.isovalent.com
spec:
  group: isovalent.com
  names:
    categories:
    - cilium
    - isovalent
    - loadbalancer
    kind: LBBackendPool
    listKind: LBBackendPoolList
    plural: lbbackendpools
    shortNames:
    - lbbep
    singular: lbbackendpool
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              backends:
                description: The list of backends included in the pool.
                items:
                  properties:
                    ip:
                      description: The IP address of the backend.
                      format: ip
                      type: string
                    port:
                      description: The port that the backend listens on.
                      format: int32
                      maximum: 65535
                      minimum: 1
                      type: integer
                  required:
                  - ip
                  - port
                  type: object
                type: array
              healthCheck:
                description: The pool-wide health check configuration.
                properties:
                  healthyThreshold:
                    default: 2
                    description: |-
                      The number of consecutive successful health check probes required
                      before considering the backend healthy.
                    format: int32
                    minimum: 1
                    type: integer
                  http:
                    description: |-
                      The HTTP health check configuration. Exactly one of http or tcp must
                      be specified.
                    properties:
                      host:
                        default: lb
                        description: |-
                          The host name to use in the HTTP health checking probe. When
                          omitted, the probe uses "lb".
                        minLength: 1
                        type: string
                      path:
                        default: /healthz
                        description: |-
                          The path to use in the HTTP health checking probe. When omitted, the
                          probe uses "/healthz".
                        minLength: 1
                        type: string
                    type: object
                  intervalSeconds:
                    default: 30
                    description: The interval between health check probes.
                    format: int32
                    minimum: 1
                    type: integer
                  tcp:
                    description: |-
                      The TCP health check configuration. Exactly one of http or tcp must
                      be specified.
                    type: object
                  timeoutSeconds:
                    default: 5
                    description: The timeout for each health check probe.
                    format: int32
                    minimum: 1
                    type: integer
                  unhealthyThreshold:
                    default: 2
                    description: |-
                      The number of consecutive failed health check probes required before
                      considering the backend unhealthy.
                    format: int32
                    minimum: 1
                    type: integer
                type: object
                x-kubernetes-validations:
                - message: Exactly one health check (HTTP or TCP) must be specified
                  rule: (has(self.tcp) || has(self.http)) && !(has(self.tcp) && has(self.http))
              httpConfig:
                description: The pool-wide HTTP configuration.
                properties:
                  enableHTTP2:
                    description: Setting this to true enables HTTP2.
                    type: boolean
                  enableHTTP11:
                    description: Setting this to true enables HTTP/1.1.
                    type: boolean
                type: object
              loadbalancing:
                description: The pool-wide loadbalancing configuration.
                properties:
                  algorithm:
                    description: LB algorithm configuration.
                    properties:
                      consistentHashing:
                        description: The consistent hashing algorithm configuration.
                          Exactly one of roundRobin, leastRequest or consistentHashing
                          must be specified.
                        properties:
                          algorithm:
                            description: Consistent hashing algorithm configuration.
                            properties:
                              maglev:
                                description: The maglev configuration.
                                properties:
                                  tableSize:
                                    description: The table size for Maglev hashing.
                                      Maglev aims for "minimal disruption" rather
                                      than an absolute guarantee. Minimal disruption
                                      means that when the set of upstream hosts change,
                                      a connection will likely be sent to the same
                                      upstream as it was before. Increasing the table
                                      size reduces the amount of disruption. The table
                                      size must be prime number limited to 5000011.
                                      If it is not specified, the default is 65537.
                                    format: int32
                                    maximum: 5000011
                                    minimum: 1
                                    type: integer
                                type: object
                            required:
                            - maglev
                            type: object
                        type: object
                      leastRequest:
                        description: The least request algorithm configuration. Exactly
                          one of roundRobin, leastRequest or consistentHashing must
                          be specified.
                        type: object
                      roundRobin:
                        description: The round robin algorithm configuration. Exactly
                          one of roundRobin, leastRequest or consistentHashing must
                          be specified.
                        type: object
                    type: object
                    x-kubernetes-validations:
                    - message: Exactly one algorithm (RoundRobin, LeastRequest or
                        ConsistentHashing) must be specified
                      rule: (has(self.roundRobin) || has(self.leastRequest) || has(self.consistentHashing))
                        && !(has(self.roundRobin) && has(self.leastRequest)) && !(has(self.roundRobin)
                        && has(self.consistentHashing)) && !(has(self.leastRequest)
                        && has(self.consistentHashing))
                required:
                - algorithm
                type: object
              tlsConfig:
                description: The pool-wide TLS configuration.
                properties:
                  allowedCipherSuites:
                    description: Allowed TLS cipher suites.
                    items:
                      minLength: 1
                      type: string
                    type: array
                  allowedECDHCurves:
                    description: Allowed ECDH Curves.
                    items:
                      minLength: 1
                      type: string
                    type: array
                  allowedSignatureAlgorithms:
                    description: Allowed signature algorithms. The list is ordered
                      by preference.
                    items:
                      minLength: 1
                      type: string
                    type: array
                  maxTLSVersion:
                    description: Maximum TLS version.
                    enum:
                    - TLSv1_0
                    - TLSv1_1
                    - TLSv1_2
                    - TLSv1_3
                    type: string
                  minTLSVersion:
                    description: Minimum TLS version.
                    enum:
                    - TLSv1_0
                    - TLSv1_1
                    - TLSv1_2
                    - TLSv1_3
                    type: string
                type: object
            required:
            - backends
            - healthCheck
            type: object
          status:
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
