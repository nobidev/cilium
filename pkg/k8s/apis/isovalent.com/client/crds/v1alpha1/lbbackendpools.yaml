---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.3
  name: lbbackendpools.isovalent.com
spec:
  group: isovalent.com
  names:
    categories:
    - cilium
    - isovalent
    - loadbalancer
    kind: LBBackendPool
    listKind: LBBackendPoolList
    plural: lbbackendpools
    shortNames:
    - lbbep
    singular: lbbackendpool
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              backends:
                description: The list of backends included in the pool.
                items:
                  properties:
                    ip:
                      description: The IP address of the backend.
                      format: ip
                      type: string
                    port:
                      description: The port that the backend listens on.
                      format: int32
                      maximum: 65535
                      minimum: 1
                      type: integer
                  required:
                  - ip
                  - port
                  type: object
                type: array
              healthCheck:
                description: The pool-wide health check configuration.
                properties:
                  healthyThreshold:
                    default: 2
                    description: |-
                      The number of consecutive successful health check probes required
