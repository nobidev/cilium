---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
  name: lbbackendpools.isovalent.com
spec:
  group: isovalent.com
  names:
    categories:
    - cilium
    - isovalent
    - loadbalancer
    kind: LBBackendPool
    listKind: LBBackendPoolList
    plural: lbbackendpools
    shortNames:
    - lbbep
    singular: lbbackendpool
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.backendType
      name: Type
      type: string
    - jsonPath: .status.status
      name: Status
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              backendType:
                description: |-
                  Type of the backends. Either IP, Hostname or K8sService.
                  If IP is specified, backends must be specified by IP address.
                  If Hostname is specified, backends must be specified by host name.
                  If K8sService is specified, backends must be specified by a reference to a K8s Service.
                enum:
                - IP
                - Hostname
                - K8sService
                type: string
              backends:
                description: The list of backends included in the pool.
                items:
                  properties:
                    host:
                      description: The hostname of the backend. It must be a valid
                        hostname.
                      format: hostname
                      type: string
                    ip:
                      description: The IP address of the backend.
                      format: ip
                      type: string
                    k8sServiceRef:
                      description: |-
                        The reference to the K8s Service resource that should act as backend.
                        The referred K8s Service must exist in the same namespace
                        as the LBBackendPool.
                      properties:
                        name:
                          description: The name of the K8s Service resource.
                          minLength: 1
                          type: string
                      required:
                      - name
                      type: object
                    port:
                      description: The port that the backend listens on.
                      format: int32
                      maximum: 65535
                      minimum: 1
                      type: integer
                    status:
                      description: |-
                        The status of that backend.

                        If not defined, active health checking is used to determione the
                        status of the backend.
                      enum:
                      - Draining
                      type: string
                    weight:
                      description: |-
                        The weight of that backend. Used by loadbalancing algorithms.

                        The weight for a backend is divided by the sum
                        of the weights of all backends in the backendpool
                        to produce a percentage of traffic for the backend.
                      format: int32
                      maximum: 4294967295
                      minimum: 1
                      type: integer
                  required:
                  - port
                  type: object
                type: array
              dnsResolverConfig:
                description: |-
                  The custom DNS resolver configuration. Only valid when the
                  backendType is Hostname.
                properties:
                  resolvers:
                    description: |-
                      DNS resolvers to use for resolving host names. At least one resolver
                      must be specified. When specified, the LB uses the specified
                      resolvers and the default system resolvers are not used.
                    items:
                      properties:
                        ip:
                          description: The IP address of the DNS resolver.
                          format: ip
                          type: string
                        port:
                          description: The port of the DNS resolver.
                          format: int32
                          maximum: 65535
                          minimum: 1
                          type: integer
                      required:
                      - ip
                      - port
                      type: object
                    minItems: 1
                    type: array
                    x-kubernetes-list-map-keys:
                    - ip
                    - port
                    x-kubernetes-list-type: map
                required:
                - resolvers
                type: object
              healthCheck:
                description: The pool-wide health check configuration.
                oneOf:
                - properties:
                    http: {}
                  required:
                  - http
                - properties:
                    tcp: {}
                  required:
                  - tcp
                properties:
                  healthyThreshold:
                    default: 2
                    description: |-
                      The number of consecutive successful health check probes required
                      before considering the backend healthy.
                    format: int32
                    minimum: 1
                    type: integer
                  http:
                    description: |-
                      The HTTP health check configuration. Exactly one of http or tcp must
                      be specified.
                    properties:
                      host:
                        default: lb
                        description: |-
                          The host name to use in the HTTP health checking probe. When
                          omitted, the probe uses "lb".
                        minLength: 1
                        type: string
                      method:
                        default: GET
                        description: |-
                          The method to use in the HTTP health checking probe. When omitted, the
                          probe uses "GET".
                        enum:
                        - GET
                        - HEAD
                        - POST
                        - PUT
                        - DELETE
                        - CONNECT
                        - OPTIONS
                        - TRACE
                        - PATCH
                        type: string
                      path:
                        default: /healthz
                        description: |-
                          The path to use in the HTTP health checking probe. When omitted, the
                          probe uses "/healthz".
                        minLength: 1
                        type: string
                    type: object
                  intervalSeconds:
                    default: 30
                    description: The interval between health check probes.
                    format: int32
                    minimum: 1
                    type: integer
                  tcp:
                    description: |-
                      The TCP health check configuration. Exactly one of http or tcp must
                      be specified.
                    type: object
                  timeoutSeconds:
                    default: 5
                    description: The timeout for each health check probe.
                    format: int32
                    minimum: 1
                    type: integer
                  tlsConfig:
                    description: |-
                      The health check TLS configuration.

                      If not defined, no TLS is used for health checking.
                    properties:
                      allowedCipherSuites:
                        description: Allowed TLS cipher suites.
                        items:
                          minLength: 1
                          type: string
                        type: array
                      allowedECDHCurves:
                        description: Allowed ECDH Curves.
                        items:
                          minLength: 1
                          type: string
                        type: array
                      allowedSignatureAlgorithms:
                        description: Allowed signature algorithms. The list is ordered
                          by preference.
                        items:
                          minLength: 1
                          type: string
                        type: array
                      maxTLSVersion:
                        description: Maximum TLS version.
                        enum:
                        - TLSv1_0
                        - TLSv1_1
                        - TLSv1_2
                        - TLSv1_3
                        type: string
                      minTLSVersion:
                        description: Minimum TLS version.
                        enum:
                        - TLSv1_0
                        - TLSv1_1
                        - TLSv1_2
                        - TLSv1_3
                        type: string
                    type: object
                  unhealthyThreshold:
                    default: 2
                    description: |-
                      The number of consecutive failed health check probes required before
                      considering the backend unhealthy.
                    format: int32
                    minimum: 1
                    type: integer
                type: object
              httpConfig:
                description: The pool-wide HTTP configuration.
                properties:
                  enableHTTP2:
                    description: Setting this to true enables HTTP2.
                    type: boolean
                  enableHTTP11:
                    description: Setting this to true enables HTTP/1.1.
                    type: boolean
                type: object
              loadbalancing:
                description: The pool-wide loadbalancing configuration.
                properties:
                  algorithm:
                    description: LB algorithm configuration.
                    oneOf:
                    - properties:
                        roundRobin: {}
                      required:
                      - roundRobin
                    - properties:
                        leastRequest: {}
                      required:
                      - leastRequest
                    - properties:
                        consistentHashing: {}
                      required:
                      - consistentHashing
                    properties:
                      consistentHashing:
                        description: The consistent hashing algorithm configuration.
                          Exactly one of roundRobin, leastRequest or consistentHashing
                          must be specified.
                        properties:
                          algorithm:
                            description: Consistent hashing algorithm configuration.
                            properties:
                              maglev:
                                description: The maglev configuration.
                                properties:
                                  tableSize:
                                    description: |-
                                      The table size for Maglev hashing. Maglev aims for "minimal disruption" rather than an absolute guarantee.
                                      Minimal disruption means that when the set of upstream hosts change, a connection will likely be sent to the same
                                      upstream as it was before. Increasing the table size reduces the amount of disruption.
                                      The table size must be prime number limited to 5000011. If it is not specified, the default is 65537.
                                    format: int32
                                    maximum: 5000011
                                    minimum: 1
                                    type: integer
                                type: object
                            required:
                            - maglev
                            type: object
                        type: object
                      leastRequest:
                        description: The least request algorithm configuration. Exactly
                          one of roundRobin, leastRequest or consistentHashing must
                          be specified.
                        type: object
                      roundRobin:
                        description: The round robin algorithm configuration. Exactly
                          one of roundRobin, leastRequest or consistentHashing must
                          be specified.
                        type: object
                    type: object
                required:
                - algorithm
                type: object
              proxyProtocolConfig:
                description: PROXY protocol on this backend pool.
                properties:
                  passthroughTLVs:
                    description: The list of TLVs to be passed through.
                    items:
                      type: integer
                    minItems: 1
                    type: array
                  version:
                    description: The version of the PROXY protocol (e.g. 1 or 2)
                    enum:
                    - 1
                    - 2
                    type: integer
                required:
                - version
                type: object
              tcpConfig:
                description: The pool-wide TCP configuration.
                properties:
                  connectTimeoutSeconds:
                    description: The connect timeout for the connections.
                    format: int32
                    minimum: 1
                    type: integer
                type: object
              tlsConfig:
                description: The pool-wide TLS configuration.
                properties:
                  allowedCipherSuites:
                    description: Allowed TLS cipher suites.
                    items:
                      minLength: 1
                      type: string
                    type: array
                  allowedECDHCurves:
                    description: Allowed ECDH Curves.
                    items:
                      minLength: 1
                      type: string
                    type: array
                  allowedSignatureAlgorithms:
                    description: Allowed signature algorithms. The list is ordered
                      by preference.
                    items:
                      minLength: 1
                      type: string
                    type: array
                  maxTLSVersion:
                    description: Maximum TLS version.
                    enum:
                    - TLSv1_0
                    - TLSv1_1
                    - TLSv1_2
                    - TLSv1_3
                    type: string
                  minTLSVersion:
                    description: Minimum TLS version.
                    enum:
                    - TLSv1_0
                    - TLSv1_1
                    - TLSv1_2
                    - TLSv1_3
                    type: string
                type: object
            required:
            - backendType
            - backends
            - healthCheck
            type: object
            x-kubernetes-validations:
            - message: Backend format must match to the backendType
              rule: ( (self.backendType == 'IP' && self.backends.all(b, has(b.ip)))
                || (self.backendType == 'Hostname' && self.backends.all(b, has(b.host)))
                || (self.backendType == 'K8sService' && self.backends.all(b, has(b.k8sServiceRef)))
                )
            - message: Exactly one of ip, host or k8sServiceRef must be specified
                on the backend
              rule: '!( (self.backends.exists(b, has(b.ip) && has(b.host))) || (self.backends.exists(b,
                has(b.ip) && has(b.k8sServiceRef))) || (self.backends.exists(b, has(b.host)
                && has(b.k8sServiceRef))) || (self.backends.exists(b, !has(b.ip) &&
                !has(b.host) && !has(b.k8sServiceRef))) )'
            - message: Custom resolver configuration is only valid when backendType
                is Hostname
              rule: (self.backendType == 'Hostname' || !has(self.dnsResolverConfig))
          status:
            properties:
              conditions:
                description: The current conditions of the LBBackendPool.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              status:
                description: Status of the resource.
                enum:
                - OK
                - ConditionNotMet
                type: string
            required:
            - status
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
