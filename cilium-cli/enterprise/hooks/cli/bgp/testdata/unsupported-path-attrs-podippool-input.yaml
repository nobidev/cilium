# should generate error by rendering - advertisedPathAttributes selector does not match podIPPoolSelector

apiVersion: "cilium.io/v2alpha1"
kind: CiliumBGPPeeringPolicy
metadata:
  name: tor
spec:
  nodeSelector:
    matchLabels:
      bgp: enabled
  virtualRouters:
    - localASN: 65001
      podIPPoolSelector:
        matchLabels:
          environment: test
      neighbors:
        - peerAddress: "172.0.0.1/32"
          peerASN: 65000
          advertisedPathAttributes:
            - selectorType: CiliumPodIPPool
              selector:
                matchLabels:
                  environment: production     # selector does not match podIPPoolSelector (test)
                communities:
                  standard:
                    - 100:150
