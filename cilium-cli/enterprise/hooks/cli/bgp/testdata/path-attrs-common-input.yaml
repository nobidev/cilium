# should render single IsovalentBGPPeerConfig and single IsovalentBGPAdvertisement for both peers
# since peering configuration and advertisedPathAttributes are equal for both peers

apiVersion: "cilium.io/v2alpha1"
kind: CiliumBGPPeeringPolicy
metadata:
  name: tor
spec:
  nodeSelector:
    matchLabels:
      bgp: enabled
  virtualRouters:
    - localASN: 65001
      exportPodCIDR: true
      neighbors:
        - peerAddress: "172.0.0.1/32"
          peerASN: 65001
          advertisedPathAttributes:
          - selectorType: PodCIDR
            localPreference: 150
            communities:
              standard:
              - 100:150
        - peerAddress: "fd00:10:0:1::2/128"
          peerASN: 65001
          advertisedPathAttributes:
          - selectorType: PodCIDR
            localPreference: 150
            communities:
              standard:
              - 100:150
