    advertise: tor-65001
  name: tor-65001
spec:
  advertisements:
  - advertisementType: PodCIDR
---
apiVersion: isovalent.com/v1
kind: IsovalentBGPPeerConfig
metadata:
  name: tor-65001-peer-172.0.0.1
spec:
  families:
  - advertisements:
      matchLabels:
        advertise: tor-65001
    afi: ipv4
    safi: unicast
  transport:
    peerPort: 1179
status: {}
---
apiVersion: isovalent.com/v1
kind: IsovalentBGPPeerConfig
metadata:
  name: tor-65001-peer-fd00.10.0.1-1
spec:
  families:
  - advertisements:
      matchLabels:
        advertise: tor-65001
    afi: ipv6
    safi: unicast
  gracefulRestart:
    enabled: true
    restartTimeSeconds: 120
  timers:
    connectRetryTimeSeconds: 10
    holdTimeSeconds: 9
    keepAliveTimeSeconds: 3
status: {}
---
apiVersion: isovalent.com/v1
kind: IsovalentBGPAdvertisement
metadata:
  labels:
    advertise: tor-65002
  name: tor-65002
