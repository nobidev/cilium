apiVersion: isovalent.com/v1
kind: IsovalentBGPClusterConfig
metadata:
  name: tor
spec:
  bgpInstances:
  - localASN: 65001
    name: instance-65001
    peers:
    - name: peer-172.0.0.1
      peerASN: 65010
      peerAddress: 172.0.0.1
      peerConfigRef:
        name: tor-65001-peer-172.0.0.1
    - name: peer-fd00.10.0.1-1
      peerASN: 65000
      peerAddress: fd00:10:0:1::1
      peerConfigRef:
        name: tor-65001-peer-fd00.10.0.1-1
  - localASN: 65002
    name: instance-65002
    peers:
    - name: peer-172.0.0.2
      peerASN: 65020
      peerAddress: 172.0.0.2
      peerConfigRef:
        name: tor-65002-peer-172.0.0.2
    - name: peer-fd00.10.0.1-2
      peerASN: 65000
      peerAddress: fd00:10:0:1::2
      peerConfigRef:
        name: tor-65002-peer-fd00.10.0.1-2
  nodeSelector:
    matchLabels:
      bgp: enabled
status: {}
---
