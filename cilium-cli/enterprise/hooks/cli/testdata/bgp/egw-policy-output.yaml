apiVersion: isovalent.com/v1
kind: IsovalentBGPAdvertisement
metadata:
  labels:
    advertise: worker
  name: worker
spec:
  advertisements:
  - advertisementType: EgressGateway
    attributes:
      communities:
        standard:
        - 100:150
    selector:
      matchLabels:
        egw: enabled
---
apiVersion: isovalent.com/v1
kind: IsovalentBGPPeerConfig
metadata:
  name: worker
spec:
  families:
  - advertisements:
      matchLabels:
        advertise: worker
    afi: ipv4
    safi: unicast
status: {}
---
apiVersion: isovalent.com/v1
kind: IsovalentBGPClusterConfig
metadata:
  name: worker
spec:
  bgpInstances:
  - localASN: 65002
    name: instance-65002
    peers:
    - name: peer-10.1.2.1
      peerASN: 65000
      peerAddress: 10.1.2.1
      peerConfigRef:
        name: worker
  nodeSelector:
    matchLabels:
      bgp: enabled
status: {}
