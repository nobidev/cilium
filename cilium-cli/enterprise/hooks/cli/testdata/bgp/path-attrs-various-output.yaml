apiVersion: isovalent.com/v1
kind: IsovalentBGPAdvertisement
metadata:
  labels:
    advertise: tor-peer-172.0.0.1
  name: tor-peer-172.0.0.1
spec:
  advertisements:
  - advertisementType: PodCIDR
    attributes:
      communities:
        standard:
        - 100:150
  - advertisementType: CiliumPodIPPool
    attributes:
      communities:
        standard:
        - 200:250
    selector:
      matchLabels:
        environment: test
---
apiVersion: isovalent.com/v1
kind: IsovalentBGPPeerConfig
metadata:
  name: tor-peer-172.0.0.1
spec:
  families:
  - advertisements:
      matchLabels:
        advertise: tor-peer-172.0.0.1
    afi: ipv4
    safi: unicast
  - advertisements:
      matchLabels:
        advertise: tor-peer-172.0.0.1
    afi: ipv6
    safi: unicast
status: {}
---
apiVersion: isovalent.com/v1
kind: IsovalentBGPAdvertisement
metadata:
  labels:
    advertise: tor-peer-fd00.10.0.1-1
  name: tor-peer-fd00.10.0.1-1
spec:
  advertisements:
  - advertisementType: PodCIDR
    attributes:
      communities:
        wellKnown:
        - no-export
  - advertisementType: CiliumPodIPPool
    attributes:
      communities:
        large:
        - 64512:100:50
    selector:
      matchLabels:
        environment: test
---
apiVersion: isovalent.com/v1
kind: IsovalentBGPPeerConfig
metadata:
  name: tor-peer-fd00.10.0.1-1
spec:
  families:
  - advertisements:
      matchLabels:
        advertise: tor-peer-fd00.10.0.1-1
    afi: ipv4
    safi: unicast
  - advertisements:
      matchLabels:
        advertise: tor-peer-fd00.10.0.1-1
    afi: ipv6
    safi: unicast
status: {}
---
apiVersion: isovalent.com/v1
kind: IsovalentBGPClusterConfig
metadata:
  name: tor
spec:
  bgpInstances:
  - localASN: 65001
    name: instance-65001
    peers:
    - name: peer-172.0.0.1
      peerASN: 65000
      peerAddress: 172.0.0.1
      peerConfigRef:
        name: tor-peer-172.0.0.1
    - name: peer-fd00.10.0.1-1
      peerASN: 65000
      peerAddress: fd00:10:0:1::1
      peerConfigRef:
        name: tor-peer-fd00.10.0.1-1
  nodeSelector:
    matchLabels:
      bgp: enabled
status: {}
