apiVersion: "cilium.io/v2alpha1"
kind: CiliumBGPPeeringPolicy
metadata:
  name: pe0
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/hostname: srv6-vpnv4-simple-control-plane
  virtualRouters:
    - localASN: 65001
      exportPodCIDR: true
      mapSRv6VRFs: true
      neighbors:
        - peerAddress: "172.0.0.1/32"
          peerASN: 65000
          families:
            - afi: ipv4
              safi: mpls_vpn
