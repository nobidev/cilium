# should generate error by rendering - CiliumLoadBalancerIPPool selector type is not supported

apiVersion: "cilium.io/v2alpha1"
kind: CiliumBGPPeeringPolicy
metadata:
  name: tor
spec:
  nodeSelector:
    matchLabels:
      bgp: enabled
  virtualRouters:
    - localASN: 65001
      serviceSelector:
        matchLabels:
          app: foo
      neighbors:
        - peerAddress: "172.0.0.1/32"
          peerASN: 65000
          advertisedPathAttributes:
          - selectorType: CiliumLoadBalancerIPPool   # CiliumLoadBalancerIPPool selector type is not supported
            selector:
              matchLabels:
                app: foo
              communities:
                standard:
                  - 100:150
