apiVersion: isovalent.com/v1
kind: IsovalentBGPAdvertisement
metadata:
  labels:
    advertise: tor
  name: tor
spec:
  advertisements:
  - advertisementType: PodCIDR
  - advertisementType: Service
    selector:
      matchExpressions:
      - key: somekey
        operator: NotIn
        values:
        - never-used-value
    service:
      addresses:
      - LoadBalancerIP
---
apiVersion: isovalent.com/v1
kind: IsovalentBGPPeerConfig
metadata:
  name: tor
spec:
  families:
  - advertisements:
      matchLabels:
        advertise: tor
    afi: ipv4
    safi: unicast
  - advertisements:
      matchLabels:
        advertise: tor
    afi: ipv6
    safi: unicast
status: {}
---
apiVersion: isovalent.com/v1
kind: IsovalentBGPClusterConfig
metadata:
  name: tor
spec:
  bgpInstances:
  - localASN: 65001
    name: instance-65001
    peers:
    - name: peer-172.0.0.1
      peerASN: 65000
      peerAddress: 172.0.0.1
      peerConfigRef:
        name: tor
    - name: peer-172.0.0.2
      peerASN: 65000
      peerAddress: 172.0.0.2
      peerConfigRef:
        name: tor
  nodeSelector:
    matchLabels:
      bgp: enabled
status: {}
