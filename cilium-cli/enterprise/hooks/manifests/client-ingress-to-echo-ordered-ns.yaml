# Two policies with separate orders:
# 1: allow client to echo
# 2: deny all within namespace
#
# This tests the overlapping non-wildcard selector case,
# where the order is resolved in MapState

apiVersion: isovalent.com/v1alpha1
kind: IsovalentNetworkPolicy
metadata:
  name: order-deny-namespace
  namespace: "{{.TestNamespace}}"
  annotations:
    cli.cilium.io/bump-policy: ""
specs:
# Always allow readiness probes
- endpointSelector: {}
  ingress:
    - fromEntities: ["host"]
  order: 0

- endpointSelector: {}
  ingress:
    - fromEndpoints:
      - matchLabels:
          name: client
      toPorts:
        - ports:
          - port: "8080"
            protocol: "TCP"
  order: 1

- endpointSelector: {}
  ingressDeny:
    - fromEndpoints:
      - {}
      toPorts:
        - ports:
          - port: "8080"
            protocol: "TCP"
  order: 2
