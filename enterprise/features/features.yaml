# This file provides a declaration of features (both OSS and Enterprise) as they
# are currently supported in Cilium for CE customers.
# Note: This may differ from maturity of features in open source Cilium.
#
# The source of truth for the format of this file is in "yaml_feature.go."
#
# If you change this file you can validate your changes and update the helm template
# with:
#
#   go test ./enterprise/features/...
#   make -C install/kubernetes cilium/templates/enterprise_features_validate.yaml
# 


#
# Maturity levels in order. A minimum level will include all levels
# above it, e.g. if featureGates.minimum is set to Beta then Limited
# and Stable are included (according to the order below).
#
# The first maturity level (Stable) is always explicitly approved.
maturity:
- name: Stable
  description: |
    Stable maturity is appropriate for production use in a variety of supported
    configurations due to significant hardening from testing and use.

- name: Limited
  description: |
    Limited maturity is appropriate for production use in a limited set of
    of environments and configurations.

- name: Beta
  description: |
    Beta maturity features are generally complete but not production ready.
    Beta features require more testing and hardening under various conditions before
    they can be promoted to limited/stable.

- name: Alpha
  description: |
    Alpha maturity features are either under active development or lack sufficient 
    testing for production use. Alpha features are not supported for any level of 
    use for Cilium Enterprise.
  
#
# Feature declarations
#
      
features:
  ##########################################
  # Enterprise features
  ##########################################

  SRv6:
    maturity: Beta
    description: Enable SRv6 support
    flags:
      enable-srv6: true
    skip-flag-check: true
    helm:
      enterprise.srv6.enabled: true

  MultiNetwork:
    maturity: Beta
    description: |
      Provides functionality for attaching multiple network interfaces to Pods
    flags:
      enable-multi-network: true
    skip-flag-check: true
    helm:
      enterprise.multiNetwork.enabled: true

  DNSProxyHA:
    maturity: Stable
    description:
      Enables external DNS proxy for high availability
    flags:
      external-dns-proxy: true
    skip-flag-check: true
    helm-check: "get .extraConfig \"external-dns-proxy\""

  EgressGatewayHA:
    maturity: Limited
    description: |
      Egress Gateway High Availability, enabled by having egress-gateway-ha set to true
    flags:
      enable-ipv4-egress-gateway-ha: true
    skip-flag-check: true
    helm:
      enterprise.egressGatewayHA.enabled: true

  EgressGatewayHASocketTermination:
    maturity: Limited
    description: |
      Egress Gateway High Availability socket termination.
    flags:
      enable-egress-gateway-ha-socket-termination: true
    skip-flag-check: true
    helm:
      enterprise.egressGatewayHA.socketTermination.enabled: true

  EnterpriseBGPControlPlane:
    maturity: Stable
    description: |
      Enables the enterprise BGP control-plane for Cilium Enterprise
    flags:
      enable-enterprise-bgp-control-plane: true
    skip-flag-check: true
    helm:
      enterprise.bgpControlPlane.enabled: true

  EnvoyHA:
    maturity: Limited
    description: |
      Enables Cilium Envoy graceful restart.
    helm:
      envoy.gracefulRestart.enabled: true

  BFD:
    maturity: Limited
    description: |
      Enables Bidirectional Forwarding Detection (BFD) feature
    flags:
      enable-bfd: true
    skip-flag-check: true
    helm:
      enterprise.bfd.enabled: true

  Multicast:
    maturity: Limited
    description: |
      Multicast allows user application to distribute data feeds to multiple consumers
    skip-flag-check: true
    flags:
      multicast-enabled: true
    helm:
      enterprise.multicast.enabled: true

  ClusterMeshMixedRoutingMode:
    maturity: Limited
    description: |
      Meshing clusters configured with a different primary routing mode
    skip-flag-check: true
    flags: # this checks that flag is not empty
      fallback-routing-mode: "!"
    helm:
      enterprise.clustermesh.mixedRoutingMode.enabled: true

  ClusterMeshPhantomServices:
    maturity: Limited
    description: |
      Phantom Services support
    skip-flag-check: true
    flags:
      enable-phantom-services: true
    helm:
      enterprise.clustermesh.phantomServices.enabled: true

  ClusterMeshOverlappingPodCIDR:
    maturity: Beta
    description: |
      Allows Pods on two or more clusters with an overlapping PodCIDR range
    # no flag since there is no corresponding entry in cilium-config
    skip-flag-check: true
    flags:
      enable-cluster-aware-addressing: true
      enable-inter-cluster-snat: true
    helm:
      enterprise.clustermesh.enableOverlappingPodCIDRSupport: true

  HubbleTimescape:
    maturity: Limited
    description: |
      Integrated Hubble Timescape
    helm:
      hubble.timescape.enabled: true

  PrivateNetworks:
    maturity: Alpha
    description: |
      Private networks enable network-level isolation between Cilium-managed endpoints.
    skip-flag-check: true
    flags:
      private-networks-enabled: true
    helm:
      enterprise.privateNetworks.enabled: true

  ILBGatewayAPI:
    maturity: Alpha
    description: |
      Allows use of Gateway API to set up ILB
    skip-flag-check: true
    flags:
      loadbalancer-gateway-api-enabled: true
    helm:
      enterprise.loadbalancer.gatewayAPI.enabled: true

  ##########################################
  # OSS features
  ##########################################
  
  ### Datapath

  DatapathHostFirewall:
    maturity: Limited
    description: Enable host firewall functionality
    flags:
      enable-host-firewall: true
    helm:
      hostFirewall.enabled: true

  DatapathModeVETH:
    maturity: Stable
    description: Enable veth datapath mode
    flags:
      datapath-mode: "veth"
    helm:
      bpf.datapathMode: "veth"

  DatapathModeNetkit:
    maturity: Beta
    description: Enable netkit datapath mode
    flags:
      datapath-mode: "netkit"
    helm:
      bpf.datapathMode: "netkit"

  DatapathModeLBOnly:
    maturity: Stable
    description: |
      LB Only datapath mode, enabled by having datapath-mode set to lb-only.
    flags:
      datapath-mode: "lb-only"
    helm:
      bpf.datapathMode: "lb-only"

  DatapathIPModeDualStack:
    maturity: Limited
    description: |
      Enable dual-stack IPv4+IPv6 datapath, enabled by having both ipv4-enabled and ipv6-enabled set to true
    flags:
      enable-ipv4: true
      enable-ipv6: true
    helm:
      ipv4.enabled: true
      ipv6.enabled: true

  DatapathIPModeIPv4:
    maturity: Stable
    description: |
      IPv4-only datapath, enabled by having ipv6-enabled set to true and ipv4-enabled set to false
    flags:
      enable-ipv4: true
      enable-ipv6: false
    helm:
      ipv4.enabled: true
      ipv6.enabled: false

  DatapathIPModeIPv6:
    maturity: Beta
    description: |
      IPv6-only datapath, enabled by having ipv6-enabled set to true and ipv4-enabled set to false
    flags:
      enable-ipv4: false
      enable-ipv6: true
    helm:
      ipv4.enabled: false
      ipv6.enabled: true

  DatapathBandwidthManager:
    maturity: Beta
    description: |
      Enable bandwidth manager functionality
    flags:
      enable-bandwidth-manager: true
    helm:
      bandwidthManager.enabled: true

  DatapathTunnelModeVXLAN:
    maturity: Stable
    description: |
      Overlay networking is done using the VXLAN protocol
    flags:
      routing-mode: tunnel
      tunnel-protocol: vxlan
    # NOTE: The tunnel-protocol gets set to "vxlan" indirectly in some cases (e.g. when aksbyocni.enabled)
    # This might thus not cover all the ground and thus might pass helm validation and fail in the agent start.
    helm:
      routingMode: tunnel
      tunnelProtocol: vxlan

  DatapathTunnelModeGeneve:
    maturity: Stable
    description: |
      Overlay networking is done using the Geneve protocol
    flags:
      routing-mode: tunnel
      tunnel-protocol: geneve
    helm:
      routingMode: tunnel
      tunnelProtocol: geneve

  ### Policy

  NonDefaultDenyPolicies:
    name: Non-default-deny mode
    maturity: Limited
    description: |
      Policies using non-default-deny mode
    flags:
      enable-non-default-deny-policies: true
    helm:
      enableNonDefaultDenyPolicies: true

  CIDRMatchModePolicies:
    name: Policy CIDR match "nodes" mode
    maturity: Limited
    description: |
      Selecting nodes with CIDR / ipBlock
    flags:
      policy-cidr-match-mode: nodes
    helm:
      policyCIDRMatchMode: nodes

  ### Egress gateway features

  EgressGatewayIPv4:
    maturity: Limited
    description: |
      Egress Gateway running in IPv4 mode, enabled with egress-gateway-ipv4=true
    flags:
      enable-egress-gateway: true
    helm:
      egressGateway.enabled: true

  ### Encryption

  EncryptionIPSec:
    maturity: Limited
    description: |
      Transparent IPSec encryption for all traffic between Cilium endpoints
    flags:
      enable-ipsec: true
    helm:
      encryption.enabled: true
      encryption.type: ipsec

  EncryptionWireguard:
    maturity: Stable
    description: |
      Transparent Wireguard encryption for all traffic between Cilium endpoints
    flags:
      enable-wireguard: true
    helm:
      encryption.enabled: true
      encryption.type: wireguard

  EncryptionWireguardNodeToNode:
    maturity: Beta
    description: |
      Transparent Wireguard encryption for node-to-node traffic
    flags:
      enable-wireguard: true
      encrypt-node: true
    helm:
      # not enabling encryption so this does not trigger EncryptionWireguard,
      # which would fail the "helm-gen validate" test.
      encryption.type: wireguard
      encryption.nodeEncryption: true

  EncryptionPolicy:
    maturity: Limited
    description: |
      Selectively encrypt traffic based on encryption policies
    flags:
      enable-encryption-policy: true
    skip-flag-check: true
    helm:
      enterprise.encryption.policy.enabled: true
      enterprise.encryption.policy.fallbackBehavior: plaintext

  ### Envoy

  EnvoyDaemonSet:
    maturity: Stable
    description:
      Enables running Cilium Envoy as a Daemonset.
    flags:
      external-envoy-proxy: true
    helm:
      envoy.enabled: true

  IngressController:
    maturity: Limited
    description: |
      Enables Cilium Ingress Controller.
    flags:
      enable-ingress-controller: true
    helm:
      ingressController.enabled: true

  GatewayAPI:
    maturity: Limited
    description: |
      Enables Cilium GatewayAPI Controller.
    flags:
      enable-gateway-api: true
    helm:
      gatewayAPI.enabled: true

  ### CNI

  CNIChainingMode:
    maturity: Limited
    description: |
      CNI Chaining Mode allows Cilium to chain with multiple CNI plugins.
      This feature includes all CNI chaining modes, including aws-vpc-cni, Calico and Flannel.
      Note: CNI Chaining mode is considered disabled if the chaining mode is set to 'none'.
    flags:
      cni-chaining-mode: "!none"
    helm-check: "not (or (kindIs \"invalid\" .cni.chainingMode) (eq .cni.chainingMode \"none\"))"

  ### Load-balancing

  LocalRedirectPolicy:
    maturity: Limited
    description: |
      Enables local traffic redirection policy functionality.
    flags:
      enable-local-redirect-policy: true
    helm:
      localRedirectPolicy: true

  L2Announcement:
    maturity: Beta
    description: |
      Enables L2 announcement for ExternalIPs and/or LoadBalancer IPs.
    flags:
      enable-l2-announcements: true
    helm:
      l2announcements.enabled: true

  NodeIPAMLoadBalancer:
    maturity: Beta
    description: |
      Node IPAM LoadBalancer allows Cilium to advertise the node’s IPs directly inside Services of type LoadBalancer.
    flags:
      enable-node-ipam: true
    helm:
      nodeIPAM.enabled: true

  ### Mutual auth

  MutualAuthSpire:
    maturity: Beta
    description: |
      Provides Ciliums mutual authentication feature using SPIRE
    flags:
      mesh-auth-mutual-enabled: true
    helm:
      authentication.mutual.spire.enabled: true

  VTEPIntegration:
    maturity: Beta
    description: |
      Enables communication with 3rd party VTEP devices
    flags:
      enable-vtep: true
    helm:
      vtep.enabled: true

  ### IPAM

  IPAMMultiPool:
    maturity: Limited
    description: |
      Multi Pool IPAM allows Cilium to allocate IP addresses from multiple pools of addresses
    flags:
      ipam: multi-pool
    helm:
      ipam.mode: multi-pool

      
  IPAMClusterPool:
    maturity: Stable
    description: |
      Cluster Pool IPAM allows Cilium to allocate IP addresses from a pool of addresses
    flags:
      ipam: cluster-pool
    helm:
      ipam.mode: cluster-pool

  IPAMAzure:
    maturity: Limited
    description: |
      Azure-based IPAM
    flags:
      ipam: azure
    helm:
      ipam.mode: azure

  IPAMENI:
    maturity: Stable
    description: |
      AWS ENI based IPAM
    flags:
      ipam: eni
    helm:
      ipam.mode: eni

  ### Identity (allocation modes)

  IdentityKVStore:
    maturity: Stable
    description: |
      Identities are stored in kvstore.
    flags:
      kvstore: etcd
    helm:
      identityAllocationMode: kvstore

  IdentityCRD:
    maturity: Stable
    description: |
      Identities are stored in CiliumIdentity CRD.
    flags:
      identity-allocation-mode: crd
    helm:
      identityAllocationMode: crd

  ### BGP

  BGPControlPlane:
    maturity: Stable
    description: |
      Enables the BGP control-plane for Cilium Enterprise
    flags:
      enable-bgp-control-plane: true
    helm:
      bgpControlPlane.enabled: true

  ### ClusterMesh

  ClusterMesh:
    maturity: Stable
    description: |
      Multi-cluster Kubernetes powered by Cilium
    # no flag since there is no corresponding entry in cilium-config
    helm:
      clustermesh.config.enabled: true

  ClusterMeshKVStoreMesh:
    maturity: Stable
    description: |
      KVStoreMesh caches the information retrieves from the remote clusters in the local etcd instance
    # no flag since there is no corresponding entry in cilium-config
    helm:
      clustermesh.useAPIServer: true
      clustermesh.apiserver.kvstoremesh.enabled: true

  ClusterMeshMaxConnectedClusters:
    maturity: Beta
    description: |
      Increase the maximum number of clusters supported in a ClusterMesh, at the
      cost of decreasing the maximum allocatable cluster-local identities.
    flags:
      max-connected-clusters: 511
    helm:
      clustermesh.maxConnectedClusters: 511

  ClusterMeshMCSAPISupport:
    maturity: Beta
    description: |
      Multi-Cluster Services API support
    flags:
      clustermesh-enable-mcs-api: true
    helm:
      clustermesh.enableMCSAPISupport: true

  CiliumEndpointSlice:
    maturity: Limited
    description: |
      Enables batching of CiliumEndpoint objects for better scalability
    flags:
      enable-cilium-endpoint-slice: true
    helm:
      ciliumEndpointSlice.enabled: true

  ### L7

  L7Proxy:
    maturity: Stable
    description: |
      L7 Cilium Network Policy
    flags:
      enable-l7-proxy: true
    helm:
      l7Proxy: true

  ### SCTP

  SCTP:
    maturity: Beta
    description: |
      SCTP support
    flags:
      enable-sctp: true
    helm:
      sctp.enabled: true

  ### CiliumNodeConfig is commented out because it's enabled by default, just sitting dormant until user creates a CRD
  ### If we want to gate it, we need a mechanism for enabling it, e.g https://github.com/cilium/cilium/pull/34943

  #CiliumNodeConfig:
  #  maturity: Limited
  #  description: |
  #    Use CiliumNodeConfig to configure Cilium agent
  #  helm-check: "or (kindIs \"invalid\" .daemon.configSources) (mustHas \"cilium-node-config\" .daemon.configSources)"

  #######################################################
  # Example feature (this will be ignored by the parser)
  Example: # The unique id, referenced by enterprise.featureGate.approved
    # The maturity level, e.g. one of the ones listed under 'maturity:'.
    maturity: Limited

    description: |
      Optional long-form multi-line description of the feature.
      This will be used to generate documentation.

    # The configuration flags, e.g. the configmap key / command-line argument.
    # Full list can be found from https://docs.cilium.io/en/stable/cmdref/cilium-agent/#options
    # The mapping from helm to flags can be found from:
    # https://github.com/cilium/cilium/blob/main/install/kubernetes/cilium/templates/cilium-configmap.yaml
    # Note that the value must be a string and thus quoted.
    flags:
      enable-example: true
      foo-mode: "!bar" # !bar means anything but "bar"

    # Helm option(s) that enable the feature.
    helm:
      example.enabled: true

    # Optional helm expression to replace what is generated from 'helm'.
    # Only specify if strictly necessary.
    helm-check: and example.enabled (eq example.mode "foo")
