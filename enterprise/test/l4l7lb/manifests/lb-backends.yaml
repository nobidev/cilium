apiVersion: isovalent.com/v1alpha1
kind: LBBackend
metadata:
  namespace: default
  name: lb-1
spec:
  healthCheck:
    intervalSeconds: 10
    http:
      path: "/health"
  addresses:
    - ip: 9.9.9.9
      port: 8080
    - ip: 8.9.9.9
      port: 8080
