apiVersion: cilium.io/v1alpha1
kind: CiliumConfig
metadata:
  labels:
    app.kubernetes.io/name: clife
  name: ciliumconfig
spec:
  cluster:
    name: default
  securityContext:
    privileged: true
  ipam:
    mode: "cluster-pool"
  cni:
    binPath: "/var/lib/cni/bin"
    confPath: "/var/run/multus/cni/net.d"
    exclusive: false
  prometheus:
    serviceMonitor:
     enabled: true
  hubble:
    enabled: true
    relay:
      enabled: true
  sessionAffinity: true
  # avoid conflicts
  clusterHealthPort: 9940
  # OVN Kubernetes default port, firewalls may already be configured for it
  tunnelPort: 4789
  kubeProxyReplacement: true
  k8sServiceHost: api-int.<cluster_name>.<base_domain>
  k8sServicePort: 6443
