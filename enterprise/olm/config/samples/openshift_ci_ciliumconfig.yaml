apiVersion: cilium.io/v1alpha1
kind: CiliumConfig
metadata:
  labels:
    app.kubernetes.io/name: clife
    app.kubernetes.io/managed-by: kustomize
  name: config
spec:
  cluster:
    name: default
  debug:
    enabled: true
    verbose: "envoy"
  bpf:
    monitorAggregation: "none"
  securityContext:
    privileged: true
  ipam:
    mode: "cluster-pool"
    operator:
      # it gets automatically populated by the CuTE
      clusterPoolIPv4MaskSize: ${POD_CIDR_HOST_PREFIX}
      clusterPoolIPv4PodCIDRList:
      - ${POD_CIDR}
  cni:
    binPath: "/var/lib/cni/bin"
    confPath: "/var/run/multus/cni/net.d"
    # portmap is needed for supporting HostPort without KPR
    chainingMode: portmap
    exclusive: false
  prometheus:
    serviceMonitor:
     enabled: false
  image:
    repository: "quay.io/isovalent-dev/cilium-ci"
    useDigest: false
    # get replaced by the id of the commit being tested in the CI workflow run
    tag: "latest"
  operator:
    image:
      repository: "quay.io/isovalent-dev/operator"
      suffix: "-ci"
      useDigest: false
      # get replaced by the id of the commit being tested in the CI workflow run
      tag: "latest"
  hubble:
    enabled: true
    relay: 
      enabled: true
      retryTimeout: "5s"
      image:
        repository: "quay.io/isovalent-dev/hubble-relay-ci"
        useDigest: false
        # get replaced by the id of the commit being tested in the CI workflow run
        tag: "latest"
  clustermesh:
    apiserver:
      image:
        repository: "quay.io/isovalent-dev/clustermesh-apiserver-ci"
        # get replaced by the id of the commit being tested in the CI workflow run
        tag: "latest"
        useDigest: false
  sessionAffinity: true
  kubeProxyReplacement: false
  # TODO: not sure this is needed, was historically used in the CuTE configuration
  endpointRoutes: {enabled: true}
  # avoid conflicts
  clusterHealthPort: 9940
  # default firewall configuration
  tunnelPort: 4789
  enterprise:
    featureGate:
      minimumMaturity: "Alpha"
    clustermesh:
      phantomServices:
        enabled: true
  extraEnv:
  - name: "KUBE_CACHE_MUTATION_DETECTOR"
    value: "true"
  - name: "CILIUM_FEATURE_METRICS_WITH_DEFAULTS"
    value: "true"
  # Disabling Envoy version check as it gets reported in the logs
  # although the default defined in values.yaml is used.
  disableEnvoyVersionCheck: true