SecretsNamespace: ""
AccessLog:
  EnableStdOut: false
  FilePath: "/var/log/envoy-accesslog.log"
  FormatHTTP: "ACCESSLOG_FORMAT_STRING"
  FormatHC: "ACCESSLOG_HC_FORMAT_STRING"
  EnableHC: true
RequestID:
  Generate: true
T1T2HealthCheck:
  T1ProbeTimeoutSeconds: 5
  T1ProbeHTTPPath: /health
  T1ProbeHTTPMethod: GET
  T1ProbeHTTPUserAgentPrefix: cilium-probe/
  T2ProbeMinHealthyBackendPercentage: 20
