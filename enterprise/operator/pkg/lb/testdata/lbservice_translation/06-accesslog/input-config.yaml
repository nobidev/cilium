SecretsNamespace: ""
AccessLog:
  EnableStdOut: true
  FilePath: "/var/log/envoy-accesslog.log"
  FormatHTTP: "ACCESSLOG_FORMAT_STRING HTTP %SERVICE_NAMESPACE% %SERVICE_NAME%"
  JSONFormatHTTP: '{ "type": "http", "service.namespace": "%SERVICE_NAMESPACE%", "service.name": "%SERVICE_NAME%" }'
  FormatHC: "ACCESSLOG_FORMAT_STRING HC %SERVICE_NAMESPACE% %SERVICE_NAME%"
  JSONFormatHC: '{ "type": "hc", "service.namespace": "%SERVICE_NAMESPACE%", "service.name": "%SERVICE_NAME%" }'
  EnableHC: true
Metrics:
  ClusterAdditionalRequestResponse: true
  ClusterTimeoutBudget: true
  ClusterPerEndpoint: true
RequestID:
  Generate: true
T1T2HealthCheck:
  T1ProbeTimeoutSeconds: 5
  T1ProbeHTTPPath: /health
  T1ProbeHTTPMethod: GET
  T1ProbeHTTPUserAgentPrefix: cilium-probe/
  T2ProbeMinHealthyBackendPercentage: 20
