apiVersion: isovalent.com/v1alpha1
kind: LBService
metadata:
  namespace: default
  name: lb-1
spec:
  vipRef:
    name: lb-1
  port: 80
  applications:
    httpsProxy:
      tlsConfig:
        certificates:
          - secretRef:
              name: "test"
      auth:
        basic:
          users:
            secretRef:
              name: lb-1
      routes:
        - auth:
            basic:
              disabled: true
          backendRef:
            name: lb-1
