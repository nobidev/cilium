apiVersion: isovalent.com/v1alpha1
kind: LBBackendPool
metadata:
  namespace: default
  name: lb-1
spec:
  backendType: Hostname
  backends:
    - host: foo.example.com
      port: 8080
  dnsResolverConfig:
    resolvers:
    - ip: 10.0.0.1
      port: 53
    - ip: 10.0.0.2
      port: 1053
  healthCheck:
    intervalSeconds: 30
    timeoutSeconds: 5
    healthyThreshold: 1
    unhealthyThreshold: 1
    minHealthyPercentage: 20
    http:
      host: lb
      path: /healthz
