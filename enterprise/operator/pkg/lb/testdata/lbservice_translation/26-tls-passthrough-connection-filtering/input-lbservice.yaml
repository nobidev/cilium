apiVersion: isovalent.com/v1alpha1
kind: LBService
metadata:
  namespace: default
  name: lb-1
spec:
  vipRef:
    name: lb-1
  port: 80
  applications:
    tlsPassthrough:
      routes:
        - match:
            hostNames:
              - "foo.acme.io"
          backendRef:
            name: lb-1
        - backendRef:
            name: lb-2
          connectionFiltering:
            ruleType: Deny
            rules:
              - sourceCIDR:
                  cidr: 100.64.0.100/32
                serverName:
                  exact: bla.acme.io
              - sourceCIDR:
                  cidr: 100.64.0.101/32
