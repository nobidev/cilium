apiVersion: isovalent.com/v1alpha1
kind: LBBackendPool
metadata:
  namespace: default
  name: lb-1
spec:
  backendType: K8sService
  backends:
    - k8sServiceRef:
        name: webapp
      port: 8080
    - k8sServiceRef:
        name: webapp-2
      port: 8080
    - k8sServiceRef:
        name: webapp2
      port: 8080
    - k8sServiceRef:
        name: webapp2-2
      port: 8080
    - k8sServiceRef:
        name: webapp3
      port: 8080
    - k8sServiceRef:
        name: webapp3-2
      port: 8080
  healthCheck:
    intervalSeconds: 30
    timeoutSeconds: 5
    healthyThreshold: 1
    unhealthyThreshold: 1
    http:
      host: lb
      path: /healthz
