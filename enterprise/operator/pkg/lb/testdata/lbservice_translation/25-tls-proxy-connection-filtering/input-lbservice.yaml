apiVersion: isovalent.com/v1alpha1
kind: LBService
metadata:
  namespace: default
  name: lb-1
spec:
  vipRef:
    name: lb-1
  port: 80
  applications:
    tlsProxy:
      tlsConfig:
        certificates:
          - secretRef:
              name: "test"
        validation:
          secretRef:
            name: "test-trusted-ca"
          subjectAlternativeNames:
            - exact: client.acme.io
      routes:
        - match:
            hostNames:
              - "foo.acme.io"
          backendRef:
            name: lb-1
        - match:
            hostNames:
              - "bar.acme.io"
          backendRef:
            name: lb-2
          connectionFiltering:
            ruleType: Deny
            rules:
              - sourceCIDR:
                  cidr: 100.64.0.100/32
                serverName:
                  exact: bar.acme.io
              - sourceCIDR:
                  cidr: 100.64.0.101/32
                clientCertificateSANs:
                  - type: DNS
                    value:
                      exact: client.acme.io
                  - type: URI
                    value:
                      exact: http://acme.io
                  - type: IP_ADDRESS
                    value:
                      exact: 192.168.1.100
                  - type: MAIL
                    value:
                      exact: client@acme.io
                  - oid: 1.3.6.1.4.1.311.20.2.3
                    type: OTHER_NAME
                    value:
                      exact: test@acme.io
