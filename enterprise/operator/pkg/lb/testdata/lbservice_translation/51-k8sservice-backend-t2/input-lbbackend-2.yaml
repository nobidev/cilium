apiVersion: isovalent.com/v1alpha1
kind: LBBackendPool
metadata:
  namespace: default
  name: lb-2
spec:
  backendType: K8sService
  backends:
    - k8sServiceRef:
        name: webapp2
      port: 8080
    - k8sServiceRef:
        name: webapp2-2
      port: 8080
  healthCheck:
    intervalSeconds: 20
    timeoutSeconds: 5
    healthyThreshold: 1
    unhealthyThreshold: 1
    minHealthyPercentage: 20
    http:
      host: lb
      path: /healthz
