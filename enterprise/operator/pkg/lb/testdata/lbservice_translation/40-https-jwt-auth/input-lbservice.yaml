apiVersion: isovalent.com/v1alpha1
kind: LBService
metadata:
  namespace: default
  name: lb-1
spec:
  vipRef:
    name: lb-1
  port: 80
  applications:
    httpsProxy:
      auth:
        jwt:
          providers:
          - name: provider0
            issuer: "foo@example.com"
            audiences:
            - "bar@example.com"
            - "baz@example.com"
            jwks:
              secretRef:
                name: lb-1
          - name: provider1
            jwks:
              httpURI:
                uri: "https://example.com/oauth/v1/certs"
          - name: provider2
            jwks:
              httpURI:
                uri: "http://example.com/oauth/v1/certs"
          - name: provider3
            jwks:
              httpURI:
                uri: "http://example.com:8080/oauth/v1/certs"
      routes:
        - auth:
            jwt:
              disabled: true
          backendRef:
            name: lb-1
