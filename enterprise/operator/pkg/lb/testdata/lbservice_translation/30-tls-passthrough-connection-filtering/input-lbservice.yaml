apiVersion: isovalent.com/v1alpha1
kind: LBService
metadata:
  namespace: default
  name: lb-1
spec:
  vipRef:
    name: lb-1
  port: 80
  applications:
    tlsPassthrough:
      routes:
        - match:
            hostNames:
              - "foo.acme.io"
          backendRef:
            name: lb-1
        - backendRef:
            name: lb-2
          rateLimits:
            connections:
              limit: 100
              timePeriodSeconds: 60
