apiVersion: isovalent.com/v1alpha1
kind: LBService
metadata:
  namespace: default
  name: lb-1
spec:
  vipRef:
    name: lb-1
  port: 80
  applications:
    tlsProxy:
      tlsConfig:
        certificates:
          - secretRef:
              name: "test"
        validation:
          secretRef:
            name: "test-trusted-ca"
          subjectAlternativeNames:
            - exact: client.acme.io
      routes:
        - match:
            hostNames:
              - "foo.acme.io"
          backendRef:
            name: lb-1
        - match:
            hostNames:
              - "bar.acme.io"
          backendRef:
            name: lb-2
