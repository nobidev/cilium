ServerName: "ilb"
AccessLog:
  EnableStdOut: true
Metrics:
  ClusterAdditionalRequestResponse: true
  ClusterTimeoutBudget: true
  ClusterPerEndpoint: true
T1T2HealthCheck:
  T1ProbeTimeoutSeconds: 5
  T1ProbeHTTPPath: /health
  T1ProbeHTTPMethod: GET
  T1ProbeHTTPUserAgentPrefix: cilium-probe/
  T2ProbeMinHealthyBackendPercentage: 20
Policy:
  EnableCiliumPolicyFilters: true
