apiVersion: v1
kind: Service
metadata:
  annotations:
    lbipam.cilium.io/ips: "100.64.0.100"
    lbipam.cilium.io/sharing-cross-namespace: "*"
    lbipam.cilium.io/sharing-key: "100.64.0.100"
    service.cilium.io/health-check-bgp-advertise-threshold: "1"
    service.cilium.io/health-check-http-method: GET
    service.cilium.io/health-check-http-path: /health
    service.cilium.io/health-check-probe-interval: 5s
    service.cilium.io/health-check-probe-timeout: 5s
    service.cilium.io/health-check-quarantine-timeout: 30s
    service.cilium.io/health-check-threshold-healthy: "2"
    service.cilium.io/health-check-threshold-unhealthy: "2"
  labels:
    lb.cilium.io/tier: t1
  namespace: special-namespace
  name: lb-1
spec:
  ports:
    - name: http
      port: 80
      protocol: TCP
  type: LoadBalancer
