apiVersion: isovalent.com/v1alpha1
kind: LBFrontend
metadata:
  namespace: default
  name: lb-1
spec:
  vipRef:
    name: lb-1
  port: 80
  applications:
    httpsProxy:
      tlsConfig:
        certificates:
          - secretName: "test"
        validation:
          secretRef:
            name: "test-trusted-ca"
          subjectAlternativeNames:
            - exact: client.acme.io
      routes:
        - match:
            hostNames:
              - "foo.acme.io"
          backendRef:
            name: lb-1
