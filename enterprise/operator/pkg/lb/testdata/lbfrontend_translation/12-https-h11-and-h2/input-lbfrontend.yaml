apiVersion: isovalent.com/v1alpha1
kind: LBService
metadata:
  namespace: default
  name: lb-1
spec:
  vipRef:
    name: lb-1
  port: 80
  applications:
    httpsProxy:
      httpConfig:
        enableHTTP11: true
        enableHTTP2: true
      tlsConfig:
        certificates:
          - secretRef:
              name: "test"
      routes:
        - match:
            hostNames:
              - "foo.acme.io"
          backendRef:
            name: lb-1
