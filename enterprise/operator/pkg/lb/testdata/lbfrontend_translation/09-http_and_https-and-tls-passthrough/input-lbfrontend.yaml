apiVersion: isovalent.com/v1alpha1
kind: LBFrontend
metadata:
  namespace: default
  name: lb-1
spec:
  vipRef:
    name: lb-1
  port: 80
  applications:
    httpProxy:
      routes:
        - match:
            hostNames:
              - "bla.acme.io"
          backendRef:
            name: lb-1
    httpsProxy:
      tlsConfig:
        certificates:
          - secretRef:
              name: "test"
      routes:
        - match:
            hostNames:
              - "foo.acme.io"
          backendRef:
            name: lb-1
    tlsPassthrough:
      routes:
        - match:
            hostNames:
              - "passthrough.acme.io"
          backendRef:
            name: lb-1
