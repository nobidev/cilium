apiVersion: isovalent.com/v1alpha1
kind: LBFrontend
metadata:
  namespace: default
  name: lb-1
spec:
  vipRef:
    name: lb-1
  port: 80
  applications:
    httpProxy:
      routes:
        - hostNames:
            - "bla.acme.io"
          backendRef:
            name: lb-1
    httpsProxy:
      tlsConfig:
        certificates:
          - secretName: "test"
      routes:
        - hostNames:
            - "foo.acme.io"
          backendRef:
            name: lb-1
