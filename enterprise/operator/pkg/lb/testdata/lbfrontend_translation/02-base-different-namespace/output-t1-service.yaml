apiVersion: v1
kind: Service
metadata:
  annotations:
    lbipam.cilium.io/sharing-key: lb-1
    service.cilium.io/health-check-bgp-advertise-threshold: "1"
    service.cilium.io/health-check-http-method: GET
    service.cilium.io/health-check-http-path: /health
    service.cilium.io/health-check-probe-interval: 15s
    service.cilium.io/health-check-probe-timeout: 5s
    service.cilium.io/health-check-quarantine-timeout: 0s
    service.cilium.io/health-check-threshold-healthy: "1"
    service.cilium.io/health-check-threshold-unhealthy: "1"
  labels:
    lb.cilium.io/tier: t1
  namespace: special-namespace
  name: lbfe-lb-1
spec:
  ports:
    - name: http
      port: 80
      protocol: TCP
  type: LoadBalancer
