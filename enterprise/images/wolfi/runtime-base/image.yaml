contents:
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  repositories:
    - https://packages.wolfi.dev/os
  packages:
    - gops=0.3.29-r3
    - grep=3.12-r5 #Needed by the mount-bpf-fs init container
    - jq=1.8.1-r4 #Needed for cilium connectivity test to work
    - mount=2.41.3-r6 #Needed by the mount-bpf-fs init container
    - util-linux-misc=2.41.3-r6 #nsenter, used by the init script that calls cilium-tools-mount, but not that package itself
    - bash=5.3-r6
    - busybox=1.37.0-r54
    - ca-certificates=20251003-r4
    - iproute2=6.19.0-r0
    - ipset=7.24-r3
    - kmod=34.2-r45
    - shadow=4.19.4-r2 # Needed for groupadd
    - curl=8.19.0-r0  # temporary, for getting prometheus metrics in CI
    - gcc-14=14.3.0-r10 # for some header files
    - libatomic=15.2.0-r11 # Needed for embedded envoy
    - openssl=3.6.1-r3
    - cni-plugins-loopback=1.9.0-r4
    - make=4.4.1-r10
    - libmnl-dev=1.0.5-r7
    - libnftnl-dev=1.3.1-r2
    - pkgconf=2.5.1-r2
archs:
  - x86_64
  - arm64
