contents:
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  repositories:
    - https://packages.wolfi.dev/os
  packages:
    - gops=0.3.28-r20
    - grep=3.12-r3 #Needed by the mount-bpf-fs init container
    - jq=1.8.1-r3 #Needed for cilium connectivity test to work
    - mount=2.41.1-r4 #Needed by the mount-bpf-fs init container
    - util-linux-misc=2.41.1-r4 #nsenter, used by the init script that calls cilium-tools-mount, but not that package itself
    - bash=5.3-r3
    - busybox=1.37.0-r49
    - ca-certificates=20250619-r5
    - ip6tables=1.8.9
    - iproute2=6.16.0-r1
    - ipset=7.24-r2
    - iptables=1.8.9
    - kmod=34.2-r41
    - shadow=4.18.0-r3 # Needed for groupadd
    - curl=8.15.0-r5  # temporary, for getting prometheus metrics in CI
    - gcc-11=11.5.0-r8 # for some header files
    - openssl=3.5.2-r1
    - cni-plugins-loopback=1.7.1-r2
archs:
  - x86_64
  - arm64
