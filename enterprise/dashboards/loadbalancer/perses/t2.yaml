kind: Dashboard
metadata:
    name: adyrfghsltk3kf
    createdAt: 0001-01-01T00:00:00Z
    updatedAt: 0001-01-01T00:00:00Z
    version: 0
    project: "ILB"
spec:
    display:
        name: ILB T2
    variables:
        - kind: ListVariable
          spec:
            display:
                name: T2 node
                hidden: false
            defaultValue: $__all
            allowAllValue: true
            allowMultiple: false
            customAllValue: .*
            sort: none
            plugin:
                kind: PrometheusLabelValuesVariable
                spec:
                    labelName: node
                    matchers:
                        - kube_node_labels{label_service_cilium_io_node="t2"}
            name: node
        - kind: ListVariable
          spec:
            display:
                name: Service
                hidden: false
            defaultValue: $__all
            allowAllValue: true
            allowMultiple: false
            customAllValue: .*
            sort: none
            plugin:
                kind: PrometheusLabelValuesVariable
                spec:
                    labelName: envoy_listener_address
                    matchers:
                        - envoy_listener_downstream_cx_total
            name: service
    panels:
        "0_0":
            kind: Panel
            spec:
                display:
                    name: Total connections
                plugin:
                    kind: TimeSeriesChart
                    spec:
                        legend:
                            mode: list
                            position: right
                            values: []
                        visual:
                            areaOpacity: 0
                            connectNulls: false
                            display: line
                            lineWidth: 1
                        yAxis:
                            format:
                                unit: counts/sec
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: "sum by (envoy_listener_address) (\n    rate(\n        envoy_listener_downstream_cx_total{node=~\"^${node}$\", envoy_listener_address=~\"^${service}$\"}[$__rate_interval]\n    ) \n    * on (node) group_left() (\n        kube_node_labels{label_service_cilium_io_node=~\"t2\"}\n    )\n) != 0"
                                seriesNameFormat: '{{envoy_listener_address}}'
        "0_1":
            kind: Panel
            spec:
                display:
                    name: Active connections
                plugin:
                    kind: GaugeChart
                    spec:
                        calculation: last-number
                        thresholds:
                            steps:
                                - color: green
                                  value: 0
                                - color: red
                                  value: 80
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: sum(envoy_listener_downstream_cx_active)
