kind: Dashboard
metadata:
    name: de4pskmwe1i4gf
    createdAt: 0001-01-01T00:00:00Z
    updatedAt: 0001-01-01T00:00:00Z
    version: 0
    project: "ILB"
spec:
    display:
        name: ILB
    variables:
        - kind: ListVariable
          spec:
            display:
                name: Node
                hidden: false
            defaultValue: $__all
            allowAllValue: true
            allowMultiple: false
            customAllValue: .*
            sort: none
            plugin:
                kind: PrometheusLabelValuesVariable
                spec:
                    labelName: node
                    matchers:
                        - kube_node_labels
            name: node
        - kind: ListVariable
          spec:
            display:
                name: Service
                hidden: false
            defaultValue: $__all
            allowAllValue: true
            allowMultiple: false
            customAllValue: .*
            sort: none
            plugin:
                kind: PrometheusLabelValuesVariable
                spec:
                    labelName: service
                    matchers:
                        - cilium_lb_bytes_total
            name: service
        - kind: ListVariable
          spec:
            display:
                name: Backend
                hidden: false
            defaultValue: $__all
            allowAllValue: true
            allowMultiple: false
            customAllValue: .*
            sort: none
            plugin:
                kind: PrometheusLabelValuesVariable
                spec:
                    labelName: backend
                    matchers:
                        - cilium_lb_bytes_total
            name: backend
    panels:
        "0_0":
            kind: Panel
            spec:
                display:
                    name: '[CT maps] Service BPS'
                plugin:
                    kind: TimeSeriesChart
                    spec:
                        legend:
                            mode: list
                            position: right
                            values: []
                        visual:
                            areaOpacity: 0
                            connectNulls: false
                            display: line
                            lineWidth: 1
                        yAxis:
                            format:
                                decimalPlaces: 2
                                unit: bytes/sec
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: "sum by (service) (\n    rate(\n        cilium_lb_bytes_total{node=~\"^${node}$\", service=~\"^${service}$\", backend=~\"^${backend}$\"}[$__rate_interval]\n    ) \n    * on (node) group_left() (\n        kube_node_labels{label_service_cilium_io_node=~\"t1\"}\n    )\n) != 0"
