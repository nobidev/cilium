kind: Dashboard
metadata:
    name: eezurxnh69logb
    createdAt: 0001-01-01T00:00:00Z
    updatedAt: 0001-01-01T00:00:00Z
    version: 0
    project: "ILB"
spec:
    display:
        name: Isovalent Load Balancer
    variables:
        - kind: ListVariable
          spec:
            display:
                name: Namespace
                description: Namespace which contains Isovalent Load Balancer services
                hidden: false
            defaultValue: $__all
            allowAllValue: true
            allowMultiple: false
            customAllValue: .*
            sort: none
            plugin:
                kind: PrometheusLabelValuesVariable
                spec:
                    labelName: service
                    matchers:
                        - cilium_lb_bytes_total
            name: namespace
        - kind: ListVariable
          spec:
            display:
                name: Service
                description: The Isovalent Load Balancer service
                hidden: false
            defaultValue: $__all
            allowAllValue: true
            allowMultiple: false
            customAllValue: .*
            sort: none
            plugin:
                kind: PrometheusLabelValuesVariable
                spec:
                    labelName: service
                    matchers:
                        - cilium_lb_bytes_total{service=~".*${namespace}.*"}
            name: service_name
        - kind: TextVariable
          spec:
            display:
                name: Latency Threshold (ms)
                description: The warning threshold latency displayed in the latency panels (in milliseconds)
                hidden: false
            value: "2000"
            name: latency_threshold
        - kind: ListVariable
          spec:
            display:
                name: Service Name
                description: The name of the Isovalent Load Balancer service.
                hidden: true
            defaultValue: $__all
            allowAllValue: true
            allowMultiple: false
            customAllValue: .*
            sort: none
            plugin:
                kind: PrometheusLabelValuesVariable
                spec:
                    labelName: envoy_cluster_name
                    matchers:
                        - envoy_cluster_upstream_rq_time_bucket{envoy_cluster_name!="/envoy-admin"}
            name: cluster_name
        - kind: ListVariable
          spec:
            display:
                name: Connection Manager Name
                description: The name of the Isovalent Load Balancer service connection manager
                hidden: true
            defaultValue: $__all
            allowAllValue: true
            allowMultiple: false
            customAllValue: .*
            sort: none
            plugin:
                kind: PrometheusLabelValuesVariable
                spec:
                    labelName: envoy_http_conn_manager_prefix
                    matchers:
                        - envoy_listener_http_downstream_rq_xx{envoy_http_conn_manager_prefix=~"^http_.*"}
            name: connection_manager_prefix
        - kind: TextVariable
          spec:
            display:
                name: Mount Point for Disk Usage %
                description: Enter a valid mount point of a filesystem that represents disk usage %. For example "/" or "/var"
                hidden: true
            value: /var
            name: mountpoint
    panels:
        "0_0":
            kind: Panel
            spec:
                display:
                    name: Requests per Second
                    description: Requests per second for the selected service by HTTP response code class. Calculated from a linear rate estimation based on a cumulative count of each response type.
                plugin:
                    kind: TimeSeriesChart
                    spec:
                        legend:
                            mode: list
                            position: bottom
                            values: []
                        visual:
                            areaOpacity: 0
                            connectNulls: false
                            display: line
                            lineWidth: 1
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum(floor(rate(
                                        envoy_listener_http_downstream_rq_completed{envoy_http_conn_manager_prefix=~"http_${namespace}_${service_name}"}[$__rate_interval]
                                    ))) > 0 or vector(0)
                                seriesNameFormat: Total
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum(floor(rate(
                                        envoy_http_downstream_rq_active{envoy_http_conn_manager_prefix=~"http_${namespace}_${service_name}"}[$__rate_interval]
                                    ))) > 0 or vector(0)
                                seriesNameFormat: Active
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: "sum(floor(rate(\n    envoy_listener_http_downstream_rq_xx{envoy_response_code_class=\"1\", envoy_http_conn_manager_prefix=~\"http_${namespace}_${service_name}\"}[$__rate_interval]\n))) > 0 or vector(0) "
                                seriesNameFormat: 1xx
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: "sum(floor(rate(\n    envoy_http_downstream_rq_xx{envoy_response_code_class=\"2\", envoy_http_conn_manager_prefix=~\"http_${namespace}_${service_name}\"}[$__rate_interval]\n))) > 0 or vector(0) "
                                seriesNameFormat: 2xx
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: "sum(floor(rate(\n    envoy_http_downstream_rq_xx{envoy_response_code_class=\"3\", envoy_http_conn_manager_prefix=~\"http_${namespace}_${service_name}\"}[$__rate_interval]\n))) > 0 or vector(0) "
                                seriesNameFormat: 3xx
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: "sum(floor(rate(\n    envoy_http_downstream_rq_xx{envoy_response_code_class=\"4\", envoy_http_conn_manager_prefix=~\"http_${namespace}_${service_name}\"}[$__rate_interval]\n))) > 0 or vector(0) "
                                seriesNameFormat: 4xx
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: "sum(floor(rate(\n    envoy_http_downstream_rq_xx{envoy_response_code_class=\"5\", envoy_http_conn_manager_prefix=~\"http_${namespace}_${service_name}\"}[$__rate_interval]\n))) > 0 or vector(0) "
                                seriesNameFormat: 5xx
        "0_1":
            kind: Panel
            spec:
                display:
                    name: Connections per Second
                    description: Client connections per second by connection disposition for the selected service. Calculated from a linear rate estimation based on a cumulative total of each connection disposition.
                plugin:
                    kind: TimeSeriesChart
                    spec:
                        legend:
                            mode: list
                            position: bottom
                            values: []
                        visual:
                            areaOpacity: 0
                            connectNulls: false
                            display: line
                            lineWidth: 1
                        yAxis:
                            format:
                                unit: counts/sec
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum(floor(rate(
                                        envoy_http_downstream_cx_total{envoy_http_conn_manager_prefix=~"http_${namespace}_${service_name}"}[$__rate_interval]
                                    ))) > 0 or vector(0)
                                seriesNameFormat: Total
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum(floor(rate(
                                        envoy_http_downstream_cx_active{envoy_http_conn_manager_prefix=~"http_${namespace}_${service_name}"}[$__rate_interval]
                                    ))) > 0 or vector(0)
                                seriesNameFormat: Active
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum(floor(rate(
                                        envoy_http_downstream_cx_destroy{envoy_http_conn_manager_prefix=~"http_${namespace}_${service_name}"}[$__rate_interval]
                                    ))) > 0 or vector(0)
                                seriesNameFormat: Closed
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum(floor(rate(
                                        envoy_http_downstream_cx_destroy_remote{envoy_http_conn_manager_prefix=~"http_${namespace}_${service_name}"}[$__rate_interval]
                                    ))) > 0 or vector(0)
                                seriesNameFormat: Client Closed
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum(floor(rate(
                                        envoy_http_downstream_cx_destroy_local{envoy_http_conn_manager_prefix=~"http_${namespace}_${service_name}"}[$__rate_interval]
                                    ))) > 0 or vector(0)
                                seriesNameFormat: ILB Closed
        "0_2":
            kind: Panel
            spec:
                display:
                    name: Errors Per Second
                    description: The rate of 4xx and 5xx errors per second for the selected service. Calculated from a linear rate estimation based on a cumulative total of each error type.
                plugin:
                    kind: TimeSeriesChart
                    spec:
                        legend:
                            mode: list
                            position: bottom
                            values: []
                        visual:
                            areaOpacity: 0
                            connectNulls: false
                            display: line
                            lineWidth: 1
                        yAxis:
                            format:
                                unit: counts/sec
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum (floor(rate(
                                        envoy_listener_http_downstream_rq_xx{envoy_response_code_class="4", envoy_http_conn_manager_prefix=~"http_${namespace}_${service_name}"}[$__rate_interval]
                                    ))) > 0 or vector(0)
                                seriesNameFormat: 4xx
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum (floor(rate(
                                        envoy_listener_http_downstream_rq_xx{envoy_response_code_class="5", envoy_http_conn_manager_prefix=~"http_${namespace}_${service_name}"}[$__rate_interval]
                                    ))) > 0 or vector(0)
                                seriesNameFormat: 5xx
        "0_3":
            kind: Panel
            spec:
                display:
                    name: Round Trip Service Latency
                    description: The HTTP request latency over time for the selected service. Uses a dynamic moving average of request counts that fall within preconfigured histogram buckets in order to compute estimated quantiles (p90, p95, p99 etc.) The latency values seen here may be an overestimate or underestimate depending upon the relative count of requests that fell within each bucket during a given time interval.
                plugin:
                    kind: TimeSeriesChart
                    spec:
                        legend:
                            mode: list
                            position: bottom
                            values: []
                        thresholds:
                            steps:
                                - color: green
                                  value: 0
                        visual:
                            areaOpacity: 0
                            connectNulls: false
                            display: line
                            lineWidth: 1
                        yAxis:
                            format:
                                unit: milliseconds
                            min: 0
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                minStep: ""
                                query: "histogram_quantile(0.999, \n  sum by (le) (\n    ceil(rate(\n      envoy_cluster_upstream_rq_time_bucket{envoy_cluster_name=~\"^${namespace}/lbfe-${service_name}/backend_cluster_.*\"}[$__rate_interval]\n    ))\n  )\n) or vector(0)"
                                seriesNameFormat: p99.9
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                minStep: ""
                                query: "histogram_quantile(0.99, \n  sum by (le) (\n    ceil(rate(\n      envoy_cluster_upstream_rq_time_bucket{envoy_cluster_name=~\"^${namespace}/lbfe-${service_name}/backend_cluster_.*\"}[$__rate_interval]\n    ))\n  )\n) or vector(0)"
                                seriesNameFormat: p99
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                minStep: ""
                                query: "histogram_quantile(0.95, \n  sum by (le) (\n    ceil(rate(\n      envoy_cluster_upstream_rq_time_bucket{envoy_cluster_name=~\"^${namespace}/lbfe-${service_name}/backend_cluster_.*\"}[$__rate_interval]\n    ))\n  )\n) or vector(0)"
                                seriesNameFormat: p95
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                minStep: ""
                                query: "histogram_quantile(0.90, \n  sum by (le) (\n    ceil(rate(\n      envoy_cluster_upstream_rq_time_bucket{envoy_cluster_name=~\"^${namespace}/lbfe-${service_name}/backend_cluster_.*\"}[$__rate_interval]\n    ))\n  )\n) or vector(0)"
                                seriesNameFormat: p90
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                minStep: ""
                                query: "histogram_quantile(0.50, \n  sum by (le) (\n    ceil(rate(\n      envoy_cluster_upstream_rq_time_bucket{envoy_cluster_name=~\"^${namespace}/lbfe-${service_name}/backend_cluster_.*\"}[$__rate_interval]\n    ))\n  )\n) or vector(0)"
                                seriesNameFormat: p50
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                minStep: ""
                                query: "histogram_quantile(0.25, \n  sum by (le) (\n    ceil(rate(\n      envoy_cluster_upstream_rq_time_bucket{envoy_cluster_name=~\"^${namespace}/lbfe-${service_name}/backend_cluster_.*\"}[$__rate_interval]\n    ))\n  )\n) or vector(0)"
                                seriesNameFormat: p25
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: vector($latency_threshold)
                                seriesNameFormat: threshold
        "0_4":
            kind: Panel
            spec:
                display:
                    name: Bytes per Second
                    description: Traffic rates for the selected service as observed for client connections. Calculated from a linear rate estimation based on a cumulative total of bytes for each traffic direction.
                plugin:
                    kind: TimeSeriesChart
                    spec:
                        legend:
                            mode: list
                            position: bottom
                            values: []
                        visual:
                            areaOpacity: 0
                            connectNulls: false
                            display: line
                            lineWidth: 1
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: "floor(\n    sum(rate(envoy_http_downstream_cx_tx_bytes_total{envoy_http_conn_manager_prefix=~\"http_${namespace}_${service_name}\"}[$__rate_interval]))\n    + \n    sum(rate(envoy_http_downstream_cx_rx_bytes_total{envoy_http_conn_manager_prefix=~\"http_${namespace}_${service_name}\"}[$__rate_interval]))\n) > 0 or vector(0)"
                                seriesNameFormat: Total
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum(floor(rate(
                                        envoy_http_downstream_cx_rx_bytes_total{envoy_http_conn_manager_prefix=~"http_${namespace}_${service_name}"}[$__rate_interval]
                                    ))) > 0 or vector(0)
                                seriesNameFormat: Receive
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum(floor(rate(
                                        envoy_http_downstream_cx_tx_bytes_total{envoy_http_conn_manager_prefix=~"http_${namespace}_${service_name}"}[$__rate_interval]
                                    ))) > 0 or vector(0)
                                seriesNameFormat: Transmit
        "0_5":
            kind: Panel
            spec:
                display:
                    name: Load Balancer Datapath Latency
                    description: The estimated latency within the ILB layer 7 datapath for the selected service. Computed by taking the average duration required from request time until a response has been sent, and subtracting the average duration from the time that the request is forwarded to the backend until a response is recieved from the backend.
                plugin:
                    kind: TimeSeriesChart
                    spec:
                        thresholds:
                            steps:
                                - color: green
                                  value: 0
                        visual:
                            areaOpacity: 0
                            connectNulls: false
                            display: line
                            lineWidth: 1
                        yAxis:
                            format:
                                unit: milliseconds
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    clamp_min(
                                      (
                                      sum(rate(envoy_http_downstream_rq_time_sum{envoy_http_conn_manager_prefix=~"http_${namespace}_${service_name}"}[$__rate_interval]))
                                        /
                                      sum(rate(envoy_http_downstream_rq_time_count{envoy_http_conn_manager_prefix=~"http_${namespace}_${service_name}"}[$__rate_interval]))
                                      )

                                    -

                                      (
                                      sum(rate(envoy_cluster_upstream_rq_time_sum{envoy_cluster_name=~"^${namespace}/lbfe-${service_name}/backend_cluster_.*"}[$__rate_interval]))
                                        /
                                      sum(rate(envoy_cluster_upstream_rq_time_count{envoy_cluster_name=~"^${namespace}/lbfe-${service_name}/backend_cluster_.*"}[$__rate_interval]))
                                      ),
                                    0) > 0 or vector(0)
                                seriesNameFormat: Datapath
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: vector($latency_threshold)
                                seriesNameFormat: threshold
        "0_6":
            kind: Panel
            spec:
                display:
                    name: Round Trip Latency Heatmap
                    description: The upstream request latency over time for the selected service. For each time interval, the number of requests that fell within a given latency bucket are shown, and stacked vertically. There will usually be a "bright line" across the visualization which indicates the typical latency for the service. When there are resource constraints or other issues with the backend service, the bright areas will shift towards higher latencies.
                plugin:
                    kind: Markdown
                    spec:
                        text: '**Migration from Grafana not supported !**'
        "0_7":
            kind: Panel
            spec:
                display:
                    name: Errors
                    description: The rate of various HTTP error conditions will appear here for the selected service. Examples include connection reset, protocol errors, and request body too large. These are calculated from a linear rate estimation based on a cumulative total of each.
                plugin:
                    kind: TimeSeriesChart
                    spec:
                        legend:
                            mode: list
                            position: bottom
                            values: []
                        visual:
                            areaOpacity: 0
                            connectNulls: false
                            display: line
                            lineWidth: 1
                        yAxis:
                            format:
                                decimalPlaces: 2
                                unit: decimal
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum (
                                        rate(
                                            envoy_http_downstream_rq_rx_reset{envoy_http_conn_manager_prefix=~"http_${namespace}_${service_name}"}[$__rate_interval]
                                        )
                                    )
                                seriesNameFormat: rq rx reset {{envoy_http_conn_manager_prefix}}
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum (
                                        rate(
                                            envoy_http_downstream_cx_protocol_error{envoy_http_conn_manager_prefix=~"http_${namespace}_${service_name}"}[$__rate_interval]
                                        )
                                    ) != 0
                                seriesNameFormat: protocol error {{envoy_http_conn_manager_prefix}}
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum (
                                        rate(
                                            envoy_http_downstream_rq_rejected_via_ip_detection{envoy_http_conn_manager_prefix=~"http_${namespace}_${service_name}"}[$__rate_interval]
                                        )
                                    ) != 0
                                seriesNameFormat: rq rejected via ip detection {{envoy_http_conn_manager_prefix}}
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum (
                                        rate(
                                            envoy_http_downstream_rq_response_before_rq_complete{envoy_http_conn_manager_prefix=~"http_${namespace}_${service_name}"}[$__rate_interval]
                                        )
                                    ) != 0
                                seriesNameFormat: re response before rq complete {{envoy_http_conn_manager_prefix}}
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum (
                                        rate(
                                            envoy_http_downstream_rq_tx_reset{envoy_http_conn_manager_prefix=~"http_${namespace}_${service_name}"}[$__rate_interval]
                                        )
                                    ) != 0
                                seriesNameFormat: rq tx reset {{envoy_http_conn_manager_prefix}}
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum (
                                        rate(
                                            envoy_http_downstream_rq_too_large{envoy_http_conn_manager_prefix=~"http_${namespace}_${service_name}"}[$__rate_interval]
                                        )
                                    ) != 0
                                seriesNameFormat: rq too large {{envoy_http_conn_manager_prefix}}
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum (
                                        rate(
                                            envoy_http_downstream_rq_idle_timeout{envoy_http_conn_manager_prefix=~"http_${namespace}_${service_name}"}[$__rate_interval]
                                        )
                                    ) != 0
                                seriesNameFormat: rq idle timeout {{envoy_http_conn_manager_prefix}}
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum (
                                        rate(
                                            envoy_http_downstream_rq_max_duration_reached{envoy_http_conn_manager_prefix=~"http_${namespace}_${service_name}"}[$__rate_interval]
                                        )
                                    ) != 0
                                seriesNameFormat: rq max duration reached {{envoy_http_conn_manager_prefix}}
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum (
                                        rate(
                                            envoy_http_downstream_rq_timeout{envoy_http_conn_manager_prefix=~"http_${namespace}_${service_name}"}[$__rate_interval]
                                        )
                                    ) != 0
                                seriesNameFormat: rq timeout {{envoy_http_conn_manager_prefix}}
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum (
                                        rate(
                                            envoy_http_downstream_rq_overload_close{envoy_http_conn_manager_prefix=~"http_${namespace}_${service_name}"}[$__rate_interval]
                                        )
                                    ) != 0
                                seriesNameFormat: rq overload close {{envoy_http_conn_manager_prefix}}
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum (
                                        rate(
                                            envoy_http_downstream_rq_too_many_premature_resets{envoy_http_conn_manager_prefix=~"http_${namespace}_${service_name}"}[$__rate_interval]
                                        )
                                    ) != 0
                                seriesNameFormat: rq too many premature resets {{envoy_http_conn_manager_prefix}}
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum (
                                        rate(
                                            envoy_http_rs_too_large{envoy_http_conn_manager_prefix=~"http_${namespace}_${service_name}"}[$__rate_interval]
                                        )
                                    ) != 0
                                seriesNameFormat: http rs too large {{envoy_http_conn_manager_prefix}}
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    clamp_max(absent(sum(
                                        rate(
                                            envoy_http_downstream_rq_rx_reset{envoy_http_conn_manager_prefix=~"http_${namespace}_${service_name}"}[$__rate_interval]
                                        )
                                    )), 0)
                                seriesNameFormat: Offline
        "0_8":
            kind: Panel
            spec:
                display:
                    name: Client Protocol Version
                    description: The number of connections per second for each HTTP protocol version for the selected service (HTTP/1.x, HTTP/2, HTTP/3). Calculated from a linear rate estimation based on a cumulative total of each.
                plugin:
                    kind: TimeSeriesChart
                    spec:
                        legend:
                            mode: list
                            position: bottom
                            values: []
                        visual:
                            areaOpacity: 0
                            connectNulls: false
                            display: line
                            lineWidth: 1
                        yAxis:
                            format:
                                decimalPlaces: 2
                                unit: counts/sec
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum (
                                        rate(
                                            envoy_http_downstream_cx_http1_total{envoy_http_conn_manager_prefix=~"http_${namespace}_${service_name}"}[$__rate_interval]
                                        )
                                    )
                                seriesNameFormat: HTTP/1.x
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum (
                                        rate(
                                            envoy_http_downstream_cx_http2_total{envoy_http_conn_manager_prefix=~"http_${namespace}_${service_name}"}[$__rate_interval]
                                        )
                                    )
                                seriesNameFormat: HTTP/2
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum (
                                        rate(
                                            envoy_http_downstream_cx_http3_total{envoy_http_conn_manager_prefix=~"http_${namespace}_${service_name}"}[$__rate_interval]
                                        )
                                    ) != 0
                                seriesNameFormat: HTTP/3
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    clamp_max(
                                      absent(
                                        sum(
                                          rate(
                                            envoy_http_downstream_cx_http1_total{envoy_http_conn_manager_prefix=~"http_${namespace}_${service_name}"}[$__rate_interval]
                                          )
                                      )
                                    ),0)
                                seriesNameFormat: Offline
        "1_0":
            kind: Panel
            spec:
                display:
                    name: Handshake
                    description: The rate of TLS handshakes for the selected service. Calculated from a linear rate estimation based on a cumulative total.
                plugin:
                    kind: TimeSeriesChart
                    spec:
                        legend:
                            mode: list
                            position: bottom
                            values: []
                        visual:
                            areaOpacity: 0
                            connectNulls: false
                            display: line
                            lineWidth: 1
                        yAxis:
                            format:
                                unit: counts/sec
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum (
                                        rate(
                                            envoy_listener_ssl_handshake{envoy_listener_address=~"^${namespace}_${service_name}$"}[$__rate_interval]
                                        )
                                    )
                                seriesNameFormat: Handshakes
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    clamp_max(absent(sum (
                                        rate(
                                            envoy_listener_ssl_handshake{envoy_listener_address=~"^${namespace}_${service_name}$"}[$__rate_interval]
                                        )
                                    )), 0)
                                seriesNameFormat: None
        "1_1":
            kind: Panel
            spec:
                display:
                    name: Ciphers
                    description: Cumulative counts of each unique cipher suite negotiated with clients for the service.
                plugin:
                    kind: TimeSeriesChart
                    spec:
                        legend:
                            mode: list
                            position: bottom
                            values: []
                        visual:
                            areaOpacity: 0
                            connectNulls: false
                            display: line
                            lineWidth: 1
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: sum by (cipher_suite) (envoy_cluster_ssl_ciphers{envoy_cluster_name=~"^${namespace}/lbfe-${service_name}/backend_cluster_.*"})
                                seriesNameFormat: '{{cipher_suite}}'
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: clamp_max(absent(envoy_cluster_ssl_ciphers), 0)
                                seriesNameFormat: None
        "1_2":
            kind: Panel
            spec:
                display:
                    name: TLS errors
                    description: The rate of various TLS error conditions will appear here for the selected service. Examples include connection error, no certificate, certificate verify error, and SAN verification error. These are calculated from a linear rate estimation based on a cumulative total of each.
                plugin:
                    kind: TimeSeriesChart
                    spec:
                        legend:
                            mode: list
                            position: bottom
                            values: []
                        visual:
                            areaOpacity: 0
                            connectNulls: false
                            display: line
                            lineWidth: 1
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum (
                                        rate(
                                            envoy_listener_ssl_connection_error{envoy_listener_address=~"^${namespace}_${service_name}$"}[$__rate_interval]
                                        )
                                    ) or vector(0)
                                seriesNameFormat: cx error
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum (
                                        rate(
                                            envoy_listener_ssl_fail_verify_no_cert{envoy_listener_address=~"^${namespace}_${service_name}$"}[$__rate_interval]
                                        )
                                    ) != 0
                                seriesNameFormat: fail verify no cert {{envoy_listener_address}}
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum (
                                        rate(
                                            envoy_listener_ssl_fail_verify_error{envoy_listener_address=~"^${namespace}_${service_name}$"}[$__rate_interval]
                                        )
                                    ) != 0
                                seriesNameFormat: fail verify error {{envoy_listener_address}}
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum (
                                        rate(
                                            envoy_listener_ssl_fail_verify_san{envoy_listener_address=~"^${namespace}_${service_name}$"}[$__rate_interval]
                                        )
                                    ) != 0
                                seriesNameFormat: fail verify san {{envoy_listener_address}}
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum (
                                        rate(
                                            envoy_listener_ssl_fail_verify_cert_hash{envoy_listener_address=~"^${namespace}_${service_name}$"}[$__rate_interval]
                                        )
                                    ) != 0
                                seriesNameFormat: fail verify cert hash {{envoy_listener_address}}
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum (
                                        rate(
                                            envoy_listener_ssl_ocsp_staple_failed{envoy_listener_address=~"^${namespace}_${service_name}$"}[$__rate_interval]
                                        )
                                    ) != 0
                                seriesNameFormat: ocsp staple failed {{envoy_listener_address}}
        "2_0":
            kind: Panel
            spec:
                display:
                    name: Throughput
                    description: An estimate of the TCP throughput for the selected TCP service which is using Tier 2 of the Isovalent Load Balancer. This metric will only appear for such "TCP on t2" services. Uses a linear rate estimation based on a cumulative count of bytes for each direction of traffic.
                plugin:
                    kind: TimeSeriesChart
                    spec:
                        legend:
                            mode: list
                            position: bottom
                            values: []
                        visual:
                            areaOpacity: 0
                            connectNulls: false
                            display: line
                            lineWidth: 1
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum (
                                        rate(
                                            envoy_tcp_downstream_cx_rx_bytes_total{envoy_tcp_prefix=~"tcp_proxy_ilb-${namespace}_${service_name}_.*"}[$__rate_interval]
                                        )
                                    )
                                    +
                                    sum (
                                        rate(
                                            envoy_tcp_downstream_cx_tx_bytes_total{envoy_tcp_prefix=~"tcp_proxy_ilb-${namespace}_${service_name}_.*"}[$__rate_interval]
                                        )
                                    )
                                seriesNameFormat: Total
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum (
                                        rate(
                                            envoy_tcp_downstream_cx_rx_bytes_total{envoy_tcp_prefix=~"tcp_proxy_ilb-${namespace}_${service_name}_.*"}[$__rate_interval]
                                        )
                                    )
                                seriesNameFormat: Receive
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum (
                                        rate(
                                            envoy_tcp_downstream_cx_tx_bytes_total{envoy_tcp_prefix=~"tcp_proxy_ilb-${namespace}_${service_name}_.*"}[$__rate_interval]
                                        )
                                    )
                                seriesNameFormat: Transmit
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    clamp_max(absent(
                                        sum (
                                            rate(
                                                envoy_tcp_downstream_cx_tx_bytes_total{envoy_tcp_prefix=~"tcp_proxy_ilb-${namespace}_${service_name}_.*"}[$__rate_interval]
                                            )
                                        )
                                    ), 0)
                                seriesNameFormat: Offline
        "2_1":
            kind: Panel
            spec:
                display:
                    name: Active Connections
                    description: 'The count of active client TCP connections for the selected service over time. Computed by subtracting the total number of closed connections from the total number of connections observed for the service at each point in time. '
                plugin:
                    kind: TimeSeriesChart
                    spec:
                        legend:
                            mode: list
                            position: bottom
                            values: []
                        visual:
                            areaOpacity: 0
                            connectNulls: false
                            display: line
                            lineWidth: 1
                        yAxis:
                            format:
                                unit: decimal
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum(envoy_listener_downstream_cx_total{envoy_listener_address=~"${namespace}_${service_name}"})
                                    - sum(envoy_listener_downstream_cx_destroy{envoy_listener_address=~"${namespace}_${service_name}"})
                                seriesNameFormat: Connections
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    clamp_max(absent(sum(envoy_listener_downstream_cx_total{envoy_listener_address=~"${namespace}_${service_name}"})
                                    - sum(envoy_listener_downstream_cx_destroy{envoy_listener_address=~"${namespace}_${service_name}"})),0)
                                seriesNameFormat: Offline
        "2_2":
            kind: Panel
            spec:
                display:
                    name: Connections per Second
                    description: The number of opened and closed connections per second for the selected service. Calculated from a linear rate estimation based on a cumulative total of each.
                plugin:
                    kind: TimeSeriesChart
                    spec:
                        legend:
                            mode: list
                            position: bottom
                            values: []
                        visual:
                            areaOpacity: 0
                            connectNulls: false
                            display: line
                            lineWidth: 1
                        yAxis:
                            format:
                                unit: counts/sec
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum (
                                        rate(
                                            envoy_listener_downstream_cx_total{envoy_listener_address=~"${namespace}_${service_name}"}[$__rate_interval]
                                        )
                                    )
                                seriesNameFormat: Opened
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum (
                                        rate(
                                            envoy_listener_downstream_cx_destroy{envoy_listener_address=~"${namespace}_${service_name}"}[$__rate_interval]
                                        )
                                    )
                                seriesNameFormat: Closed
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    clamp_max(absent(sum (
                                        rate(
                                            envoy_listener_downstream_cx_total{envoy_listener_address=~"${namespace}_${service_name}"}[$__rate_interval]
                                        )
                                    )),0)
                                seriesNameFormat: Offline
        "3_0":
            kind: Panel
            spec:
                display:
                    name: CPU Usage %
                    description: Estimated CPU usage per node for the entire Load Balancer. Calculated as the inverse of idle CPU time based on a linear estimation of total idle CPU time.
                plugin:
                    kind: TimeSeriesChart
                    spec:
                        legend:
                            mode: list
                            position: bottom
                            values: []
                        visual:
                            areaOpacity: 0
                            connectNulls: false
                            display: line
                            lineWidth: 1
                        yAxis:
                            format:
                                unit: percent
                            min: 0
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    100 * max(
                                      1 - (rate(node_cpu_seconds_total{mode=~"idle"}[$__rate_interval]) or vector(0))
                                      ) by (instance)
                                    * on (instance) group_left(node) (
                                      label_replace(kube_node_status_addresses{node=~".*"}, "instance", "$1:9100", "address", "(.*)")
                                    ) or on() clamp_max(absent(node_cpu_seconds_total{node="offline"}),0)
                                seriesNameFormat: '{{node}}'
        "3_1":
            kind: Panel
            spec:
                display:
                    name: Memory Usage %
                    description: An estimate of memory usage percentage for each node in the Load Balancer cluster. Calculated as total memory minus the current value of (free + buffers + cached) memory, and converted to a percentage.
                plugin:
                    kind: TimeSeriesChart
                    spec:
                        legend:
                            mode: list
                            position: bottom
                            values: []
                        visual:
                            areaOpacity: 0
                            connectNulls: false
                            display: line
                            lineWidth: 1
                        yAxis:
                            format:
                                unit: percent
                            min: 0
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    100 * ((
                                      node_memory_MemTotal_bytes{job="node-exporter"}
                                    -
                                      node_memory_MemFree_bytes{job="node-exporter"}
                                    -
                                      node_memory_Buffers_bytes{job="node-exporter"}
                                    -
                                      node_memory_Cached_bytes{job="node-exporter"}
                                    ) / node_memory_MemTotal_bytes{job="node-exporter"})
                                    * on (instance) group_left(node) (
                                      label_replace(kube_node_status_addresses{node=~".*"}, "instance", "$1:9100", "address", "(.*)")
                                    ) or on() clamp_max(absent(node_memory_Cached_bytes{node="offline"}),0)
                                seriesNameFormat: '{{node}}'
        "3_2":
            kind: Panel
            spec:
                display:
                    name: Disk Usage %
                    description: An estimate of disk usage percentage over time. Calculated by subtracting the count of free bytes on a selected mountpoint on each node (summed over all devices with that mountpoint) from the total size of the devices with that mountpoint. The hidden variable in the settings for this dashboard, "mountpoint", must be set to a valid value, in order for this metric to show data.
                plugin:
                    kind: TimeSeriesChart
                    spec:
                        legend:
                            mode: list
                            position: bottom
                            values: []
                        visual:
                            areaOpacity: 0
                            connectNulls: false
                            display: line
                            lineWidth: 1
                        yAxis:
                            format:
                                unit: percent
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: "((node_filesystem_size_bytes{mountpoint=\"${mountpoint}\"} - node_filesystem_free_bytes{mountpoint=\"${mountpoint}\"}) \n / node_filesystem_size_bytes{mountpoint=\"${mountpoint}\"} * 100)\n* on (instance) group_left(node, device) (\n  label_replace(kube_node_status_addresses{node=~\".*\"}, \"instance\", \"$1:9100\", \"address\", \"(.*)\")\n) or on() clamp_max(absent(node_filesystem_size_bytes{node=\"offline\"}),0)"
                                seriesNameFormat: '{{node}}'
        "3_3":
            kind: Panel
            spec:
                display:
                    name: Disk Wait Time
                    description: An estimate of the current disk I/O latency for each node in the Isovalent Load Balancer cluster. Calculated from a linear rate estimation based on a cumulative total of disk wait time. The maximum disk latency at each time step over all devices is shown.
                plugin:
                    kind: TimeSeriesChart
                    spec:
                        legend:
                            mode: list
                            position: bottom
                            values: []
                        visual:
                            areaOpacity: 0
                            connectNulls: false
                            display: line
                            lineWidth: 1
                        yAxis:
                            format:
                                unit: seconds
                            min: 0
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    max(
                                      rate(node_disk_io_time_seconds_total[$__rate_interval])
                                    ) by (instance)
                                    * on (instance) group_left(node) (
                                      label_replace(kube_node_status_addresses{node=~".*"}, "instance", "$1:9100", "address", "(.*)")
                                    ) or on() clamp_max(absent(node_disk_io_time_seconds_total{node="offline"}),0)
                                seriesNameFormat: '{{node}}'
        "3_4":
            kind: Panel
            spec:
                display:
                    name: Disk Write Rate
                    description: An estimate of the total disk write rate for all devices for each node in the Isovalent Load Balancer cluster. Calculated from a linear rate estimation based on a cumulative total of bytes written to each node.
                plugin:
                    kind: TimeSeriesChart
                    spec:
                        legend:
                            mode: list
                            position: bottom
                            values: []
                        visual:
                            areaOpacity: 0
                            connectNulls: false
                            display: line
                            lineWidth: 1
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum by (node) ((rate(node_disk_written_bytes_total[$__rate_interval]))
                                    * on (instance) group_left(node) (
                                      label_replace(kube_node_status_addresses{node=~".*"}, "instance", "$1:9100", "address", "(.*)")
                                    )) or on() clamp_max(absent(node_filesystem_size_bytes{node="offline"}),0)
                                seriesNameFormat: '{{node}}'
        "3_5":
            kind: Panel
            spec:
                display:
                    name: Disk Read Rate
                    description: An estimate of the total disk read rate for all devices for each node in the Isovalent Load Balancer cluster. Calculated from a linear rate estimation based on a cumulative total of bytes read from each node.
                plugin:
                    kind: TimeSeriesChart
                    spec:
                        legend:
                            mode: list
                            position: bottom
                            values: []
                        visual:
                            areaOpacity: 0
                            connectNulls: false
                            display: line
                            lineWidth: 1
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    sum by (node) ((rate(node_disk_read_bytes_total[$__rate_interval]))
                                    * on (instance) group_left(node) (
                                      label_replace(kube_node_status_addresses{node=~".*"}, "instance", "$1:9100", "address", "(.*)")
                                    )) or on() clamp_max(absent(node_filesystem_size_bytes{node="offline"}),0)
                                seriesNameFormat: '{{node}} {{device}}'
        "4_0":
            kind: Panel
            spec:
                display:
                    name: Active Nodes
                    description: The current count of active nodes. Calculated from the running state of the primary agent on each node.
                plugin:
                    kind: TimeSeriesChart
                    spec:
                        legend:
                            mode: list
                            position: bottom
                            values: []
                        visual:
                            areaOpacity: 0
                            connectNulls: false
                            display: line
                            lineWidth: 1
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: count(kube_pod_container_status_running{pod=~"cilium-[0-9a-z]+"} > 0)
                                seriesNameFormat: Active Nodes
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: "count(\n    kube_pod_status_phase{pod=~\"cilium-[0-9a-z]+\", phase!=\"Running\"} == 1\n    or \n    kube_pod_container_status_waiting_reason{pod=~\"cilium-[0-9a-z]+\", reason=~\"CrashLoopBackOff|ErrImagePull|ImagePullBackOff|Init:CrashLoopBackOff\"} > 0\n) or vector(0)"
                                seriesNameFormat: Unhealthy Nodes
        "4_1":
            kind: Panel
            spec:
                display:
                    name: BGP Sessions by Node
                    description: The current count of Up and Down BGP session for each node.
                plugin:
                    kind: TimeSeriesChart
                    spec:
                        legend:
                            mode: list
                            position: bottom
                            values: []
                        visual:
                            areaOpacity: 0
                            connectNulls: false
                            display: line
                            lineWidth: 1
                        yAxis:
                            format:
                                decimalPlaces: 0
                                unit: decimal
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: count by(node) (cilium_bgp_control_plane_session_state)
                                seriesNameFormat: '{{node}} Up'
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: count by(node) (cilium_bgp_control_plane_session_state == 0)
                                seriesNameFormat: '{{node}} Down'
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: clamp_max(absent(cilium_bgp_control_plane_session_state),0)
                                seriesNameFormat: Offline
        "4_2":
            kind: Panel
            spec:
                display:
                    name: BGP Advertised Routes by Node
                    description: The current count of advertised BGP routes for each node.
                plugin:
                    kind: TimeSeriesChart
                    spec:
                        legend:
                            mode: list
                            position: bottom
                            values: []
                        visual:
                            areaOpacity: 0
                            connectNulls: false
                            display: line
                            lineWidth: 1
                        yAxis:
                            format:
                                decimalPlaces: 0
                                unit: decimal
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: count by (node) (cilium_bgp_control_plane_advertised_routes)
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: clamp_max(absent(cilium_bgp_control_plane_advertised_routes),0)
                                seriesNameFormat: Offline
        "5_0":
            kind: Panel
            spec:
                display:
                    name: Tier 1 Traffic
                    description: Total Tier 1 traffic across the entire Isovalent Load Balancer cluster. Calculated from a linear rate estimation based on a cumulative total of each traffic direction.
                plugin:
                    kind: TimeSeriesChart
                    spec:
                        legend:
                            mode: list
                            position: bottom
                            values: []
                        visual:
                            areaOpacity: 0
                            connectNulls: false
                            display: line
                            lineWidth: 1
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: "sum(\n    (\n        (\n            sum by (instance) (\n                rate(node_network_receive_bytes_total{device!~\"(^cilium.*)|(^lo.*)|(^lxc.*)\"}[$__rate_interval])\n            )\n            +\n            sum by (instance) (\n                rate(node_network_transmit_bytes_total{device!~\"(^cilium.*)|(^lo.*)|(^lxc.*)\"}[$__rate_interval])\n            )  \n        )\n        * on (instance) group_left(node)\n        label_replace(kube_node_status_addresses{node=~\".*\"}, \"instance\", \"$1:9100\", \"address\", \"(.*)\")\n    ) \n    * on (node) (\n        kube_node_labels{label_service_cilium_io_node=\"t1\"}\n    )\n)"
                                seriesNameFormat: Total
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: "sum(\n    (\n        (\n            sum by (instance) (\n                rate(node_network_receive_bytes_total{device!~\"(^cilium.*)|(^lo.*)|(^lxc.*)\"}[$__rate_interval])\n            )  \n        )\n        * on (instance) group_left(node)\n        label_replace(kube_node_status_addresses{node=~\".*\"}, \"instance\", \"$1:9100\", \"address\", \"(.*)\")\n    ) \n    * on (node) (\n        kube_node_labels{label_service_cilium_io_node=\"t1\"}\n    )\n)"
                                seriesNameFormat: Receive
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: "sum(\n    (\n        (\n            sum by (instance) (\n                rate(node_network_transmit_bytes_total{device!~\"(^cilium.*)|(^lo.*)|(^lxc.*)\"}[$__rate_interval])\n            )  \n        )\n        * on (instance) group_left(node)\n        label_replace(kube_node_status_addresses{node=~\".*\"}, \"instance\", \"$1:9100\", \"address\", \"(.*)\")\n    ) \n    * on (node) (\n        kube_node_labels{label_service_cilium_io_node=\"t1\"}\n    )\n)"
                                seriesNameFormat: Transmit
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: "clamp_max(absent(sum(\n    (\n        (\n            sum by (instance) (\n                rate(node_network_transmit_bytes_total{device!~\"(^cilium.*)|(^lo.*)|(^lxc.*)\"}[$__rate_interval])\n            )  \n        )\n        * on (instance) group_left(node)\n        label_replace(kube_node_status_addresses{node=~\".*\"}, \"instance\", \"$1:9100\", \"address\", \"(.*)\")\n    ) \n    * on (node) (\n        kube_node_labels{label_service_cilium_io_node=\"t1\"}\n    )\n)), 0)"
