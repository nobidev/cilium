                        visual:
                            areaOpacity: 0.1
                            connectNulls: false
                            display: line
                            lineWidth: 1
                            stack: all
                        yAxis:
                            format:
                                unit: bytes
                            min: 0
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |
                                    (
                                      node_memory_MemTotal_bytes{job="node-exporter"}
                                    -
                                      node_memory_MemFree_bytes{job="node-exporter"}
                                    -
                                      node_memory_Buffers_bytes{job="node-exporter"}
                                    -
                                      node_memory_Cached_bytes{job="node-exporter"}
                                    )
                                    * on (instance) group_left(node) (
                                      label_replace(kube_node_status_addresses{node=~"^${node}$"}, "instance", "$1:9100", "address", "(.*)")
                                    )
                                seriesNameFormat: '{{node}} used'
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    node_memory_Buffers_bytes{job="node-exporter"} * on (instance) group_left(node) (
                                      label_replace(kube_node_status_addresses{node=~"^${node}$"}, "instance", "$1:9100", "address", "(.*)")
                                    )
                                seriesNameFormat: '{{node}} buffers'
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |
                                    node_memory_Cached_bytes{job="node-exporter"} * on (instance) group_left(node) (
                                      label_replace(kube_node_status_addresses{node=~"^${node}$"}, "instance", "$1:9100", "address", "(.*)")
                                    )
                                seriesNameFormat: '{{node}} cached'
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: |-
                                    node_memory_MemFree_bytes{job="node-exporter"} * on (instance) group_left(node) (
                                      label_replace(kube_node_status_addresses{node=~"^${node}$"}, "instance", "$1:9100", "address", "(.*)")
                                    )
                                seriesNameFormat: '{{node}} free'
