spec:
    display:
        name: ILB Operator
    variables:
        - kind: ListVariable
          spec:
            display:
                name: Service
                hidden: false
            defaultValue: $__all
            allowAllValue: true
            allowMultiple: false
            customAllValue: .*
            sort: none
            plugin:
                kind: PrometheusLabelValuesVariable
                spec:
                    labelName: service
                    matchers:
                        - cilium_lb_bytes_total
            name: service
    panels:
        "0_0":
            kind: Panel
            spec:
                display:
                    name: Services with unhealthy BGP peers
                plugin:
                    kind: TimeSeriesChart
                    spec:
                        legend:
                            mode: list
                            position: right
                            values: []
                        visual:
                            areaOpacity: 0
                            connectNulls: false
                            display: line
                            lineWidth: 1
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: sum by (service) (cilium_operator_loadbalancer_controlplane_unhealthy_bgp_peers{service=~"^${service}"}) != 0
                                seriesNameFormat: '{{service}}'
        "0_1":
