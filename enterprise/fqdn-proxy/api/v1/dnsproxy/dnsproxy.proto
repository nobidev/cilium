syntax = "proto3";

import "google/protobuf/timestamp.proto";

package dnsproxy;

option go_package = "github.com/cilium/cilium/enterprise/fqdn-proxy/api/v1/dnsproxy";

service FQDNProxyAgent {

  // A client-to-server streaming RPC.
  //
  // Accepts a stream of FQDNMapping
  rpc ProvideMappings(stream FQDNMapping) returns (Success){}

  // LookupEndpointByIP returns endpoint data based on IP
  rpc LookupEndpointByIP(FQDN_IP) returns (Endpoint){}

  // LookupEndpointByIP returns endpoint data based on IP
  rpc LookupSecurityIdentityByIP(FQDN_IP) returns (Identity){}

  // LookupIPsBySecurityIdentity retrieves ips for endpoints with given security identity
  rpc LookupIPsBySecurityIdentity(Identity) returns(IPs){}

  // NotifyOnDNSMessage notifies Agent of a DNS message
  rpc NotifyOnDNSMessage(DNSNotification) returns(Empty) {}

  // GetAllRules retrieves all FQDN rules from agent proxy
  rpc GetAllRules(Empty) returns(RestoredRulesMap){}

  // Returns a stream of FQDN selector and identity updates.
  rpc SubscribeSelectors(Empty) returns (stream SelectorUpdate){}

  // Returns a stream of FQDNRules from the agent to the proxy
  // Proxy should write an Empty response to ack receipt of the rule.
  // Added: v1.18-ce.
  rpc SubscribeFQDNRules(stream Empty) returns (stream FQDNRules){}

  // SubscribeState creates a bidirectional stream for the agent and remote proxy
  // to exchange state information.
  rpc SubscribeState(stream RemoteProxyState) returns (stream AgentState){}
}

service FQDNProxy {
  rpc UpdateAllowed(FQDNRules) returns(Empty) {}

  rpc RemoveRestoredRules(EndpointID) returns(Empty) {}
  rpc GetRules(EndpointID) returns(RestoredRules) {}
}

message RestoredRulesMap {
  map<uint64, RestoredRules> rules = 1;
}
message RestoredRules {
  map<uint32, IPRules> rules = 1;
}

message IPRules {
  repeated IPRule list = 1;
}

message IPRule {
  string regex = 1;
  repeated string ips = 2;
}

message EndpointID {
  uint32 endpointID = 1;
}

message Empty {}

message FQDNRules{
  uint64 endpointID = 1;
  uint32 destPort = 2;
  L7Rules rules = 3;
  uint32 destProto = 4;
}

message L7Rules {
  map<string, string> SelectorRegexMapping = 1;
  map<string, IdentityList> SelectorIdentitiesMapping = 2;
}

message IdentityList {
  repeated uint32 list = 1;
}

message DNSNotification {
  google.protobuf.Timestamp time = 1;
  Endpoint endpoint = 2;
  string epIPPort = 3;
  string serverAddr = 4;
  bytes msg = 5;
  string protocol = 6;
  bool allowed = 7;
  uint32 serverID = 8;
}

message IPs {
  repeated bytes IPs = 1;
}

message FQDN_IP {
  bytes IP = 1;
}

message Identity{
  uint32 ID = 1;
  string Source = 2;
  bool Exists = 3;
}

message FQDNMapping {
    bytes IP = 1;
    string FQDN = 2;
}

message SelectorUpdate {
  FQDNSelectorUpdate fqdnSelector = 1;
  FQDNIdentityUpdate fqdnIdentity = 2;
}

enum UpdateType {
  UPDATETYPE_UNSPECIFIED = 0;
  UPDATETYPE_UPSERT = 1;
  UPDATETYPE_REMOVE = 2;
  UPDATETYPE_BOOKMARK = 3;
}

message FQDNSelectorUpdate {
  UpdateType type = 1;
  FQDNSelector selector = 2;
}

message FQDNSelector {
  string MatchName = 1;
  string MatchPattern = 2;
}

message FQDNIdentityUpdate {
  UpdateType type = 1;

  repeated Label labels = 2;
  uint64 identity = 3;
}

message Label {
  string Key = 1;
  string Value = 2;
  string Source = 3;
}

message Success {
  bool result = 1;
}

message Endpoint {
    uint32 ID = 1;
    uint32 identity = 2;
    string namespace = 3;
    // labels in `foo=bar` format.
    repeated string labels = 4;
    string pod_name = 5;
    repeated Workload workloads = 6;
}

message Workload {
    string name = 1;
    string kind = 2;
}

message RemoteProxyState {
  RemoteProxyStatus Status = 1;

  string Version = 2;

  // StartTime is the unix timestamp
  int64 StartTime = 3;
  
  bool EnableOfflineMode = 4;
}

message AgentState {
  AgentStatus Status = 1;

  string Version = 2;

  string IPCacheMapName = 3;

  int64 StartTime = 4;
  
  bool EnableOfflineMode = 5;
}

enum RemoteProxyStatus {
  RPS_UNSPECIFIED = 0;

  // Indicates the remote proxy is live and has no queued state
  RPS_LIVE = 1;

  // Indicates the remote proxy has detected that the agent is offline
  RPS_AGENT_OFFLINE = 2;

  // Indicates the remote proxy has connected to the agent and is replaying all queued updates
  RPS_REPLAYING = 3;

  // Indicates the remote proxy has finished replaying all queued updates and is
  // waiting for the agent to go live.
  RPS_WAITING_FOR_AGENT_LIVE = 4;
}

enum AgentStatus {
  AS_UNSPECIFIED = 0;

  // Indicates the agent is fully live. All endpoints have regenerated at least once.
  AS_LIVE = 1;

  // Indicates the agent is up but still initializing.
  AS_STARTING = 2;
}
