apiVersion: cilium.io/v2
kind: CiliumClusterwideEnvoyConfig
metadata:
  name: websocket-proxy-encap
spec:
  resources:
  - "@type": type.googleapis.com/envoy.config.listener.v3.Listener
    name: cilium-websocket-encap
    filter_chains:
    - filters:
      - name: cilium.network.websocket.client
        typed_config:
          "@type": type.googleapis.com/cilium.WebSocketClient
          access_log_path: "/var/run/cilium/access_log.sock"
          version: "13"
          host: "jarno.cilium.rocks:443"
          ping_interval: 10s
          ping_when_idle: true
      - name: envoy.filters.network.tcp_proxy
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
          stat_prefix: tcp_stats
          cluster: internal-cluster
  - "@type": type.googleapis.com/envoy.config.cluster.v3.Cluster
    name: internal-cluster
    transport_socket:
      name: envoy.transport_sockets.tls
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
        sni: jarno.cilium.rocks
        common_tls_context:
          alpn_protocols:
          - http/1.1
          validation_context_sds_secret_config:
            name: validation_context
    connect_timeout: 5s
    type: STATIC
    load_assignment:
      cluster_name: internal-cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              envoy_internal_address:
                server_listener_name: internal-http-proxy-encap
  - "@type": type.googleapis.com/envoy.config.listener.v3.Listener
    name: internal-http-proxy-encap
    internal_listener: {}
    filter_chains:
    - filters:
      - name: envoy.filters.network.tcp_proxy
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
          stat_prefix: tcp_stats
          tunneling_config:
            hostname: "jarno.cilium.rocks:443"
            headers_to_add:
            - header:
                key: Proxy-Authorization
                value: Basic Y2lsaXVtOnNlY3JldA== # echo -n "cilium:secret" | base64 -i -
              append: false
          cluster: websocket-proxy-cluster
  - "@type": type.googleapis.com/envoy.config.cluster.v3.Cluster
    name: websocket-proxy-cluster
    connect_timeout: 55s
    type: STRICT_DNS
    load_assignment:
      cluster_name: websocket-proxy-cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: http-proxy.default.svc.cluster.local
                port_value: 1080
  - "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.Secret
    name: validation_context
    validation_context:
      trusted_ca:
        filename: /etc/ssl/certs/ca-certificates.crt
