apiVersion: cilium.io/v2
kind: CiliumEnvoyConfig
metadata:
  name: websocket-encap
  namespace: default
spec:
  resources:
  - "@type": type.googleapis.com/envoy.config.listener.v3.Listener
    name: cilium-websocket-encap
    # TLS inspector should only be used when the traffic is expected to be TLS, as
    # it can interfere with TCP connections where the server is expected to send first,
    # as the TLS inspector will time out if the client does not send enough data first.
    #  listener_filters:
    #  - name: "envoy.filters.listener.tls_inspector"
    filter_chains:
    - filters:
      - name: cilium.network.websocket.client
        typed_config:
          "@type": type.googleapis.com/cilium.WebSocketClient
          access_log_path: "/var/run/cilium/access_log.sock"
          version: "13"
          host: "jarno.cilium.rocks:443"
          ping_interval: 10s
          ping_when_idle: true
      - name: envoy.filters.network.tcp_proxy
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
          stat_prefix: tcp_stats
          cluster: "websocket-cluster"
  - "@type": type.googleapis.com/envoy.config.cluster.v3.Cluster
    name: "websocket-cluster"
    transport_socket:
      name: envoy.transport_sockets.tls
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
        sni: jarno.cilium.rocks
        common_tls_context:
          alpn_protocols:
          - http/1.1
          validation_context_sds_secret_config:
            name: validation_context
    connect_timeout: 55s
    type: STRICT_DNS
    load_assignment:
      cluster_name: cluster_0
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: jarno.cilium.rocks
                port_value: 443
  - "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.Secret
    name: validation_context
    validation_context:
      trusted_ca:
        filename: /etc/ssl/certs/ca-certificates.crt
